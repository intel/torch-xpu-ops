        - torch.xpu.XPUGraph.raw_xpu_graph_exec

    xpu_device_properties:
      desc: "Intel GPU device properties struct"
      apis:
        - torch.xpu.get_device_properties  # returns _XpuDeviceProperties

    xpu_allocator:
      desc: "XPU-specific pluggable allocator"
      apis:
        - torch.xpu.XPUPluggableAllocator

    level_zero_telemetry:
      desc: "Level Zero Sysman hardware telemetry"
      apis:
        - torch.xpu.temperature
        - torch.xpu.clock_rate
        - torch.xpu.power_draw
        - torch.xpu.utilization
        - torch.xpu.memory_usage
