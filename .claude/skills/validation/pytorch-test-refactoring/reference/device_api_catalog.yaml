        - torch.cuda.GPULimits.get_fma_per_cycle_per_sm_cuda_cores
        - torch.cuda.GPULimits.get_fma_per_cycle_per_sm_tensor_cores
        - torch.cuda.GPULimits.get_tflops_per_second
        - torch.cuda.GPULimits.get_memory_bandwidth_Bps
        - torch.cuda.GPULimits.get_shared_memory_bandwidth_Bps

    raw_allocator:
