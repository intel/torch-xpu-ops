        - torch.mtia.attach_out_of_memory_observer

    mtia_device_properties:
      desc: "MTIA-specific device properties"
      apis:
        - torch.mtia.get_device_properties  # returns dict[str,Any]
        - torch.mtia.is_bf16_supported

    mtia_init:
      desc: "MTIA initialization (includes Buck resource manager)"
      apis:
        - torch.mtia.init
        - torch.mtia.is_initialized
        - torch.mtia.DeferredMtiaCallError

    mtia_graph:
      desc: "MTIA graph (separate from accelerator.Graph)"
      apis:
        - torch.mtia.MTIAGraph
        - torch.mtia.graph
        - torch.mtia.graph_pool_handle

    mtia_unified:
      desc: "MTIA uses unified torch.Stream/torch.Event directly (re-exports, not unique APIs)"
      apis:
        - torch.mtia.Event   # = torch.Event
        - torch.mtia.Stream  # = torch.Stream

# ── Decision Rules (for test refactoring) ─────────────────────────────────

decision_rules:
  classification:
    hierarchy: [category_c, category_b, category_a, none]
    description: "First match wins. A test using ANY Cat C API is Strategy 3."

  decorators:
    blacklist_keep:
      rule: "NEVER remove these. Keep as-is."
      values:
        - "@skipXPU"
        - "@skipCUDAIf"
        - "@skipMPS"
        - "@skipMeta"
        - "@onlyNativeDeviceTypesAnd"

    whitelist_enlarge:
      rule: "ENLARGE to @onlyAccelerator IF the guarded test uses only Cat A/B APIs. KEEP as @onlyCUDA IF the guarded test uses any Cat C API."
      values:
        - "@onlyCUDA"
        - "@onlyOn"

  api_replacement:
    category_a_same_name:
      rule: "Replace torch.{device}.<api> with torch.accelerator.<api>"
    category_a_name_differs:
      rule: "Replace with the CORRECT accelerator name (see name_differs mapping)"
    category_b:
      rule: "DO NOT REPLACE. No accelerator wrapper exists. Keep device module call."
    category_c:
      rule: "DO NOT REPLACE. Truly device-specific. Test stays in device-specific class."

  import_cleanup:
    rule: >
      Remove `import torch.{device}` if NO Category B/C usage remains.
      Keep `import torch.{device}` if ANY Category B/C usage remains.

  strategy_assignment:
    strategy_1:
      condition: "No device API usage"
      class_suffix: ""  # TestFoo
    strategy_2:
      condition: "Only Category A API usage"
      class_suffix: "Device"  # TestFooDevice
    strategy_3:
      condition: "Any Category B or C API usage"
      class_suffix: "{Device}"  # TestFooCUDA, TestFooXPU, etc.

# ── Architecture Notes ────────────────────────────────────────────────────

architecture:
  dispatch_chain: >
    torch.accelerator.<api>()
    → torch._C._accelerator_<api>()           [C++ binding, dispatches to registered backend]
    → OR torch.get_device_module(acc).<api>()  [Python delegation to torch.cuda/xpu/etc.]

  get_device_module:
    location: "torch/__init__.py:2960-2982"
    signature: "get_device_module(device=None) -> module"
    caching: "@functools.cache"
    behavior: "None → torch._C._get_accelerator() to find current accelerator"

  private_use1:
    desc: "Out-of-tree backends (HPU, etc.) implement PrivateUse1HooksInterface"
    registration: "torch.utils.backend_registration._register_backend()"

  backend_integration_levels:
    most_integrated: { backend: mtia, note: "Uses torch.Stream/torch.Event directly" }
    middle: { backends: [cuda, xpu], note: "Own Stream/Event/Graph classes" }
    least_integrated: { backend: mps, note: "No streams, no device switching, 4 accelerator APIs only" }

  accelerator_definition: >
    From docs/source/torch.md: A torch.device used alongside CPU for computation,
    using torch.Stream and torch.Event for synchronization. Only ONE accelerator
    can be active at once on a given host.

