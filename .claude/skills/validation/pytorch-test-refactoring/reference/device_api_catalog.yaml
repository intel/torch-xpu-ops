        - torch.cuda.list_gpu_processes

    ipc:
      desc: "CUDA inter-process communication"
      apis:
        - torch.cuda.ipc_collect
        - torch.cuda.Event.ipc_handle
        - torch.cuda.Event.from_ipc_handle

    device_properties:
      desc: "CUDA-specific device properties struct"
      apis:
        - torch.cuda.get_device_capability  # returns tuple[int,int]
        - torch.cuda.get_device_properties  # returns _CudaDeviceProperties
        - torch.cuda.is_tf32_supported

    arch_compilation:
      desc: "NVCC-specific architecture and compilation"
      apis:
