name: "🤖 Agent Issue Tracking"
description: Track an issue being processed by the pytorch-agent pipeline
title: "[Agent] "
labels: ["ai_generated"]
body:
  - type: markdown
    attributes:
      value: |
        This template is used by the pytorch-agent to track issues through
        the discovery → triage → fix → review → merge pipeline.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the issue
    validations:
      required: true

  - type: dropdown
    id: test-type
    attributes:
      label: Test Type
      options:
        - ut
        - e2e
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Category
      description: "e.g. inductor, eager, distributed"

  - type: input
    id: dependency
    attributes:
      label: Dependency
      description: "e.g. torch, torchvision"

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - PVC
        - ATS-M
        - DG2
        - BMG
        - MTL

  - type: textarea
    id: failed-tests
    attributes:
      label: Failed Tests
      description: List of failing test names

  - type: textarea
    id: error-log
    attributes:
      label: Error Log
      description: Relevant error output
      render: shell

  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: Commands to reproduce the failure
      render: bash

  - type: textarea
    id: commit-scope
    attributes:
      label: Commit Scope
      description: Relevant commits or PR references

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Additional context about the issue
