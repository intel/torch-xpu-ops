# Agent issue body template
# Used by render_initial_body() to format issues created by the agent pipeline.
# Placeholders use Python str.format() syntax: {field_name}

name: "Agent Issue Body"
description: "Template for issues tracked by the issue-handler pipeline"

body: |
  <!-- agent:status:{stage} -->

  ## Summary
  {summary}

  ## Test Info
  - **Test Type:** {test_type}
  - **Category:** {category}
  - **Dependency:** {dependency}
  - **Platform:** {platform}

  ## Failed Tests
  {failed_tests}

  ## Error Log
  ```
  {error_log}
  ```

  ## Reproducer
  ```bash
  {reproducer}
  ```

  ## Commit Scope
  {commit_scope}

  ## Root Cause Analysis
  {root_cause}

  ## Proposed Fix Strategy
  {fix_strategy}

  ## Target Repository
  {target_repo}

  ## Action Items
  - [ ] 🔍 Issue formatted (Discovery Agent)
    <details><summary>Discovery log</summary>
    <!-- agent:discovery-log -->
    </details>
  - [ ] 🧠 Root cause identified (Triage Agent)
    <details><summary>Triage log</summary>
    <!-- agent:triage-log -->
    </details>
  - [ ] 🔧 Fix implemented (Fix Agent)
    <details><summary>Fix log</summary>
    <!-- agent:fix-log -->
    </details>
  - [ ] ✅ Fix verified locally
  - [ ] 📋 PR proposed
  - [ ] 👀 Human review
  - [ ] 🎉 PR merged

  ## Context
  {context}

  ## Environment
  <details><summary>collect_env</summary>

  {environment}

  </details>

  ## Original Issue
  <details><summary>Original issue body</summary>

  {original_issue}

  </details>
