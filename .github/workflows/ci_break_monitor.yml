name: XPU CI Break Monitor
on:
  schedule:
    - cron: '0 2 * * *'

  pull_request:
    paths:
      - '.github/workflows/ci_break_monitor.yml'
      - '.github/scripts/check_nightly_status.py'
      - '.github/scripts/create_tracking_issue.py'
      - '.github/scripts/classify_failures.py'

  workflow_dispatch:
    inputs:
      steps:
        description: 'Which steps to run'
        type: choice
        options:
          - all
          - step1_scan
          - step2_create_issue
          - step3_classify
        default: 'all'
      days:
        description: 'Look back N days'
        default: '7'
      parse_logs:
        description: 'Parse job logs for test names'
        type: boolean
        default: true
      deep_scan:
        description: 'Deep-scan EXISTING failures to find first-fail commit'
        type: boolean
        default: true
      max_lookback:
        description: 'Max older runs to check during deep-scan'
        default: '14'

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  ci-monitor:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || vars.CI_MONITOR_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      # ===== Step 1: Scan PyTorch XPU CI =====
      - name: "Step 1: Scan PyTorch XPU CI"
        id: check
        if: ${{ github.event_name == 'schedule' || github.event_name == 'pull_request' || inputs.steps == 'all' || inputs.steps == 'step1_scan' || inputs.steps == 'step2_create_issue' || inputs.steps == 'step3_classify' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/check_nightly_status.py \
            --days ${{ inputs.days || '7' }} \
            --event schedule \
            --num-runs 2 \
            ${{ (inputs.parse_logs == true || github.event_name == 'schedule' || github.event_name == 'pull_request') && '--parse-logs' || '' }} \
            ${{ (inputs.deep_scan == true || github.event_name == 'schedule' || github.event_name == 'pull_request') && '--deep-scan' || '' }} \
            --max-lookback ${{ inputs.max_lookback || '14' }} \
            --output ci_results.json \
            --save-all-runs all_runs.json

      - name: Upload scan results
        if: ${{ github.event_name == 'schedule' || github.event_name == 'pull_request' || inputs.steps == 'all' || inputs.steps == 'step1_scan' || inputs.steps == 'step2_create_issue' || inputs.steps == 'step3_classify' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-scan-results
          path: |
            ci_results.json
            all_runs.json

      # ===== Step 2: Create Tracking Issue =====
      - name: "Step 2: Create Tracking Issue"
        id: create_issue
        if: ${{ github.event_name == 'schedule' || github.event_name == 'pull_request' || inputs.steps == 'all' || inputs.steps == 'step2_create_issue' || inputs.steps == 'step3_classify' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/create_tracking_issue.py \
            --input ci_results.json \
            --all-runs all_runs.json \
            ${{ github.event_name == 'pull_request' && '--dry-run' || '' }}

      # ===== Step 3: Create Sub-Issues =====
      # NOTE: workflow_dispatch step3_classify also runs Step 1 and Step 2 first,
      # because this step depends on Step 2 output (issue_number).
      - name: "Step 3: Create Sub-Issues"
        if: ${{ (github.event_name == 'schedule' || inputs.steps == 'all' || inputs.steps == 'step3_classify') && steps.create_issue.outputs.issue_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/classify_failures.py \
            --input ci_results.json \
            --summary-issue ${{ steps.create_issue.outputs.issue_number }}

      - name: "Step 3: Create Sub-Issues (dry-run for PR)"
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          python .github/scripts/classify_failures.py \
            --input ci_results.json \
            --summary-issue 0 \
            --dry-run
