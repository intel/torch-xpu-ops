name: Windows Build

on:
  workflow_call:
    inputs:
      pytorch:
        required: false
        type: string
        default: 'main'
        description: Pytorch main by default, or 'commit/branch', or 'repo@commit/repo@branch'
      torch_xpu_ops:
        required: false
        type: string
        default: 'main'
        description: Torch-xpu-ops main by default, 'commit/branch', or 'repo@commit/repo@branch', or 'pinned' for pytorch pin
      python:
        required: false
        type: string
        default: '3.10'
        description: Python version
      runner:
        required: true
        type: string
        description: Runner label for build job
      xpu_version:
        required: false
        type: string
        default: '2026.0'
        description: XPU version

permissions: read-all

env:
  USE_XPU: 1

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 1000
    outputs:
      torch_whl_name: ${{ steps.find_whl.outputs.torch_whl_name }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Setup conda environment
        shell: cmd
        run: |
          call "C:\ProgramData\miniforge3\Scripts\activate.bat"
          if exist "C:\ProgramData\miniforge3\envs\windows_ci" (
              rmdir /s /q "C:\ProgramData\miniforge3\envs\windows_ci"
          )
          call conda clean -ay
          call conda remove --all -y -n windows_ci
          call conda create -n windows_ci python=${{ inputs.python }} cmake ninja -y
      - name: Prepare Pytorch Source
        shell: cmd
        run: |
          call "C:\ProgramData\miniforge3\Scripts\activate.bat"
          call conda activate windows_ci
          set WORKSPACE=${{ github.workspace }}\..
          set pytorch=${{ inputs.pytorch }}
          set torch_xpu_ops=${{ inputs.torch_xpu_ops }}

          REM Git config for long paths and symlinks (required for pytorch submodules)
          git config --system core.longpaths true
          git config --global core.symlinks true
          git config --global core.fsmonitor false
          powershell -Command "Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1"

          REM Parse pytorch repo/commit
          echo %pytorch% | findstr /C:"https://" >nul
          if %errorlevel% equ 0 (
              echo %pytorch% | findstr "@" >nul
              if %errorlevel% equ 0 (
                  for /f "tokens=1,2 delims=@" %%a in ("%pytorch%") do (
                      set PYTORCH_REPO=%%a
                      set PYTORCH_COMMIT=%%b
                  )
              ) else (
                  set PYTORCH_REPO=%pytorch%
                  set PYTORCH_COMMIT=main
              )
          ) else (
              set PYTORCH_REPO=https://github.com/pytorch/pytorch.git
              set PYTORCH_COMMIT=%pytorch%
          )

          REM Parse torch-xpu-ops repo/commit
          echo %torch_xpu_ops% | findstr /C:"https://" >nul
          if %errorlevel% equ 0 (
              echo %torch_xpu_ops% | findstr "@" >nul
              if %errorlevel% equ 0 (
                  for /f "tokens=1,2 delims=@" %%a in ("%torch_xpu_ops%") do (
                      set TORCH_XPU_OPS_REPO=%%a
                      set TORCH_XPU_OPS_COMMIT=%%b
                  )
              ) else (
                  set TORCH_XPU_OPS_REPO=%torch_xpu_ops%
                  set TORCH_XPU_OPS_COMMIT=main
              )
          ) else (
              set TORCH_XPU_OPS_REPO=https://github.com/intel/torch-xpu-ops.git
              set TORCH_XPU_OPS_COMMIT=%torch_xpu_ops%
          )

          python .github\scripts\prepare_pytorch.py --workspace=%WORKSPACE% --pytorch-repo=%PYTORCH_REPO% --pytorch-commit=%PYTORCH_COMMIT% --torch-xpu-ops-repo=%TORCH_XPU_OPS_REPO% --torch-xpu-ops-commit=%TORCH_XPU_OPS_COMMIT%
          if errorlevel 1 exit /b 1
      - name: Build Pytorch XPU
        shell: cmd
        run: |
          call "C:\ProgramData\miniforge3\Scripts\activate.bat"
          call conda activate windows_ci
          set WORKSPACE=${{ github.workspace }}\..
          set XPU_VERSION=${{ inputs.xpu_version }}
          python .github\scripts\build_windows.py > %WORKSPACE%\pytorch\build_torch_wheel_log.log 2>&1
          set BUILD_ERR=%ERRORLEVEL%
          type %WORKSPACE%\pytorch\build_torch_wheel_log.log
          if %BUILD_ERR% neq 0 exit /b 1
      - name: Find and Upload Torch Wheel
        id: find_whl
        shell: cmd
        run: |
          call "C:\ProgramData\miniforge3\Scripts\activate.bat"
          call conda activate windows_ci
          cd ..\pytorch
          for /r %%i in (dist\torch*.whl) do (
            set TORCH_WHL=%%i
          )
          echo TORCH_WHL=%TORCH_WHL%
          for %%A in ("%TORCH_WHL%") do set WHL_NAME=%%~nxA
          echo torch_whl_name=%WHL_NAME% >> %GITHUB_OUTPUT%
          echo "[INFO] wheel name: %WHL_NAME%"
      - name: Install and Verify
        shell: cmd
        run: |
          call "C:\ProgramData\miniforge3\Scripts\activate.bat"
          call conda activate windows_ci
          cd ..\pytorch
          for /r %%i in (dist\torch*.whl) do (
            pip install --force-reinstall "%%i"
          )
          python -c "import torch; assert torch.xpu._is_compiled(), 'XPU not compiled!'"
          python -c "import torch; print(torch.__config__.show())"
          python -c "import torch; print(torch.__config__.parallel_info())"
      - name: Upload Windows build log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Torch-XPU-Windows-Log-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: 'C:\actions-runner\_work\torch-xpu-ops\pytorch\build_torch_wheel_log.log'
      - name: Upload Windows binary
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Torch-XPU-Windows-Binary-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: 'C:\actions-runner\_work\torch-xpu-ops\pytorch\dist'
          compression-level: 0
