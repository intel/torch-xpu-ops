name: lint

# Reusable code-check workflow.
#
# Runs lint, clang-format, and (opt-in) clang-tidy as sequential steps in a
# single job so they share a unified step summary. The AI-generated PR
# reproducer check stays in its own job (different gating + permissions).

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label.
        required: false
        type: string
        default: ubuntu-24.04
      python-version:
        description: Python interpreter for the lint venv.
        required: false
        type: string
        default: '3.10'
      run-clang-tidy:
        description: Whether to run clang-tidy (requires built sources).
        required: false
        type: boolean
        default: false
      check-reproducer:
        description: Whether to run the AI-generated PR reproducer check.
        required: false
        type: boolean
        default: false
      checkout-path:
        description: Path under $GITHUB_WORKSPACE to checkout into.
        required: false
        type: string
        default: '.'
    secrets:
      github-token:
        description: Token for posting reproducer-check comments on PRs.
        required: false

permissions:
  contents: read

jobs:
  code-check:
    name: code-check
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.checkout-path }}

      - name: torch-xpu-ops info
        shell: bash
        working-directory: ${{ inputs.checkout-path }}
        run: |
          set -euo pipefail
          repo_url=$(git config --get remote.origin.url || echo 'unknown')
          head_sha=$(git rev-parse HEAD)
          head_short=$(git rev-parse --short HEAD)
          head_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-$(git rev-parse --abbrev-ref HEAD)}}"
          base_ref="${GITHUB_BASE_REF:-}"
          author=$(git log -1 --pretty=format:'%an <%ae>')
          subject=$(git log -1 --pretty=format:'%s')
          commit_date=$(git log -1 --pretty=format:'%ci')

          {
            echo "## torch-xpu-ops"
            echo
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Repository | \`${repo_url}\` |"
            echo "| Branch | \`${head_branch}\` |"
            echo "| Base ref | \`${base_ref:-N/A}\` |"
            echo "| Commit | [\`${head_short}\`](${repo_url%.git}/commit/${head_sha}) |"
            echo "| Author | ${author} |"
            echo "| Date | ${commit_date} |"
            echo "| Subject | ${subject} |"
            echo
            echo "## Code-check results"
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "[info] HEAD: ${head_short} (${head_branch})"
          echo "[info] ${author} - ${subject}"

      - name: Lint
        uses: ./.github/actions/code-check
        with:
          scope: lint
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.checkout-path }}
          summary-heading: '### Lint'

      - name: Clang-format
        if: ${{ always() }}
        uses: ./.github/actions/code-check
        with:
          scope: clang-format
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.checkout-path }}
          summary-heading: '### Clang-format'

      - name: Clang-tidy
        if: ${{ always() && inputs.run-clang-tidy }}
        uses: ./.github/actions/code-check
        with:
          scope: clang-tidy
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.checkout-path }}
          summary-heading: '### Clang-tidy'

  reproducer:
    name: reproducer
    if: ${{ inputs.check-reproducer }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.checkout-path }}
      - name: Validate reproducer
        uses: ./.github/actions/check-reproducer
        with:
          working-directory: ${{ inputs.checkout-path }}
          github-token: ${{ secrets.github-token }}
