name: Nightly-OnDemand Tests Rolling

on:
  workflow_dispatch:
    inputs:
      node_name:
        type: string
        default: ''

permissions: read-all

jobs:
  get_runner:
    runs-on: linux.idc.xpu
    outputs:
      test_host: ${{ steps.runner-info.outputs.test_host }}
      test_user: ${{ steps.runner-info.outputs.test_user }}
      test_group: ${{ steps.runner-info.outputs.test_group }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Get runner
        id: runner-info
        uses: ./.github/actions/get-runner

  verify:
    runs-on: linux.idc.xpu
    needs: get_runner
    steps:
      - name: verify
        run: |
          echo "${{ needs.get_runner.outputs.test_host }}"
          echo "${{ needs.get_runner.outputs.test_user }}"
          echo "${{ needs.get_runner.outputs.test_group }}"
  