name: Nightly-OnDemand Tests Rolling

on:
  workflow_dispatch:
    inputs:
      node_name:
        type: string
        default: ''

permissions: read-all

jobs:
  get_runner:
    runs-on: ${{ inputs.node_name }}
    timeout-minutes: 480
    defaults:
      run:
        shell: bash -xe {0}
    strategy:
      matrix:
        test_case: [target, baseline]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: cleanup
        run: |
          sudo rm -rf ./*
      - name: torch-xpu-ops
        uses: actions/checkout@v4
        with:
          path: torch-xpu-ops
      - name: wheel
        uses: actions/download-artifact@v4
        with:
          name: manywheel-py3_10-xpu
          github-token: ${{ github.token }}
          repository: pytorch/pytorch
          run-id: 16667550028
      - name: conda
        run: |
          . /opt/conda/etc/profile.d/conda.sh
          conda create python=3.10 -y -n ${{ matrix.test_case }}
          conda activate ${{ matrix.test_case }}
          pip install --pre torch torchvision torchaudio --index-url https://download.pytorch.org/whl/test/xpu
          pip install pandas psutil scipy requests
          git clone https://github.com/pytorch/benchmark
          cd benchmark
          pip install -r requirements.txt
          pip install -U transformers==4.44.2 timm==1.0.14
          python install.py densenet121
          python install.py torch_multimodal_clip
          python install.py hf_Whisper
          if [ "${{ matrix.test_case }}" == "target" ];then
            pip uninstall -y torch && pip uninstall -y torch
            pip install --no-deps $(find ${{ github.workspace }}/ -name "*torch*.whl")
          fi
          pip list |grep -E 'intel|torch'
      - name: test
        run: |
          . /opt/conda/etc/profile.d/conda.sh
          conda activate ${{ matrix.test_case }}
          git clone https://github.com/pytorch/pytorch
          cd pytorch
          git checkout release/2.8
          python ../torch-xpu-ops/.github/scripts/apply_torch_pr.py
          cd ..
          cp ~/mengfeil/run.sh .
          cp ~/mengfeil/a.txt .
          rm -rf logs
          ./run.sh performance 0 a.txt
      - name: Upload Inductor XPU E2E Data
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.test_case }}
          path: ${{ github.workspace }}/logs
