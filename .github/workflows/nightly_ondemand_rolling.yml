name: Nightly-OnDemand Tests Rolling

on:
  workflow_dispatch:
    inputs:
      node_name:
        required: true
        type: string
        default: ''
      setup_xpu:
        type: string
        default: ''

permissions: read-all

jobs:
  setup:
    runs-on: linux.idc.xpu
    container:
      image: mengfeili/intel-pvc-driver:1146-1136
      options: --device=/dev/mem --device=/dev/dri --group-add video --privileged --shm-size=8g -u 100:109
      env:
        ZE_AFFINITY_MASK: ${{ env.ZE_AFFINITY_MASK }}
    steps:
      - id: setVariables
        run: |
          printenv
          clinfo --list
