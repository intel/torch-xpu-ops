name: Nightly-OnDemand Tests

on:
  workflow_dispatch:
    inputs:
      node_name:
        type: string
        default: ''
        description: 'PVC-7362,PVC-7363,PVC-7364,PVC-7365,PVC-7900,PVC-03004,PVC-03006'

permissions: read-all

jobs:
  get-params:
    runs-on: build
    outputs:
      node_name: ${{ steps.params.outputs.node_name }}
    steps:
      - name: Get params
        id: params
        run: |
          set -xe
          node_node="$(echo ${{ inputs.node_name }} |sed 's/,/","/g;s/^/["/;s/$/"]/')"
          echo "node_name=${node_node}" >> ${GITHUB_OUTPUT}
  check-nodes:
    runs-on: ${{ matrix.node_name }}
    if: ${{ ! cancelled() }}
    needs: [get-params]
    strategy:
      fail-fast: false
      matrix:
        node_name: ${{ fromJSON(needs.get-params.outputs.node_name) }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Basic infos
        run: |
          cat /etc/os-release
          uname -r
          dpkg -l |grep -iE 'intel-opencl-icd|libze|libigc|intel-igc|ocloc'
          lspci -nn |grep  -Ei 'VGA|DISPLAY'
          xpu-smi discovery -d 0 |grep -E 'Stepping|PCI Device ID'
          clinfo |grep 'Device IP'
          lscpu |grep 'Model name'
          clinfo -l
          df -h
          free -h
          ip a
      - name: Check env
        run: |
          export GCC_VERSION=13
          apt-get update
          apt-get install -y wget curl vim libgomp1 pciutils ca-certificates \
                  gnupg \
                  software-properties-common \
                  apt-transport-https \
                  lsb-release wget \
                  curl \
                  sudo \
                  git \
                  unzip \
                  zip \
                  gh \
                  numactl \
                  rsync \
                  jq gcc g++ \
                  gcc-${GCC_VERSION} g++-${GCC_VERSION} \
                  build-essential \
                  cmake \
                  ninja-build \
                  pkg-config \
                  autoconf \
                  automake \
                  libtool libgl1 \
                  libglib2.0-0 \
                  libglib2.0-dev \
                  zlib1g \
                  zlib1g-dev python3 \
                  python3-dev \
                  python3
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${GCC_VERSION} 100 && \
              update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${GCC_VERSION} 100 && \
              update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-${GCC_VERSION} 100 && \
              gcc -v && g++ -v && gcov -v
