name: Nightly-OnDemand Tests

on:
  workflow_dispatch:
    inputs:
      test:
        type: string
        default: ''
   
permissions: read-all

jobs:
  test1:
    runs-on: ${{ inputs.test }}
    steps:
      - name: test1
        run: |
          ls
  test2:
    if: ${{ 0 == 1 }}
    runs-on: ${{ inputs.test }}
    steps:
      - name: test2
        run: |
          ls
  test3:
    needs: [test1, test2]
    runs-on: ${{ inputs.test }}
    if: ${{  ! endsWith(needs.test1.result, 'ed') || ! endsWith(needs.test2.result, 'ed')  }}
    steps:
      - name: test3
        run: |
          echo "${{ needs.test1.result }}   ${{ needs.test2.result }}"