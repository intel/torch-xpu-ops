name: Nightly-OnDemand Tests

on:
  schedule:
    - cron: '00 16 * * 0-4'   # Weekday 00:00 GMT+8
    - cron: '00 16 * * 5'     # Weekend 00:00 GMT+8
  workflow_dispatch:
    inputs:
      # ----- Basic Configuration -----
      pytorch:
        type: string
        required: true
        description: >-
          PyTorch version: nightly_wheel(==xxx), release_wheel, test_wheel,
          or commit/branch/tag, repo@commit/repo@branch/repo@tag
      torch_xpu_ops:
        type: string
        required: false
        default: ''
        description: >-
          Torch-xpu-ops version: empty = triggered commit,
          pinned = pytorch pinned, or commit/branch/tag
      runner:
        type: choice
        default: PVC
        description: Runner platform
        options: [PVC, BMG]
      python:
        type: string
        required: true
        default: '3.10'
        description: Python version (e.g. 3.10, 3.11, 3.12)

      # ----- Component Build (Optional) -----
      component:
        type: choice
        default: ''
        description: Optional component to build
        options: ['', onednn, sycltla, triton, oneapi]
      component_version:
        type: string
        required: false
        default: ''
        description: >-
          Component version: empty = pytorch pinned,
          or commit/branch/tag, repo@ref.
          For oneAPI use offline installer URL.

      # ----- Unit Tests -----
      ut:
        type: string
        required: false
        default: ''
        description: >-
          Unit test scopes (comma-separated):
          basic, op_regression, op_extended, op_regression_dev1,
          op_ut, skipped_ut, torch_xpu, xpu_profiling, xpu_distributed,
          microbench, windows

      # ----- E2E Parameters -----
      suite:
        type: string
        required: false
        default: ''
        description: 'E2E suites: huggingface, timm_models, torchbench, pt2e'
      dt:
        type: string
        required: false
        default: ''
        description: 'Dtypes: float32, bfloat16, float16, amp_bf16, amp_fp16, int8'
      mode:
        type: string
        required: false
        default: ''
        description: 'Modes: inference, training'
      scenario:
        type: string
        required: false
        default: ''
        description: 'Scenarios: accuracy, performance'
      model:
        type: string
        required: false
        default: ''
        description: Specific model name (only this model runs)

permissions:
  contents: read

run-name: >-
  ${{
    (github.event_name == 'schedule' && 'Scheduled / ' +
     (github.event.schedule == '00 16 * * 5' && 'Weekly' || 'Nightly')
    ) ||
    (github.event_name == 'workflow_dispatch' && 'Ondemand / ' + inputs.pytorch
    ) ||
    github.event_name
  }}

jobs:
  # ---------------------------------------------------------------------------
  # On-demand (manual dispatch)
  # ---------------------------------------------------------------------------
  ondemand-tests:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      checks: write
      issues: write
    secrets: inherit
    uses: ./.github/workflows/_test_call.yml
    with:
      runner: ${{ contains(inputs.runner, 'BMG') && 'bmg-test' || 'pvc_rolling' }}
      pytorch: ${{ inputs.pytorch }}
      torch_xpu_ops: ${{ inputs.torch_xpu_ops || github.workflow_sha }}
      python: ${{ inputs.python }}
      component: ${{ inputs.component }}
      component_version: ${{ inputs.component_version }}
      ut: ${{ inputs.ut }}
      suite: ${{ inputs.suite }}
      dt: ${{ inputs.dt }}
      mode: ${{ inputs.mode }}
      scenario: ${{ inputs.scenario }}
      model: ${{ inputs.model }}
      category: ondemand

  # ---------------------------------------------------------------------------
  # Scheduled (nightly / weekly)
  # ---------------------------------------------------------------------------
  scheduled-tests:
    if: github.event_name == 'schedule' && github.repository_owner == 'intel'
    permissions:
      contents: read
      checks: write
      issues: write
    secrets: inherit
    uses: ./.github/workflows/_test_call.yml
    strategy:
      matrix:
        pytorch: [main, nightly_wheel]
    with:
      runner: pvc_rolling
      pytorch: ${{ matrix.pytorch }}
      torch_xpu_ops: ${{ contains(matrix.pytorch, 'main') && 'main' || 'pinned' }}
      python: '3.10'
      ut: 'basic,op_ut,skipped_ut,xpu_profiling,xpu_distributed,microbench,windows'
      suite: 'huggingface,timm_models,torchbench,pt2e'
      category: ${{ github.event.schedule == '00 16 * * 5' && 'weekly' || 'nightly' }}
