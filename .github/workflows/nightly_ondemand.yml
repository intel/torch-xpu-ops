name: Nightly-OnDemand Tests

on:
  workflow_dispatch:
    inputs:
      node_name:
        type: string
        default: ''
        description: 'PVC-7362,PVC-7363,PVC-7364,PVC-7365,PVC-7900,PVC-03004,PVC-03006'

permissions: read-all

jobs:
  get-params:
    runs-on: ubuntu-24.04
    outputs:
      node_name: ${{ steps.params.outputs.node_name }}
    steps:
      - name: Get params
        id: params
        run: |
          set -xe
          node_node="$(echo ${{ inputs.node_name }} |sed 's/,/","/g;s/^/["/;s/$/"]/')"
          echo "node_name=${node_node}" >> ${GITHUB_OUTPUT}
  check-nodes:
    runs-on: ${{ matrix.node_name }}
    if: ${{ ! cancelled() }}
    needs: [get-params]
    strategy:
      fail-fast: false
      matrix:
        node_name: ${{ fromJSON(needs.get-params.outputs.node_name) }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Check env
        run: |
          if [[ -n "${RUNNER_WORKSPACE}" && -d "${RUNNER_WORKSPACE}/.." ]]; then
            cd "${RUNNER_WORKSPACE}/.."
            [[ "$(pwd)" != "/" ]] && sudo chown "${ME}" . -R 2>/dev/null || true
          fi

          clinfo --list
          id
          ip a

          # Fix ownership
          ME="$(id -u):$(id -g)"
          sudo chown "${ME}" "${HOME}" -R 2>/dev/null || true
          sudo chmod 777 /tmp -R 2>/dev/null || true
          sudo chown "${ME}" . -R 2>/dev/null || true


          exit 0

          export DEBIAN_FRONTEND=noninteractive
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8
          export TZ=UTC
          # sudo bash ${{ github.workspace }}/install_xpu.sh --clean --common --uv --driver-lts2
