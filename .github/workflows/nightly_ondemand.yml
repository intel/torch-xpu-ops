name: Nightly-OnDemand Tests

on:
  workflow_dispatch:
    inputs:
      node_name:
        type: string
        default: ''

permissions: read-all

jobs:
  check-nodes-env:
    runs-on: ${{ matrix.node_name }}
    strategy:
      matrix:
        node_name: [PVC-7900]
    name: check-nodes-env-for-${{ matrix.node_name }}
    steps:
      - name: Check env
        run: |
          set -xe
          sudo rm -rf ./*
          # hardware
          disk=$(df -h |grep '/$' |awk '{print $4"/"$2}')
          cpu=$(lscpu |grep 'Model name' |sed 's/Model name: *//')
          memory=$(free -h |grep 'Mem:' |awk '{print $NF}')
          scaling_governor=$(cat /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor |sort |uniq)
          # software
          . /etc/os-release
          source /opt/intel/oneapi/setvars.sh > /dev/null
          driver=$(sycl-ls |grep 'opencl:gpu' |awk '{print $NF}' |sort |uniq -c |sed 's/ //g;s/\[/*[/')
          kernel=$(uname -r)
          igc=$(apt search libigc-dev 2>&1 |grep 'installed')
          level_zero="$((apt search level-zero-dev && apt search libze-dev) 2>&1 |grep 'installed')"
          icc=$(icpx -v 2>&1 |grep 'Compiler' |sed 's/.*(//;s/).*//')
          gcc="$((gcc -v && g++ -v) 2>&1 |grep 'g.. version' |awk '{printf("%s/", $3)}')"
          # network
          tic=$(date +%s)
          git clone https://github.com/pytorch/pytorch
          toc=$(date +%s)
          elapsed=$(echo "$tic,$toc" |awk -F, '{printf("%d", $2 - $1)}')
          echo "| Host | Disk | CPU | Mem | Scaling | OS | GPU Driver | Kernel | IGC | L0 | ICC | GCC | Network |" >> ${GITHUB_STEP_SUMMARY}
          echo "| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |" >> ${GITHUB_STEP_SUMMARY}
          echo "| ${HOSTNAME} | ${disk} | ${cpu} | ${memory} | ${scaling_governor} | ${PRETTY_NAME} | ${driver} | ${kernel} | ${igc} | ${level_zero} | ${icc} | ${gcc} | ${elapsed} |" >> ${GITHUB_STEP_SUMMARY}
          rsync -avz --delete ~/mengfeil/logs/ ${{ github.workspace }}/logs/
      - name: Upload Inductor XPU E2E Data
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: baseline
          path: ${{ github.workspace }}/logs
