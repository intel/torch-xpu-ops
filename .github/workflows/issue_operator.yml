name: Issue Operator

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  auto-milestone:
    runs-on: ubuntu-latest
    # Only run when the 'skipped' label is present
    if: contains(github.event.issue.labels.*.name, 'skipped')
    steps:
      - name: Set milestone for skipped issues
        uses: actions/github-script@v7
        with:
          script: |
            // Look up milestone by name instead of hardcoding the ID
            const milestoneName = 'UT Backlog';
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const milestone = milestones.data.find(m => m.title === milestoneName);
            if (!milestone) {
              core.setFailed(`Milestone "${milestoneName}" not found. Available: ${milestones.data.map(m => m.title).join(', ')}`);
              return;
            }

            // Skip if already assigned to this milestone
            if (context.payload.issue.milestone?.number === milestone.number) {
              core.info('Issue already has the correct milestone. Skipping.');
              return;
            }

            try {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                milestone: milestone.number
              });
              core.info(`Assigned milestone "${milestoneName}" to issue #${context.payload.issue.number}`);
            } catch (e) {
              core.setFailed(`Failed to set milestone: ${e.message}`);
            }