name: OnDemand Acceptance Tests

on:
  workflow_dispatch:
    inputs:
      pytorch:
        required: true
        type: string
        default: 'main'
        description: |
          PyTorch version:
          - main (default for source builds)
          - nightly_wheel, test_wheel, release_wheel (for wheel tests)
          - commit/branch/tag
          - repo@commit/repo@branch/repo@tag

      # Component selection
      component:
        required: true
        type: choice
        options:
          - onednn
          - sycltla
          - triton
          - oneapi
          - pytorch
          - torch-xpu-ops
        default: 'pytorch'
        description: 'Component to compare'

      # Version configuration
      target_version:
        required: true
        type: string
        default: ''
        description: |
          Target component version (new version):
          - commit/branch/tag
          - repo@commit/repo@branch/repo@tag
      baseline_version:
        required: true
        type: string
        default: ''
        description: |
          Baseline component version (reference):
          - commit/branch/tag
          - repo@commit/repo@branch/repo@tag

      # Environment
      python:
        type: string
        default: '3.10'
        description: 'Python version'
      runner:
        type: choice
        options:
          - PVC
          - BMG
        default: 'PVC'
        description: 'What runner to use'

permissions: read-all

run-name: >-
  Acceptance Test / ${{ inputs.component }} (${{ inputs.target_version }} vs ${{ inputs.baseline_version }})

jobs:
  get-runner:
    runs-on: ${{ contains(inputs.runner, 'BMG') && 'bmg-test' || 'pvc_rolling' }}
    outputs:
      runner_id: ${{ steps.runner-info.outputs.runner_id }}
    steps:
      - name: Checkout torch-xpu-ops repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Get runner information and configuration
        id: runner-info
        uses: ./.github/actions/get-runner

  # Run tests on target version
  target-tests:
    needs: get-runner
    permissions: write-all
    uses: ./.github/workflows/_test_call.yml
    with:
      test_role: 'target'
      all_inputs_json: ${{ toJSON(inputs) }}
      runner: ${{ needs.get-runner.outputs.runner_id }}
      windows_runner: 'Windows_CI'
      is_scheduled_run: comparison-manually
      ut: 'op_p0'
      suite: 'huggingface,timm_models,torchbench'
    secrets: inherit

  # Run tests on baseline version
  baseline-tests:
    needs: get-runner
    permissions: write-all
    uses: ./.github/workflows/_test_call.yml
    with:
      test_role: 'baseline'
      all_inputs_json: ${{ toJSON(inputs) }}
      runner: ${{ needs.get-runner.outputs.runner_id }}
      windows_runner: 'Windows_CI'
      is_scheduled_run: comparison-manually
      ut: 'op_p0'
      suite: 'huggingface,timm_models,torchbench'
    secrets: inherit

  # Job 4: Compare results and generate report
  compare-results:
    needs: [target-tests, baseline-tests]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Target Logs
        uses: actions/download-artifact@v8
        with:
          pattern: 'Inductor-*target*'
          path: ${{ github.workspace }}/results/target
          merge-multiple: true

      - name: Download Baseline Logs
        uses: actions/download-artifact@v8
        with:
          pattern: 'Inductor-*baseline*'
          path: ${{ github.workspace }}/results/baseline
          merge-multiple: true

      - name: Setup python env
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" sh
          uv venv myvenv --python 3.12 --clear
          source myvenv/bin/activate
          uv pip install pip numpy 'setuptools<81' wheel
          uv pip install numpy pandas pydantic tqdm psutil openpyxl PyGithub

      - name: Compare Test Results
        run: |
          source myvenv/bin/activate
          echo "Comparing results for ${{ inputs.component }}..."
          echo "Target: ${{ inputs.target_version }}"
          echo "Baseline: ${{ inputs.baseline_version }}"

          # Check for results directory
          if [ ! -d "./results" ]; then
              echo "Error: No results directory found after test!"
              exit 1
          fi

          # Debug: list downloaded files
          find results

          # Function: run unit test comparison
          # Returns: 0 if no new failures, 1 otherwise
          run_ut_comparison() {
              echo "Running unit test comparison..."
              python .github/scripts/compare-ut.py \
                  --input results/ \
                  --output ut_comparison.csv \
                  --markdown \
                  --markdown-output ut_comparison.md || true

              if [ -f "ut_comparison_new_failures.csv" ]; then
                  # Count failures (skip header row)
                  local ut_failed_count
                  ut_failed_count=$(tail -n +2 ut_comparison_new_failures.csv 2>/dev/null | wc -l)
                  if [ "$ut_failed_count" -gt 0 ]; then
                      echo "Unit test failures detected: $ut_failed_count new failed cases."
                      # Print the failing lines for visibility
                      tail -n +2 ut_comparison_new_failures.csv
                      return 1
                  fi
              fi
              return 0
          }

          # Function: run end-to-end comparison
          # Returns: 0 if no new failures or drops, 1 otherwise
          run_e2e_comparison() {
              echo "Running E2E comparison..."
              python .github/scripts/compare-e2e.py \
                  -t results/target \
                  -b results/baseline \
                  -o e2e_comparison.csv \
                  -m e2e_comparison.md || true

              if [ -f "e2e_comparison_*_details.csv" ]; then
                  local e2e_failed_count e2e_dropped_count
                  e2e_failed_count=$(grep -c ',new_failed,' e2e_comparison_*_details.csv 2>/dev/null || true)
                  e2e_dropped_count=$(grep -c ',new_dropped,' e2e_comparison_performance_details.csv 2>/dev/null || true)

                  if [ "$e2e_failed_count" -ne 0 ]; then
                      echo "E2E failures detected: $e2e_failed_count new failed cases."
                      grep ',new_failed,' e2e_comparison_*_details.csv || true
                      return 1
                  fi

                  if [ "$e2e_dropped_count" -ne 0 ]; then
                      echo "E2E dropped cases detected: $e2e_dropped_count new dropped cases."
                      grep ',new_dropped,' e2e_comparison_performance_details.csv || true
                      return 1
                  fi
              fi
              return 0
          }

          # Run comparisons and capture exit status
          ut_failed=0
          e2e_failed=0
          run_ut_comparison || ut_failed=1
          run_e2e_comparison || e2e_failed=1

          # Aggregate summary files (always do this, even if comparisons failed)
          echo "Aggregating summary files..."
          for file in e2e_comparison.summary.md ut_comparison.summary.md \
                      e2e_comparison.details.md ut_comparison.details.md; do
              if [ -f "$file" ]; then
                  cat "$file" >> "${GITHUB_STEP_SUMMARY}"
              fi
          done

          # Final verdict
          if [ "$ut_failed" -eq 0 ] && [ "$e2e_failed" -eq 0 ]; then
              echo "All comparisons passed."
              exit 0
          else
              echo "Comparisons failed. See details above."
              exit 1
          fi

      - name: Upload Tests Summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.component }}-test-summary
          path: |
            *_comparison*.csv
            *_comparison*.xlsx
            *_comparison*.md
          retention-days: 30
          if-no-files-found: warn
