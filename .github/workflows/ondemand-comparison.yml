name: OnDemand Acceptance Tests

on:
  workflow_dispatch:
    inputs:
      pytorch:
        required: true
        type: string
        default: 'main'
        description: |
          PyTorch version:
          - main (default for source builds)
          - nightly_wheel, test_wheel, release_wheel (for wheel tests)
          - commit/branch/tag
          - repo@commit/repo@branch/repo@tag

      # Component selection
      component:
        required: true
        type: choice
        options:
          - onednn
          - sycltla
          - triton
          - oneapi
        default: 'onednn'
        description: 'Component to compare'

      # Version configuration
      target_version:
        required: true
        type: string
        default: ''
        description: |
          Target component version (new version):
          - commit/branch/tag
          - repo@commit/repo@branch/repo@tag
      baseline_version:
        required: true
        type: string
        default: ''
        description: |
          Baseline component version (reference):
          - commit/branch/tag
          - repo@commit/repo@branch/repo@tag

      # Environment
      python:
        type: string
        default: '3.12'
        description: 'Python version'
      runner:
        type: choice
        options:
          - PVC
          - BMG
        default: 'PVC'
        description: 'What runner to use'

permissions: read-all

run-name: >-
  Acceptance Test / ${{ inputs.component }} (${{ inputs.target_version }} vs ${{ inputs.baseline_version }})

jobs:
  get-runner:
    runs-on: ${{ contains(inputs.runner, 'BMG') && 'bmg-test' || 'pvc_rolling' }}
    outputs:
      runner_id: ${{ steps.runner-info.outputs.runner_id }}
    steps:
      - name: Checkout torch-xpu-ops repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Get runner information and configuration
        id: runner-info
        uses: ./.github/actions/get-runner

  # Run tests on target version
  target-tests:
    needs: get-runner
    permissions: write-all
    uses: ./.github/workflows/_test_call.yml
    with:
      test_role: 'target'
      all_inputs_json: ${{ toJSON(inputs) }}
      runner: ${{ needs.get-runner.outputs.runner_id }}
      windows_runner: 'Windows_CI'
      is_scheduled_run: target-manually
      ut: 'op_p0'
      suite: 'huggingface,timm_models,torchbench'
    secrets: inherit

  # Run tests on baseline version
  baseline-tests:
    needs: get-runner
    permissions: write-all
    uses: ./.github/workflows/_test_call.yml
    with:
      test_role: 'baseline'
      all_inputs_json: ${{ toJSON(inputs) }}
      runner: ${{ needs.get-runner.outputs.runner_id }}
      windows_runner: 'Windows_CI'
      is_scheduled_run: baseline-manually
      ut: 'op_p0'
      suite: 'huggingface,timm_models,torchbench'
    secrets: inherit

  # Job 4: Compare results and generate report
  compare-results:
    needs: [target-tests, baseline-tests]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Target Logs
        uses: actions/download-artifact@v8
        with:
          pattern: 'Inductor-*target*'
          path: ${{ github.workspace }}/results/target

      - name: Download Baseline Logs
        uses: actions/download-artifact@v8
        with:
          pattern: 'Inductor-*baseline*'
          path: ${{ github.workspace }}/results/baseline

      - name: Setup python env
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" sh
          uv venv myvenv --python 3.12 --clear
          source myvenv/bin/activate
          uv pip install pip numpy 'setuptools<81' wheel
          uv pip install numpy pandas pydantic tqdm psutil openpyxl PyGithub

      - name: Compare Test Results
        run: |
          # Activation & environment info
          source myvenv/bin/activate
          python .github/scripts/check-results.py \
              --results-dir ${{ github.workspace }}/results \
              --check \
                  ut_new_fail \
                  acc_new_fail \
                  perf_new_fail perf_dropped

      - name: Upload Tests Summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.component }}-test-summary
          path: |
            *_comparison*.csv
            *_comparison*.xlsx
            *_comparison*.md
          retention-days: 30
          if-no-files-found: warn
