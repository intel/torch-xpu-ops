name: Linux E2E Test

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
        description: Runner label for test execution
      docker_image_name:
        type: string
        default: 'intelgpu/ubuntu-24.04-lts2:2523.40'
        description: Docker image for test environment
      pytorch:
        type: string
        default: main
        description: PyTorch version
      python:
        type: string
        default: '3.10'
        description: Python version
      suite:
        type: string
        default: huggingface
        description: 'Suite: huggingface, timm_models, torchbench, pt2e'
      dt:
        type: string
        default: float32
        description: 'Dtypes: float32, bfloat16, float16, amp_bf16, amp_fp16, int8'
      mode:
        type: string
        default: inference
        description: 'Modes: inference, training'
      scenario:
        type: string
        default: accuracy
        description: 'Scenarios: accuracy, performance'
      model:
        type: string
        required: false
        default: ''
        description: Specific model to test (only this model runs)
      category:
        type: string
        default: default
        description: Category for test comparison
      component:
        type: string
        default: ''
        description: Component name for comparison
      component_version:
        type: string
        default: ''
        description: Component version for comparison

permissions:
  contents: read

defaults:
  run:
    shell: bash -eo pipefail {0}

env:
  GH_TOKEN: ${{ github.token }}
  HF_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
  HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
  DOCKER_REGISTRY_AUTH_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  WORKSPACE: ${{ github.workspace }}

jobs:
  # Resolve runner
  runner:
    name: get-runner
    runs-on: ${{ inputs.runner }}
    outputs:
      runner_id: ${{ steps.runner-info.outputs.runner_id }}
      user_id: ${{ steps.runner-info.outputs.user_id }}
      render_id: ${{ steps.runner-info.outputs.render_id }}
      hostname: ${{ steps.runner-info.outputs.hostname }}
      ze_affinity_mask: ${{ steps.runner-info.outputs.ZE_AFFINITY_MASK }}
    steps:
      - name: Clean workspace
        run: sudo find . -maxdepth 1 ! -name '.' ! -name '..' -exec sudo rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Get runner information
        id: runner-info
        uses: ./.github/actions/get-runner

  # E2E tests
  E2E:
    name: ${{ inputs.suite }}
    needs: runner
    runs-on: ${{ needs.runner.outputs.runner_id }}
    timeout-minutes: 3600
    container:
      image: ${{ inputs.docker_image_name }}
      volumes:
        - ${{ github.workspace }}:${{ github.workspace }}
        - ${{ github.workspace }}/../../.cache:/github/.cache
      options: >-
        --rm
        --device=/dev/mem
        --device=/dev/dri
        --group-add video
        --security-opt seccomp=unconfined
        --cap-add=SYS_PTRACE
        --shm-size=8g
        -u ${{ needs.runner.outputs.user_id }}:${{ needs.runner.outputs.render_id }}
      env:
        ZE_AFFINITY_MASK: ${{ needs.runner.outputs.ze_affinity_mask }}
        AGENT_TOOLSDIRECTORY: /tmp/xpu-tool
    env:
      CATEGORY: ${{ inputs.category }}
      MODEL_ONLY_NAME: ${{ inputs.model }}
      WORKSPACE: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare test environment
        uses: ./.github/actions/linux-testenv
        with:
          pytorch: ${{ inputs.pytorch }}
          python: ${{ inputs.python }}
          suite: ${{ inputs.suite }}
          component: ${{ inputs.component }}
          component_version: ${{ inputs.component_version }}
          category: ${{ inputs.category }}

      - name: Parse suite configuration
        id: parse-suites
        run: |
          IFS=',' read -ra suites <<< "${{ inputs.suite }}"
          for s in "${suites[@]}"; do
            s="${s// /}"
            case "$s" in
              huggingface)  echo "HAS_HUGGINGFACE=1" >> "$GITHUB_OUTPUT" ;;
              timm_models)  echo "HAS_TIMM_MODELS=1" >> "$GITHUB_OUTPUT" ;;
              torchbench)   echo "HAS_TORCHBENCH=1"  >> "$GITHUB_OUTPUT" ;;
              pt2e)         echo "HAS_PT2E=1"        >> "$GITHUB_OUTPUT" ;;
            esac
          done

      # ── CI/CD (pull request) ──────────────────────────────────────────────
      - name: CI/CD — huggingface
        if: inputs.category == 'pr' && steps.parse-suites.outputs.HAS_HUGGINGFACE == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: huggingface
          dt: bfloat16,float16
          mode: training
          scenario: accuracy,performance

      - name: CI/CD — timm_models
        if: inputs.category == 'pr' && steps.parse-suites.outputs.HAS_TIMM_MODELS == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: timm_models
          dt: bfloat16
          mode: training
          scenario: accuracy,performance

      - name: CI/CD — torchbench
        if: inputs.category == 'pr' && steps.parse-suites.outputs.HAS_TORCHBENCH == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: torchbench
          dt: bfloat16
          mode: training
          scenario: accuracy,performance

      # ── Nightly ───────────────────────────────────────────────────────────
      - name: Nightly — huggingface
        if: inputs.category == 'nightly' && steps.parse-suites.outputs.HAS_HUGGINGFACE == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: huggingface
          dt: float32,bfloat16,float16,amp_bf16,amp_fp16
          mode: inference,training
          scenario: accuracy,performance

      - name: Nightly — timm_models
        if: inputs.category == 'nightly' && steps.parse-suites.outputs.HAS_TIMM_MODELS == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: timm_models
          dt: float16,bfloat16
          mode: training
          scenario: accuracy,performance

      - name: Nightly — torchbench
        if: inputs.category == 'nightly' && steps.parse-suites.outputs.HAS_TORCHBENCH == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: torchbench
          dt: float16,bfloat16
          mode: training
          scenario: accuracy,performance

      - name: Nightly — pt2e
        if: inputs.category == 'nightly' && steps.parse-suites.outputs.HAS_PT2E == '1'
        uses: ./.github/actions/pt2e
        with:
          dt: float32,int8
          scenario: accuracy,performance

      # ── Weekly ────────────────────────────────────────────────────────────
      - name: Weekly — huggingface
        if: inputs.category == 'weekly' && steps.parse-suites.outputs.HAS_HUGGINGFACE == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: huggingface
          dt: float32,bfloat16,float16,amp_bf16,amp_fp16
          mode: inference,training
          scenario: accuracy,performance

      - name: Weekly — timm_models
        if: inputs.category == 'weekly' && steps.parse-suites.outputs.HAS_TIMM_MODELS == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: timm_models
          dt: float32,bfloat16,float16,amp_bf16,amp_fp16
          mode: inference,training
          scenario: accuracy,performance

      - name: Weekly — torchbench
        if: inputs.category == 'weekly' && steps.parse-suites.outputs.HAS_TORCHBENCH == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: torchbench
          dt: float32,bfloat16,float16,amp_bf16,amp_fp16
          mode: inference,training
          scenario: accuracy,performance

      - name: Weekly — pt2e
        if: inputs.category == 'weekly' && steps.parse-suites.outputs.HAS_PT2E == '1'
        uses: ./.github/actions/pt2e
        with:
          dt: float32,int8
          scenario: accuracy,performance

      # ── On-demand ─────────────────────────────────────────────────────────
      - name: Parse dtypes for on-demand tests
        id: parse-dtypes
        if: inputs.category == 'ondemand'
        run: |
          # Split dtypes into E2E-valid and PT2E-valid buckets
          E2E="" ; PT2E=""
          IFS=',' read -ra dts <<< "${{ inputs.dt }}"
          for d in "${dts[@]}"; do
            d="${d// /}"
            case "$d" in
              float32|bfloat16|float16|amp_bf16|amp_fp16) E2E="${E2E:+$E2E,}$d" ;;
            esac
            case "$d" in
              float32|int8) PT2E="${PT2E:+$PT2E,}$d" ;;
            esac
          done
          echo "E2E_DTYPES=${E2E:-float32}"   >> "$GITHUB_OUTPUT"
          echo "PT2E_DTYPES=${PT2E:-float32}" >> "$GITHUB_OUTPUT"

      - name: On-demand — huggingface
        if: inputs.category == 'ondemand' && steps.parse-suites.outputs.HAS_HUGGINGFACE == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: huggingface
          dt: ${{ steps.parse-dtypes.outputs.E2E_DTYPES }}
          mode: ${{ inputs.mode }}
          scenario: ${{ inputs.scenario }}

      - name: On-demand — timm_models
        if: inputs.category == 'ondemand' && steps.parse-suites.outputs.HAS_TIMM_MODELS == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: timm_models
          dt: ${{ steps.parse-dtypes.outputs.E2E_DTYPES }}
          mode: ${{ inputs.mode }}
          scenario: ${{ inputs.scenario }}

      - name: On-demand — torchbench
        if: inputs.category == 'ondemand' && steps.parse-suites.outputs.HAS_TORCHBENCH == '1'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: torchbench
          dt: ${{ steps.parse-dtypes.outputs.E2E_DTYPES }}
          mode: ${{ inputs.mode }}
          scenario: ${{ inputs.scenario }}

      - name: On-demand — pt2e
        if: inputs.category == 'ondemand' && steps.parse-suites.outputs.HAS_PT2E == '1'
        uses: ./.github/actions/pt2e
        with:
          dt: ${{ steps.parse-dtypes.outputs.PT2E_DTYPES }}
          scenario: ${{ inputs.scenario }}

      # ── Comparison (target / baseline) ────────────────────────────────────
      - name: Comparison — training
        if: inputs.category == 'target' || inputs.category == 'baseline'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: ${{ inputs.suite }}
          dt: amp_fp16
          mode: training
          scenario: accuracy,performance

      - name: Comparison — inference
        if: inputs.category == 'target' || inputs.category == 'baseline'
        uses: ./.github/actions/linux-e2etest
        with:
          suite: ${{ inputs.suite }}
          dt: bfloat16
          mode: inference
          scenario: accuracy,performance

      # ── Collect & upload artifacts ────────────────────────────────────────
      - name: Collect test artifacts
        id: collect-artifacts
        if: ! cancelled()
        run: |
          LOGS_DIR="${WORKSPACE}/pytorch/inductor_log"
          UPLOAD_DIR="${WORKSPACE}/upload_files"
          rm -rf "${UPLOAD_DIR}" && mkdir -p "${UPLOAD_DIR}"

          if [ -d "${LOGS_DIR}" ]; then
            cp -r "${LOGS_DIR}"/* "${UPLOAD_DIR}/" 2>/dev/null || true
            echo "Collected $(find "${UPLOAD_DIR}" -type f | wc -l) files"
          else
            echo "::warning::No inductor logs at ${LOGS_DIR}"
          fi

      - name: Upload E2E artifacts
        if: ! cancelled() && steps.collect-artifacts.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: Inductor-XPU-E2E-Data-${{ inputs.category }}-${{ github.event.pull_request.number || github.sha }}-${{ inputs.suite }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/upload_files
          retention-days: 7
          if-no-files-found: warn
