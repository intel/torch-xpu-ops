name: Linux Image for Tests

on:
  workflow_dispatch:
    inputs:
      runner:
        type: string
        default: 'BMG-816373'
        description: 'Runner label'
      tag:
        type: string
        required: true
        default: 'intelgpu/manylinux2_28-builder:xpu_2619'
        description: 'Image tag'
      push_to_hub:
        type: boolean
        default: true
        description: 'Whether push image to docker hub or not'

permissions:
  contents: read

defaults:
  run:
    shell: bash -xe {0}
env:
  GH_TOKEN: ${{ github.token }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  WORKFLOW_TAG: ${{ inputs.tag }}
  WORKFLOW_PUSH_TO_HUB: ${{ github.event_name == 'workflow_dispatch' && inputs.push_to_hub || false }}

jobs:
  build-image:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'ubuntu-24.04' }}
    if: ${{ github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Cleanup
        run: |
          # More robust Docker cleanup
          echo "Cleaning up Docker resources..."

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to Docker Hub
        if: env.WORKFLOW_PUSH_TO_HUB == 'true'
        uses: docker/login-action@v3
        with:
          username: intelgpu
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .ci/docker
          file: .ci/docker/ubuntu/Dockerfile
          push: ${{ env.WORKFLOW_PUSH_TO_HUB == 'true' }}
          tags: |
            ${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify and list images
        run: |
          docker images
          echo "Built image: ${{ inputs.tag }}"

      - name: Test the built image
        run: |
          # Run a simple test to ensure the image works
          docker run --rm ${{ inputs.tag }} echo "Image test successful"
