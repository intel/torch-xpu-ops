name: Linux UT Test

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
        description: Runner label
      pytorch:
        type: string
        default: 'main'
        description: Pytorch main by default, or 'commit/branch', or 'repo@commit/repo@branch'
      torch_xpu_ops:
        type: string
        default: 'main'
        description: Torch-xpu-ops version, 'commit/branch', or 'repo@commit/repo@branch', or 'pinned' for pytorch pin
      python:
        type: string
        default: '3.10'
        description: Python version
      ut:
        required: true
        type: string
        description: UT scope. one of `op_regression,op_extended,op_ut,skipped_ut,torch_xpu,op_regression_dev1`

permissions:
  contents: read

defaults:
  run:
    shell: bash -xe {0}
env:
  GH_TOKEN: ${{ github.token }}
  HF_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
  HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
  DOCKER_REGISTRY_AUTH_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  UT_SKIP_ISSUE: 1624
  NEW_PASSED_ISSUE: 2333

jobs:
  runner:
    runs-on: ${{ inputs.runner }}
    name: get-runner
    outputs:
      runner_id: ${{ steps.runner-info.outputs.runner_id }}
      user_id: ${{ steps.runner-info.outputs.user_id }}
      render_id: ${{ steps.runner-info.outputs.render_id }}
      hostname: ${{ steps.runner-info.outputs.hostname }}
      pytest_extra_args: ${{ steps.runner-info.outputs.pytest_extra_args }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Get runner
        id: runner-info
        uses: ./.github/actions/get-runner

  test-in-container:
    needs: runner
    timeout-minutes: 1440
    if: ${{ ! contains(inputs.ut, 'distributed') }}
    runs-on: ${{ needs.runner.outputs.runner_id }}
    container:
      image: intelgpu/ubuntu-24.04-lts2:2523.40
      volumes:
        - ${{ github.workspace }}:${{ github.workspace }}
      options: --device=/dev/mem --device=/dev/dri --group-add video --security-opt seccomp=unconfined --cap-add=SYS_PTRACE --shm-size=8g
              -u ${{ needs.runner.outputs.user_id }}:${{ needs.runner.outputs.render_id }}
              -e ZE_AFFINITY_MASK
      env:
        AGENT_TOOLSDIRECTORY: /tmp/xpu-tool
        PYTEST_ADDOPTS: -v --timeout 600 --timeout_method=thread --max-worker-restart 1000000
                        --only-rerun 'crashed while running' --reruns 2
                        --dist worksteal ${{ needs.runner.outputs.pytest_extra_args }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Prepare test env
        uses: ./.github/actions/linux-testenv
        with:
          pytorch: ${{ inputs.pytorch }}
          torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
          python: ${{ inputs.python }}
      - name: Run XPU UT Test on ${{ needs.runner.outputs.hostname }}
        uses: ./.github/actions/linux-uttest
        with:
          ut_name: ${{ inputs.ut }}
      - name: Upload Inductor XPU UT Log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log
          if-no-files-found: ignore
      - name: Upload XPU UT Failure list
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: XPU-UT-Failure-List-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log/ut_failure_list.csv
          if-no-files-found: ignore

  test-in-baremetal:
    needs: runner
    timeout-minutes: 600
    if: ${{ contains(inputs.ut, 'distributed') }}
    runs-on: ${{ needs.runner.outputs.runner_id }}
    env:
      AGENT_TOOLSDIRECTORY: /tmp/xpu-tool
      PYTEST_ADDOPTS: -v --timeout 3600 --timeout_method=thread -n 1 --max-worker-restart 10000
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Prepare test env
        uses: ./.github/actions/linux-testenv
        with:
          pytorch: ${{ inputs.pytorch }}
          torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
          python: ${{ inputs.python }}
      - name: Run XPU UT Test on ${{ needs.runner.outputs.hostname }}
        uses: ./.github/actions/linux-uttest
        with:
          ut_name: ${{ inputs.ut }}
      - name: Upload Inductor XPU UT Log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log
          if-no-files-found: ignore
      - name: Upload XPU UT Failure list
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: XPU-UT-Failure-List-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log/ut_failure_list.csv
          if-no-files-found: ignore

  summary:
    needs: [test-in-container, test-in-baremetal]
    if: ${{ ! cancelled() && ! (endsWith(needs.test-in-container.result, 'ed') && endsWith(needs.test-in-baremetal.result, 'ed')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Download XPU UT Logs
        uses: actions/download-artifact@v4
        with:
          pattern: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-*
          path: ${{ github.workspace }}/ut_log
      - name: Check UT Results
        id: ut-check
        continue-on-error: true
        run: |
          ls -al ${{ github.workspace }}/ut_log
          cd ${{ github.workspace }}/ut_log/
          latest_dir=$(find . -type d -name "Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-*" |sort -V |tail -n 1)
          cd "${latest_dir}/${{ inputs.ut }}"
          find "${{ github.workspace }}/ut_log" -type f \
              \( -name "failures_*.log" -o \
                -name "passed_*.log" -o \
                -name "category_*.log" -o \
                -name "reproduce_*.log" \) \
              -exec mv {} ./ \; || true
          cp ${{ github.workspace }}/.github/scripts/ut_result_check.sh ./
          # get distributed known issues
          gh --repo intel/torch-xpu-ops issue view $UT_SKIP_ISSUE --json body -q .body |sed -E '/^(#|$)/d' > Known_issue.log.tmp
          # get skipped known issues
          count=$(gh api "search/issues?q=repo:$GITHUB_REPOSITORY+label:skipped+state:open" --jq '.total_count')
          if [ "$count" -gt 0 ]; then
            echo -e "$count issues with skipped label found"
            gh api --paginate "repos/${{ github.repository }}/issues?labels=skipped" \
              --jq '.[] | select(.pull_request == null) | "Issue #\(.number): \(.title)\n\(.body)\n"' > issues.log
          fi
          if [ "${{ inputs.ut }}" == "basic" ];then
            ut_list="op_regression op_extended op_regression_dev1"
          else
            ut_list="${{ inputs.ut }}"
          fi
          for ut_name in ${ut_list}
          do
            cp Known_issue.log.tmp Known_issue.log
            awk -v r="${ut_name}" 'BEGIN{ print_row = 0 }{
              if ( ! ( $0 ~ /[a-zA-Z0-9]/ ) ) { print_row = 0 };
              if ( print_row == 1 && $1 ~ r ) { print $0 };
              if ( $0 ~ /Cases:/ ) { print_row = 1 };
            }' issues.log >> Known_issue.log
            sed -i 's/[[:space:]]*$//g' Known_issue.log
            TEST_PLATFORM=linux bash ut_result_check.sh "${ut_name}" "${{ inputs.pytorch }}"
          done
      - name: Extract new failure errors
        if: ${{ ! cancelled() && steps.ut-check.outcome == 'failure' }}
        id: extract-failures
        run: |
          cd ${{ github.workspace }}/ut_log/
          latest_dir=$(find . -type d -name "Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-*" |sort -V |tail -n 1)
          ut_dir="${latest_dir}/${{ inputs.ut }}"
          # Collect all new failure files
          new_failures_combined="${{ github.workspace }}/ut_log/new_failures_all.txt"
          : > "$new_failures_combined"
          if [ "${{ inputs.ut }}" == "basic" ]; then
            ut_list="op_regression op_extended op_regression_dev1"
          else
            ut_list="${{ inputs.ut }}"
          fi
          for ut_name in ${ut_list}; do
            filtered_file="${ut_dir}/failures_${ut_name}_filtered.log"
            if [ -s "$filtered_file" ]; then
              echo "--- ${ut_name} ---" >> "$new_failures_combined"
              cat "$filtered_file" >> "$new_failures_combined"
            fi
          done
          # Extract error messages from test logs
          error_report="${{ github.workspace }}/ut_log/new_failure_errors.txt"
          if [ -s "$new_failures_combined" ]; then
            # Merge all new failure names (skip header lines)
            grep -v "^---" "$new_failures_combined" | grep -v "^$" > "${{ github.workspace }}/ut_log/new_failure_names.txt" || true
            bash ${{ github.workspace }}/.github/scripts/extract_new_failure_errors.sh \
              "${{ github.workspace }}/ut_log/new_failure_names.txt" \
              "$ut_dir" \
              "$error_report"
            echo "has_new_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new failures found." > "$error_report"
            echo "has_new_failures=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload new failure report
        if: ${{ ! cancelled() && steps.extract-failures.outputs.has_new_failures == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: New-UT-Failures-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ github.workspace }}/ut_log/new_failures_all.txt
            ${{ github.workspace }}/ut_log/new_failure_names.txt
            ${{ github.workspace }}/ut_log/new_failure_errors.txt
      - name: Comment on PR for new failures
        if: ${{ ! cancelled() && github.event_name == 'pull_request' && steps.extract-failures.outputs.has_new_failures == 'true' && contains(github.event.pull_request.labels.*.name, 'ai_generated') }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MERGE_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = context.issue.number;
            const jobUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const ut = '${{ inputs.ut }}';
            const artifactName = `New-UT-Failures-${prNumber}-${ut}-${process.env.GITHUB_RUN_ID}-${process.env.GITHUB_RUN_ATTEMPT}`;

            // Read new failure names
            let failureList = '';
            const namesFile = '${{ github.workspace }}/ut_log/new_failure_names.txt';
            if (fs.existsSync(namesFile)) {
              failureList = fs.readFileSync(namesFile, 'utf8').trim();
            }

            // Read error report (truncate if too large)
            let errorReport = '';
            const errFile = '${{ github.workspace }}/ut_log/new_failure_errors.txt';
            if (fs.existsSync(errFile)) {
              const raw = fs.readFileSync(errFile, 'utf8');
              const maxLen = 50000;
              errorReport = raw.length > maxLen
                ? '... (truncated, see full report in artifact)\n' + raw.slice(-maxLen)
                : raw;
            }

            const body = [
              `@copilot New UT failures detected in **${ut}** tests. Please check these new failures with the artifact link below and analyze whether they are caused by the PR changes.`,
              '',
              '**Important: Do NOT update the plan in the PR description directly. Use reply comments to update the status.**',
              '',
              `Full log: ${jobUrl}`,
              `Artifact: \`${artifactName}\` (download from the Actions run page)`,
              '',
              '**New failures:**',
              '```',
              failureList,
              '```',
              '',
              '<details><summary>Error details</summary>',
              '',
              '```',
              errorReport,
              '```',
              '',
              '</details>',
              '',
              'Instructions:',
              '1. Analyze each new failure and determine if it is caused by PR changes',
              '2. If caused by PR changes, fix those failures on this PR branch directly',
              '3. Add failing test cases with pytest commands in the PR description for the reproducer job to use',
              '4. Use reply comments to report analysis status - do NOT modify the PR description plan directly'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
      - name: Upload Inductor XPU UT Log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log
          overwrite: true
      - name: Fail if UT check failed
        if: ${{ steps.ut-check.outcome == 'failure' }}
        run: |
          echo "::error::UT check failed with new failures"
          exit 1
