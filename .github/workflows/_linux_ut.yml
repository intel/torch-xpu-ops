name: Linux UT Test

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
        description: Runner label for test execution
      docker_image_name:
        type: string
        default: 'intelgpu/ubuntu-24.04-lts2:2523.40'
        description: Docker image for test environment
      pytorch:
        type: string
        default: main
        description: PyTorch version
      torch_xpu_ops:
        type: string
        default: main
        description: Torch-xpu-ops version (or "pinned" for pytorch pin)
      python:
        type: string
        default: '3.10'
        description: Python version
      ut:
        type: string
        required: true
        description: >-
          UT scope: op_regression, op_regression_dev1, op_extended,
          op_ut, skipped_ut, torch_xpu, basic, xpu_distributed, xpu_profiling
      category:
        type: string
        default: default
        description: Category for test comparison
      component:
        type: string
        default: ''
        description: Component name for comparison
      component_version:
        type: string
        default: ''
        description: Component version for comparison

permissions:
  contents: read

defaults:
  run:
    shell: bash -eo pipefail {0}

env:
  GH_TOKEN: ${{ github.token }}
  HF_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
  HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
  DOCKER_REGISTRY_AUTH_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  UT_SKIP_ISSUE: 1624
  NEW_PASSED_ISSUE: 2333
  WORKSPACE: ${{ github.workspace }}

jobs:
  # Resolve runner
  runner:
    name: get-runner
    runs-on: ${{ inputs.runner }}
    outputs:
      runner_id: ${{ steps.runner-info.outputs.runner_id }}
      user_id: ${{ steps.runner-info.outputs.user_id }}
      render_id: ${{ steps.runner-info.outputs.render_id }}
      hostname: ${{ steps.runner-info.outputs.hostname }}
      pytest_extra_args: ${{ steps.runner-info.outputs.pytest_extra_args }}
      ze_affinity_mask: ${{ steps.runner-info.outputs.ZE_AFFINITY_MASK }}
    steps:
      - name: Clean workspace
        run: sudo find . -maxdepth 1 ! -name '.' ! -name '..' -exec sudo rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Get runner information
        id: runner-info
        uses: ./.github/actions/get-runner

  # Unit tests (container)
  UT:
    name: ${{ inputs.ut }}
    needs: runner
    if: ${{ ! contains(inputs.ut, 'distributed') }}
    runs-on: ${{ needs.runner.outputs.runner_id }}
    timeout-minutes: 1440
    container:
      image: ${{ inputs.docker_image_name }}
      volumes:
        - ${{ github.workspace }}:${{ github.workspace }}
        - ${{ github.workspace }}/../../.cache:/github/.cache
      options: >-
        --rm
        --device=/dev/mem
        --device=/dev/dri
        --group-add video
        --security-opt seccomp=unconfined
        --cap-add=SYS_PTRACE
        --shm-size=8g
        -u ${{ needs.runner.outputs.user_id }}:${{ needs.runner.outputs.render_id }}
      env:
        AGENT_TOOLSDIRECTORY: /tmp/xpu-tool
        WORKSPACE: ${{ github.workspace }}
        ZE_AFFINITY_MASK: ${{ needs.runner.outputs.ze_affinity_mask }}
        PYTHONPATH: ${{ github.workspace }}/.github
        PYTEST_ADDOPTS: >-
          -sq -q --tb=short -p scripts.conftest
          --timeout 600 --timeout_method=thread
          --max-worker-restart 1000000
          --dist worksteal
          --only-rerun 'crashed while running' --reruns 2
          ${{ needs.runner.outputs.pytest_extra_args }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare test environment
        uses: ./.github/actions/linux-testenv
        with:
          pytorch: ${{ inputs.pytorch }}
          torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
          python: ${{ inputs.python }}
          suite: ${{ contains(inputs.ut, 'transformers') && 'huggingface' || 'None' }}
          component: ${{ inputs.component }}
          component_version: ${{ inputs.component_version }}
          category: ${{ inputs.category }}

      - name: Run unit tests
        uses: ./.github/actions/linux-uttest
        with:
          ut_name: ${{ inputs.ut }}

      - name: Collect UT logs
        id: collect-logs
        if: ${{ ! cancelled() }}
        run: |
          if [ ! -d "${WORKSPACE}/ut_log" ]; then
            echo "::warning::No UT logs found"
            exit 0
          fi
          echo "Collected $(find "${WORKSPACE}/ut_log" -type f | wc -l) log files"

      - name: Upload UT logs
        if: ${{ ! cancelled() && steps.collect-logs.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: Inductor-XPU-UT-Data-${{ inputs.category }}-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log
          retention-days: 7
          if-no-files-found: ignore

  # Distributed tests (baremetal)
  distributed:
    needs: runner
    if: contains(inputs.ut, 'distributed')
    runs-on: ${{ needs.runner.outputs.runner_id }}
    timeout-minutes: 600
    env:
      AGENT_TOOLSDIRECTORY: /tmp/xpu-tool
      WORKSPACE: ${{ github.workspace }}
      ZE_AFFINITY_MASK: ${{ needs.runner.outputs.ze_affinity_mask }}
      PYTHONPATH: ${{ github.workspace }}/.github
      PYTEST_ADDOPTS: >-
        -sq -q --tb=short -p scripts.conftest
        --timeout 3600 --timeout_method=thread
        -n 1
        --max-worker-restart 10000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare test environment
        uses: ./.github/actions/linux-testenv
        with:
          pytorch: ${{ inputs.pytorch }}
          torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
          python: ${{ inputs.python }}
          suite: None
          component: ${{ inputs.component }}
          component_version: ${{ inputs.component_version }}
          category: ${{ inputs.category }}

      - name: Run distributed tests
        uses: ./.github/actions/linux-uttest
        with:
          ut_name: ${{ inputs.ut }}

      - name: Collect UT logs
        id: collect-logs
        if: ${{ ! cancelled() }}
        run: |
          if [ ! -d "${WORKSPACE}/ut_log" ]; then
            echo "::warning::No UT logs found"
            exit 0
          fi
          echo "Collected $(find "${WORKSPACE}/ut_log" -type f | wc -l) log files"

      - name: Upload UT logs
        if: ${{ ! cancelled() && steps.collect-logs.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: Inductor-XPU-UT-Data-${{ inputs.category }}-${{ github.event.pull_request.number || github.sha }}-${{ inputs.ut }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log
          retention-days: 7
          if-no-files-found: ignore
