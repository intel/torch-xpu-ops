name: Auto Merge PR by Comment with Checks

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      issues: write         # reactions + status comments via GITHUB_TOKEN
      pull-requests: read   # pulls.get/listReviews; merge uses MERGE_TOKEN PAT
      statuses: read
    if: >-
      github.event.issue.pull_request
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      && (startsWith(github.event.comment.body, '/merge -f') || startsWith(github.event.comment.body, '/merge'))
    steps:
      - name: Acknowledge Command
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1'
            });

      - name: Get PR Info
        uses: actions/github-script@v7
        id: prinfo
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number
            });
            core.setOutput('pr_number', pr.data.number);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('mergeable', String(pr.data.mergeable));
            core.setOutput('mergeable_state', pr.data.mergeable_state);

      - name: Check Reviews
        uses: actions/github-script@v7
        id: reviews
        with:
          script: |
            const prNumber = ${{ steps.prinfo.outputs.pr_number }};

            // Paginate to get all reviews
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              }
            );

            // Deduplicate: keep only the latest non-COMMENTED review per user.
            // COMMENTED reviews don't change approval state, so we skip them
            // when determining a user's effective review decision.
            const latestByUser = new Map();
            for (const r of reviews) {
              if (r.state === 'COMMENTED') continue;
              latestByUser.set(r.user.login, r);
            }

            const approvals = [...latestByUser.values()].filter(r => r.state === 'APPROVED');
            core.setOutput('approval_count', approvals.length);

            if (approvals.length < 2) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `❌ Not enough approvals (${approvals.length}/2). At least 2 approvals are required to merge.`
              });
              core.setFailed(`Not enough approvals: ${approvals.length}/2`);
            }

      - name: Check CI Status
        if: ${{ !startsWith(github.event.comment.body, '/merge -f') }}
        uses: actions/github-script@v7
        id: status
        with:
          script: |
            const prNumber = ${{ steps.prinfo.outputs.pr_number }};
            const sha = '${{ steps.prinfo.outputs.head_sha }}';

            // Check both Check Runs and Commit Statuses
            const [checks, statuses] = await Promise.all([
              github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
                per_page: 100
              }),
              github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha
              })
            ]);

            // A workflow can be triggered multiple times on the same commit.
            // Keep only the latest run per check name (by started_at timestamp).
            const latestByName = new Map();
            for (const c of checks.data.check_runs) {
              const existing = latestByName.get(c.name);
              if (!existing || new Date(c.started_at) > new Date(existing.started_at)) {
                latestByName.set(c.name, c);
              }
            }
            const latestChecks = [...latestByName.values()];

            const pending = latestChecks.filter(c => c.status !== 'completed');
            if (pending.length > 0) {
              const names = pending.map(c => c.name).join(', ');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `⏳ Some checks are still running: ${names}. Please wait for them to complete.`
              });
              core.setFailed(`Checks still in progress: ${names}`);
              return;
            }

            // 'neutral' and 'skipped' are acceptable conclusions
            const acceptableConclusions = new Set(['success', 'skipped', 'neutral']);
            const failedChecks = latestChecks
              .filter(c => !acceptableConclusions.has(c.conclusion));
            const statusFailed = statuses.data.state !== 'success' && statuses.data.total_count > 0;

            if (failedChecks.length > 0 || statusFailed) {
              const failedNames = failedChecks.map(c => `${c.name}: ${c.conclusion}`).join(', ');
              const msg = [
                failedChecks.length > 0 ? `Failed checks: ${failedNames}` : '',
                statusFailed ? `Combined commit status: ${statuses.data.state}` : ''
              ].filter(Boolean).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `❌ CI checks have not passed.\n${msg}\n\nUse \`/merge -f\` to force merge (maintainers only).`
              });
              core.setFailed('CI checks failed.');
            }

      - name: Check Merge Conflicts
        uses: actions/github-script@v7
        id: conflict
        with:
          script: |
            const prNumber = ${{ steps.prinfo.outputs.pr_number }};
            const mergeable = '${{ steps.prinfo.outputs.mergeable }}';

            if (mergeable === 'null') {
              // GitHub hasn't computed mergeability yet — retry after a short delay
              await new Promise(r => setTimeout(r, 5000));
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              if (pr.data.mergeable === false || pr.data.mergeable === null) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: '❌ This PR has conflicts with the target branch or mergeability could not be determined. Please resolve conflicts and try again.'
                });
                core.setFailed('PR has merge conflicts or mergeability unknown.');
                return;
              }
            } else if (mergeable === 'false') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '❌ This PR has conflicts with the target branch. Please resolve the conflicts before merging.'
              });
              core.setFailed('PR has merge conflicts.');
            }

      - name: Merge PR
        uses: actions/github-script@v7
        id: merge
        env:
          FORCE_MERGE: ${{ startsWith(github.event.comment.body, '/merge -f') }}
        with:
          github-token: ${{ secrets.MERGE_TOKEN }}
          script: |
            const prNumber = ${{ steps.prinfo.outputs.pr_number }};
            const forceMerge = process.env.FORCE_MERGE === 'true';
            const author = context.payload.comment.user.login;

            if (forceMerge) {
              const authorAssociation = context.payload.comment.author_association;
              if (!['OWNER', 'MEMBER'].includes(authorAssociation)) {
                core.setOutput('merge_result', 'denied');
                core.setOutput('merge_message', '⛔ Only maintainers (OWNER/MEMBER) can force merge. Please contact a maintainer.');
                return;
              }
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              core.setOutput('merge_result', 'success');
              core.setOutput('merge_message', `✅ PR has been successfully merged by @${author}${forceMerge ? ' (force merge)' : ''}.`);
            } catch (e) {
              core.setOutput('merge_result', 'failed');
              core.setOutput('merge_message', `❌ Failed to merge PR: ${e.message}`);
            }

      - name: Report Merge Result
        if: always() && steps.merge.outputs.merge_result
        uses: actions/github-script@v7
        env:
          MERGE_RESULT: ${{ steps.merge.outputs.merge_result }}
          MERGE_MESSAGE: ${{ steps.merge.outputs.merge_message }}
        with:
          script: |
            const prNumber = ${{ steps.prinfo.outputs.pr_number }};
            const result = process.env.MERGE_RESULT;
            const message = process.env.MERGE_MESSAGE;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: message
            });

            if (result !== 'success') {
              core.setFailed(message);
            }
