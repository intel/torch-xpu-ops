name: Torch Nightly WHL Tests

on:
  workflow_dispatch:
    inputs:
      node_name:
        type: string
        default: ''

permissions: read-all

jobs:
  check-nodes-env:
    runs-on: ${{ inputs.node_name }}
    strategy:
      matrix:
        onednn: [v3.8.1, v3.9-rc]
    name: Benchdnn with ${{ matrix.onednn }}
    env:
      ZE_AFFINITY_MASK: 0
    steps:
      - name: Cleanup
        run: |
          sudo rm -rf ./*
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Build
        run: |
          source /opt/intel/oneapi/setvars.sh
          set -xe
          mkdir -p ${{ github.workspace }}/logs
          git clone https://github.com/uxlfoundation/oneDNN ${{ matrix.onednn }}
          cd ${{ matrix.onednn }}
          git checkout ${{ matrix.onednn }}
          git show -s
          mkdir build
          cd build
          export CC=icx
          export CXX=icpx
          cmake .. -DONEDNN_CPU_RUNTIME=SYCL -DONEDNN_GPU_RUNTIME=SYCL 2>&1 |tee ${{ github.workspace }}/logs/build.log
          make -j 192
      - name: Test
        run: |
          source /opt/intel/oneapi/compiler/latest/env/vars.sh
          source /opt/intel/oneapi/pti/latest/env/vars.sh
          source /opt/intel/oneapi/umf/latest/env/vars.sh
          source /opt/intel/oneapi/ccl/latest/env/vars.sh
          source /opt/intel/oneapi/mpi/latest/env/vars.sh
          source /opt/intel/oneapi/tbb/latest/env/vars.sh
          set -xe
          mkdir -p ${{ github.workspace }}/logs
          rsync -avz --delete ${{ github.workspace }}/benchdnn.txt ~/mengfeil/benchdnn.txt
          cd ${{ matrix.onednn }}/build/test/benchdnn
          while read line
          do
            numactl -l -C 0-11 ./benchdnn --mode=P $line |tee -a ${{ github.workspace }}/logs/test.log
          done < ~/mengfeil/benchdnn.txt
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.onednn }}
          path: ${{ github.workspace }}/logs
