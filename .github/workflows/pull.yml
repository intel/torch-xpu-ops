name: pull

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
    branches:
      - main
      - release/*

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Lint, clang-format, and (for AI-generated PRs) reproducer validation.
  preci-lint-check:
    if: ${{ github.repository_owner == 'intel' }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets:
      github-token: ${{ secrets.MERGE_TOKEN }}
    uses: ./.github/workflows/_lint.yml
    with:
      runner: ubuntu-24.04
      python-version: '3.10'
      check-reproducer: ${{ contains(github.event.pull_request.labels.*.name, 'ai_generated') }}

  conditions-filter-win:
    if: >-
      ${{ github.repository_owner == 'intel' && github.event.pull_request.draft == false 
      && !contains(github.event.pull_request.labels.*.name, 'disable_all') 
      && !contains(github.event.pull_request.labels.*.name, 'disable_win') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      src_changed: ${{ steps.check-files.outputs.src_changed }}
    steps:
      - uses: dorny/paths-filter@v3
        id: check-files
        with:
          filters: |
            src_changed: 
              - 'cmake/**'
              - 'tools/**'
              - 'src/**.cmake'
              - 'CMakeLists.txt'
              - 'test/sycl/CMakeLists.txt'
              - 'src/xccl/CMakeLists.txt'
              - 'src/ATen/CMakeLists.txt'
              - 'src/CMakeLists.txt'
              - '.github/workflows/_windows_ut.yml'

  linux-build:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable_all') }}
    needs: [preci-lint-check]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        build: [build]
    uses: ./.github/workflows/_linux_build.yml
    with:
      runner: pvc_rolling
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}

  linux-ut:
    needs: [linux-build]
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable_ut') }}
    secrets: inherit
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        ut_name: [op_ut,basic]
    uses: ./.github/workflows/_linux_ut.yml
    with:
      runner: pvc_rolling
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      torch_xpu_ops: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'pinned' || 'main' }}
      ut: ${{ matrix.ut_name }}

  linux-distributed:
    needs: [linux-build]
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable_distributed') }}
    secrets: inherit
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        ut_name: [xpu_distributed]
    uses: ./.github/workflows/_linux_ut.yml
    with:
      runner: distributed
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      torch_xpu_ops: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'pinned' || 'main' }}
      ut: ${{ matrix.ut_name }}

  linux-e2e:
    name: linux-e2e
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable_e2e') }}
    secrets: inherit
    needs: [linux-build]
    strategy:
      fail-fast: false
      matrix:
        suite: [huggingface, timm_models, torchbench]
    uses: ./.github/workflows/_linux_e2e.yml
    with:
      runner: pvc_rolling
      test_type: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'wheel-cicd' || 'build-cicd' }}
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      suite: ${{ matrix.suite }}
  linux-e2e-summary:
    name: linux-e2e-summary
    needs: [linux-e2e]
    if: ${{ ! cancelled() && ! endsWith(needs.linux-e2e.result, 'ed') }}
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_linux_e2e_summary.yml
    with:
      test_type: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'wheel-cicd' || 'build-cicd' }}

  reproducer-test:
    needs: [linux-build]
    if: ${{ contains(github.event.pull_request.labels.*.name, 'ai_generated') }}
    secrets: inherit
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_linux_reproducer.yml
    with:
      runner: pvc_rolling
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      torch_xpu_ops: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'pinned' || 'main' }}

  windows:
    name: windows
    needs: [conditions-filter-win, preci-lint-check]
    secrets: inherit
    uses: ./.github/workflows/_windows_ut.yml
    with:
      ut: op_extended,test_xpu
      runner: Windows_CI
      build_runner: Windows_CI_Build
      src_changed: ${{ needs.conditions-filter-win.outputs.src_changed }}
      has_label: ${{ contains(github.event.pull_request.labels.*.name, 'windows_ci')}}
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
