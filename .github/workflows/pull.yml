name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches: [main, release/**]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Lint
  preci-lint-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run basic lint checks
        run: |
          export ADDITIONAL_LINTRUNNER_ARGS="--skip CLANGTIDY,CLANGFORMAT,MERGE_CONFLICTLESS_CSV --all-files"
          bash .github/scripts/lintrunner.sh

      - name: Run clang format checks
        run: |
          export ADDITIONAL_LINTRUNNER_ARGS="--take CLANGFORMAT --all-files"
          bash .github/scripts/lintrunner.sh
      - name: Check reproducer exists for AI-generated PR
        if: ${{ contains(github.event.pull_request.labels.*.name, 'ai_generated') }}
        env:
          GH_TOKEN: ${{ secrets.MERGE_TOKEN }}
        run: |
          cd ./torch-xpu-ops
          FAIL_MSG=""
          # Check if reproducer files exist
          if ! ls test/repro/test_*.py 1>/dev/null 2>&1; then
            FAIL_MSG="No reproducer test found. AI-generated PRs must include at least one reproducer in \`test/repro/test_*.py\`."
          else
            # Validate pytest format: must contain test functions or test classes
            VALID=false
            for f in test/repro/test_*.py; do
              if grep -qE '^[[:space:]]*(def test_|class Test)' "$f"; then
                VALID=true
              else
                FAIL_MSG="Reproducer \`$f\` is not in pytest format. It must contain pytest-style test functions (\`def test_...\`) or test classes (\`class Test...\`)."
                break
              fi
            done
            if [ "$VALID" = true ] && [ -z "$FAIL_MSG" ]; then
              echo "All reproducer tests are valid pytest format:"
              ls test/repro/test_*.py
            fi
          fi
          if [ -n "$FAIL_MSG" ]; then
            PR_AUTHOR="${{ github.event.pull_request.user.login }}"
            printf -v COMMENT_BODY '%s\n' \
              "@${PR_AUTHOR} ${FAIL_MSG}" \
              "" \
              "Please ensure your reproducer follows pytest conventions:" \
              "- File name: \`test/repro/test_<description>.py\`" \
              "- Contains \`def test_...()\` functions or \`class Test...\` classes" \
              "- Runnable via \`pytest test/repro/\`"
            gh pr comment ${{ github.event.pull_request.number }} --body "${COMMENT_BODY}"
            echo "::error::${FAIL_MSG}"
            exit 1
          fi

  # Resolve test matrix from labels / path changes
  preci-matrix:
    if: >-
      github.repository_owner == 'intel' &&
      ! github.event.pull_request.draft &&
      ! contains(github.event.pull_request.labels.*.name, 'disable_all')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      ut_list:  ${{ steps.matrix.outputs.ut_list }}
      e2e_list: ${{ steps.matrix.outputs.e2e_list }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            src_changed:
              - 'cmake/**'
              - 'tools/**'
              - 'src/**.cmake'
              - 'CMakeLists.txt'
              - 'test/sycl/CMakeLists.txt'
              - 'src/xccl/CMakeLists.txt'
              - 'src/ATen/CMakeLists.txt'
              - 'src/CMakeLists.txt'
              - '.github/workflows/_windows_ut.yml'

      - name: Compute ut and e2e suite lists
        id: matrix
        env:
          disable_ut: ${{ contains(github.event.pull_request.labels.*.name, 'disable_ut') }}
          disable_e2e: ${{ contains(github.event.pull_request.labels.*.name, 'disable_e2e') }}
          disable_distributed: ${{ contains(github.event.pull_request.labels.*.name, 'disable_distributed') }}
          disable_win: ${{ contains(github.event.pull_request.labels.*.name, 'disable_win') }}
          src_changed: ${{ steps.filter.outputs.src_changed }}
        run: |
          # ── unit-test suites ──
          ut_list="basic,op_ut"
          if [[ "$src_changed" == "true" && "$disable_win" != "true" ]]; then
            ut_list+=",windows"
          fi
          if [[ "$disable_distributed" != "true" ]]; then
            ut_list+=",xpu_distributed"
          fi
          if [[ "$disable_ut" == "true" ]]; then
            ut_list=""
          fi

          # ── e2e suites ──
          if [[ "$disable_e2e" == "true" ]]; then
            e2e_list=""
          else
            e2e_list="huggingface,timm_models,torchbench"
          fi

          echo "ut_list=${ut_list}"   >> "$GITHUB_OUTPUT"
          echo "e2e_list=${e2e_list}" >> "$GITHUB_OUTPUT"

  # Run tests
  preci-tests:
    needs: [preci-lint-check, preci-matrix]
    if: >-
      needs.preci-matrix.outputs.ut_list  != '' ||
      needs.preci-matrix.outputs.e2e_list != ''
    permissions:
      contents: read
      actions: read
      checks: write
      issues: write
    secrets: inherit
    uses: ./.github/workflows/_test_call.yml
    with:
      runner: pvc_rolling
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      torch_xpu_ops: cicd
      python: '3.10'
      ut: ${{ needs.preci-matrix.outputs.ut_list }}
      suite: ${{ needs.preci-matrix.outputs.e2e_list }}
      category: pr
