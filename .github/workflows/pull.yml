name: pull

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - release/*

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preci-lint-check:
    if: ${{ github.repository_owner == 'intel' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    outputs:
      pr_body_cmd: ${{ steps.reproducer-check.outputs.pr_cmd }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
        with:
          path: torch-xpu-ops
      - name: Run lint check
        id: lint-python
        continue-on-error: true
        run: |
          export ADDITIONAL_LINTRUNNER_ARGS="--skip CLANGTIDY,CLANGFORMAT,MERGE_CONFLICTLESS_CSV --all-files"
          cd ./torch-xpu-ops
          set -o pipefail
          bash .github/scripts/lintrunner.sh 2>&1 | tee ${{ github.workspace }}/lint_python_errors.log
      - name: Checkout PyTorch (for headers)
        uses: actions/checkout@v4
        with:
          repository: pytorch/pytorch
          path: pytorch-headers
          fetch-depth: 1
          submodules: false
      - name: Run lint check with Clang
        id: lint-clang
        continue-on-error: true
        env:
          PYTORCH_ROOT: ${{ github.workspace }}/pytorch-headers
        run: |
          cd ./torch-xpu-ops
          export ADDITIONAL_LINTRUNNER_ARGS="--take CLANGFORMAT,CLANGTIDY --all-files"
          set -o pipefail
          bash .github/scripts/lintrunner.sh 2>&1 | tee ${{ github.workspace }}/lint_clang_errors.log
      - name: Comment on lint failure
        if: >-
          ${{ (steps.lint-python.outcome == 'failure' || steps.lint-clang.outcome == 'failure')
          && github.event.pull_request.head.repo.full_name == github.repository
          && (contains(github.event.pull_request.labels.*.name, 'ai_generated')
              || github.event.pull_request.user.login == 'copilot[bot]') }}
        env:
          GH_TOKEN: ${{ secrets.MERGE_TOKEN }}
        run: |
          FAILED_STEPS=""
          if [ "${{ steps.lint-python.outcome }}" = "failure" ]; then
            FAILED_STEPS="Python lint (flake8/ruff)"
          fi
          if [ "${{ steps.lint-clang.outcome }}" = "failure" ]; then
            if [ -n "$FAILED_STEPS" ]; then
              FAILED_STEPS="${FAILED_STEPS} and Clang format"
            else
              FAILED_STEPS="Clang format"
            fi
          fi
          JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          printf -v COMMENT_BODY '%s\n' \
            "@copilot The ${FAILED_STEPS} check failed. Please fix the lint errors in this PR." \
            "" \
            "**Important: Do NOT update the plan in the PR description directly. Use reply comments to update the status.**" \
            "" \
            "Lint job log: ${JOB_URL}" \
            "" \
            "Instructions:" \
            "1. Review the lint failure log via the link above" \
            "2. Fix all lint errors in the relevant source files" \
            "3. Ensure both Python lint and Clang format checks pass" \
            "4. Use reply comments to report progress - do NOT modify the PR description plan directly"
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "${COMMENT_BODY}"
      - name: Fail if lint failed
        if: ${{ steps.lint-python.outcome == 'failure' || steps.lint-clang.outcome == 'failure' }}
        run: |
          echo "::error::Lint check failed. Error details below:"
          if [ "${{ steps.lint-python.outcome }}" = "failure" ]; then
            echo "=== Python lint (flake8/ruff) errors ==="
            cat ${{ github.workspace }}/lint_python_errors.log
          fi
          if [ "${{ steps.lint-clang.outcome }}" = "failure" ]; then
            echo "=== Clang format/tidy errors ==="
            cat ${{ github.workspace }}/lint_clang_errors.log
          fi
          exit 1
      - name: Check reproducer exists for AI-generated PR
        if: ${{ contains(github.event.pull_request.labels.*.name, 'ai_generated') && github.event.pull_request.head.repo.full_name == github.repository }}
        id: reproducer-check
        env:
          GH_TOKEN: ${{ secrets.MERGE_TOKEN }}
        run: |
          cd ./torch-xpu-ops
          FAIL_MSG=""
          HAS_REPRO_FILES=false
          HAS_PR_CMD=false

          # Check if reproducer files exist
          if ls test/repro/test_*.py 1>/dev/null 2>&1; then
            # Validate pytest format
            for f in test/repro/test_*.py; do
              if grep -qE '^[[:space:]]*(def test_|class Test)' "$f"; then
                HAS_REPRO_FILES=true
              else
                FAIL_MSG="Reproducer \`$f\` is not in pytest format. It must contain pytest-style test functions (\`def test_...\`) or test classes (\`class Test...\`)."
                break
              fi
            done
            if [ "$HAS_REPRO_FILES" = true ] && [ -z "$FAIL_MSG" ]; then
              echo "Found valid reproducer files:"
              ls test/repro/test_*.py
            fi
          fi

          # Check if PR description contains pytest commands (lines starting with "pytest")
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body' 2>/dev/null || true)
          PR_CMD=$(echo "$PR_BODY" | tr -d '\r' | grep -E '^pytest ' || true)
          if [ -n "$PR_CMD" ]; then
            HAS_PR_CMD=true
            echo "Found reproducer commands in PR description:"
            echo "$PR_CMD"
          fi

          # Export for later steps
          echo "has_repro_files=$HAS_REPRO_FILES" >> "$GITHUB_OUTPUT"
          echo "has_pr_cmd=$HAS_PR_CMD" >> "$GITHUB_OUTPUT"
          # Use delimiter for multiline output
          echo "pr_cmd<<ENDOFCMD" >> "$GITHUB_OUTPUT"
          echo "$PR_CMD" >> "$GITHUB_OUTPUT"
          echo "ENDOFCMD" >> "$GITHUB_OUTPUT"

          # Fail only if neither source is available
          if [ "$HAS_REPRO_FILES" = false ] && [ "$HAS_PR_CMD" = false ] && [ -z "$FAIL_MSG" ]; then
            FAIL_MSG="No reproducer found. AI-generated PRs must include either reproducer files in \`test/repro/test_*.py\` or pytest commands in the PR description (lines starting with \`pytest\`)."
          fi

          if [ -n "$FAIL_MSG" ]; then
            PR_AUTHOR="${{ github.event.pull_request.user.login }}"
            printf -v COMMENT_BODY '%s\n' \
              "@${PR_AUTHOR} ${FAIL_MSG}" \
              "" \
              "Please provide a reproducer using one of these methods:" \
              "- Add reproducer files: \`test/repro/test_<description>.py\` (pytest format)" \
              "- Add pytest commands in the PR description (lines starting with \`pytest\`, e.g. \`pytest test/xpu/test_ops.py -k test_foo -v\`)"
            gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "${COMMENT_BODY}"
            echo "::error::${FAIL_MSG}"
            exit 1
          fi

  conditions-filter-win:
    if: ${{ github.repository_owner == 'intel' && github.event.pull_request.draft == false && !contains(github.event.pull_request.labels.*.name, 'disable_all') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      src_changed: ${{ steps.check-files.outputs.src_changed }}
    steps:
      - uses: dorny/paths-filter@v3
        id: check-files
        with:
          filters: |
            src_changed: 
              - 'cmake/**'
              - 'tools/**'
              - 'src/**.cmake'
              - 'CMakeLists.txt'
              - 'test/sycl/CMakeLists.txt'
              - 'src/xccl/CMakeLists.txt'
              - 'src/ATen/CMakeLists.txt'
              - 'src/CMakeLists.txt'
              - '.github/workflows/_windows_ut.yml'

  linux-build:
    needs: preci-lint-check
    if: ${{ github.repository_owner == 'intel' && github.event.pull_request.draft == false && !contains(github.event.pull_request.labels.*.name, 'disable_all') }}
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        build: [build]
    uses: ./.github/workflows/_linux_build.yml
    with:
      runner: build
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}

  reproducer-test:
    needs: [linux-build, preci-lint-check]
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable_all') }}
    secrets: inherit
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_linux_reproducer.yml
    with:
      runner: build
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      torch_xpu_ops: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'pinned' || 'main' }}
      pr_body_cmd: ${{ needs.preci-lint-check.outputs.pr_body_cmd }}

  linux-ut:
    needs: [linux-build, reproducer-test]
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable_all') && !contains(github.event.pull_request.labels.*.name, 'disable_ut') }}
    secrets: inherit
    permissions:
      contents: read
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        ut_name: [op_ut,basic]
    uses: ./.github/workflows/_linux_ut.yml
    with:
      runner: pvc
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      torch_xpu_ops: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'pinned' || 'main' }}
      ut: ${{ matrix.ut_name }}

  linux-distributed:
    needs: [linux-build, reproducer-test]
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable_all') && !contains(github.event.pull_request.labels.*.name, 'disable_distributed') }}
    secrets: inherit
    permissions:
      contents: read
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        ut_name: [xpu_distributed]
    uses: ./.github/workflows/_linux_ut.yml
    with:
      runner: distributed
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      torch_xpu_ops: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'pinned' || 'main' }}
      ut: ${{ matrix.ut_name }}

  linux-e2e:
    name: linux-e2e
    needs: [linux-build, reproducer-test]
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'disable_all') && !contains(github.event.pull_request.labels.*.name, 'disable_e2e') }}
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        suite: [huggingface, timm_models, torchbench]
        scenario: [accuracy, performance]
    uses: ./.github/workflows/_linux_e2e.yml
    with:
      runner: ${{ matrix.scenario == 'performance' && 'pvc-1550' || 'pvc' }}
      test_type: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'wheel-cicd' || 'build-cicd' }}
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
      suite: ${{ matrix.suite }}
      scenario: ${{ matrix.scenario }}
  linux-e2e-summary:
    name: linux-e2e-summary
    needs: [linux-e2e]
    if: ${{ !cancelled() && !contains(github.event.pull_request.labels.*.name, 'disable_all') && !endsWith(needs.linux-e2e.result, 'ed') }}
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/_linux_e2e_summary.yml
    with:
      test_type: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'wheel-cicd' || 'build-cicd' }}

  windows-build:
    name: windows-build
    needs: preci-lint-check
    if: >-
      ${{ github.repository_owner == 'intel' && github.event.pull_request.draft == false
      && !contains(github.event.pull_request.labels.*.name, 'disable_all')
      && !contains(github.event.pull_request.labels.*.name, 'disable_win') }}
    secrets: inherit
    uses: ./.github/workflows/_windows_build.yml
    with:
      runner: windows-build
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}

  windows-ut:
    name: windows-ut
    needs: [windows-build, conditions-filter-win]
    if: >-
      ${{ !contains(github.event.pull_request.labels.*.name, 'disable_all')
      && !contains(github.event.pull_request.labels.*.name, 'disable_win')
      && (contains(github.event.pull_request.labels.*.name, 'windows_ci')
      || (!contains(github.event.pull_request.labels.*.name, 'disable_ut')
      && needs.conditions-filter-win.outputs.src_changed == 'true')) }}
    secrets: inherit
    uses: ./.github/workflows/_windows_ut.yml
    with:
      ut: op_extended,test_xpu
      runner: windows-test
      pytorch: ${{ contains(github.event.pull_request.labels.*.name, 'disable_build') && 'nightly_wheel' || github.base_ref }}
