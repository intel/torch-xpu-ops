name: Pull Request

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled
    branches:
      - main
      - release/*

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}
  WORKSPACE: ${{ github.workspace }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  ut: 'basic,op_ut'
  suite: 'huggingface,timm_models,torchbench'

jobs:
  preci-lint-check:
    name: Lint Check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run comprehensive lint checks
        uses: ./.github/actions/lint-check
        with:
          enable_clang: true

  preci-tests:
    name: PreCI Tests
    if: ${{ github.event.pull_request.draft == false }}
    needs: [preci-lint-check]
    uses: ./.github/workflows/_test_call.yml
    permissions: write-all
    with:
      runner: 'pvc_rolling'
      windows_runner: 'Windows_CI'
      is_scheduled_run: pull_request
    secrets: inherit
