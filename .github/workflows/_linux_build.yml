name: Linux PyTorch XPU Build

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
        default: 'pvc_rolling'
        description: Runner label
      pytorch:
        type: string
        default: 'main'
        description: Pytorch main by default, or 'commit/branch', or 'repo@commit/repo@branch'
      torch_xpu_ops:
        type: string
        default: 'main'
        description: Torch-xpu-ops main by default, 'commit/branch', or 'repo@commit/repo@branch', or 'pinned' for pytorch pin
      triton:
        required: false
        type: string
        default: ''
        description: Triton pinned by pytorch by default, or 'commit/branch', or 'repo@commit/repo@branch'
      python:
        type: string
        default: '3.10'
        description: Python version

permissions: read-all

defaults:
  run:
    shell: bash -xe {0}
env:
  DOCKER_REGISTRY_AUTH_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  runner:
    runs-on: ${{ inputs.runner }}
    name: get-runner
    outputs:
      runner_id: ${{ steps.runner-info.outputs.runner_id }}
      user_id: ${{ steps.runner-info.outputs.user_id }}
      render_id: ${{ steps.runner-info.outputs.render_id }}
      hostname: ${{ steps.runner-info.outputs.hostname }}
    steps:
      - name: Cleanup workspace
        run: |
          sudo find ./ |grep -v "^\./$" |xargs sudo rm -rf
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
      - name: Get runner
        id: runner-info
        uses: ./.github/actions/get-runner

  build:
    name: ${{ inputs.pytorch }}
    needs: runner
    if: ${{ ! endsWith(inputs.pytorch, '_wheel') }}
    runs-on: ${{ needs.runner.outputs.runner_id }}
    container:
      image: 'pytorch/manylinux2_28-builder:xpu-main'
      volumes:
        - ${{ github.workspace }}:${{ github.workspace }}
      env:
        PATH: /tmp/xpu-tool/myvenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        AGENT_TOOLSDIRECTORY: /tmp/xpu-tool
        PIP_CACHE_DIR: /tmp/xpu-tool/.pipcache
    env:
      GH_TOKEN: ${{ github.token }}
    timeout-minutes: 300
    steps:
      - name: Install gh-cli
        run: |
          cat /etc/os-release
          hostname && id
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf install -y gh --repo gh-cli
          gh --version
          rm -rf ${{ github.workspace }}/*.whl ${{ github.workspace }}/*.log

      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
        with:
          path: torch-xpu-ops

      - name: Setup python-${{ inputs.python }}
        uses: ./torch-xpu-ops/.github/actions/setup-build-python
        with:
          python-version: ${{ inputs.python }}

      - name: Build Pytorch on ${{ needs.runner.outputs.hostname }}
        uses: ./torch-xpu-ops/.github/actions/build-pytorch-xpu
        with:
          workspace: ${{ github.workspace }}
          torch-xpu-ops-src: ${{ github.workspace }}/torch-xpu-ops
          pytorch: ${{ inputs.pytorch }}
          torch-xpu-ops: ${{ inputs.torch_xpu_ops }}

      - name: Build Torchvision
        uses: ./torch-xpu-ops/.github/actions/build-domain-lib
        with:
          name: torchvision
          repo-url: https://github.com/pytorch/vision.git
          pin-file: vision.txt
          pytorch-src: ${{ github.workspace }}/pytorch
          workspace: ${{ github.workspace }}
          src-dir-name: xpu-vision
          os-packages: libpng-devel libjpeg-devel

      - name: Build Torchaudio
        uses: ./torch-xpu-ops/.github/actions/build-domain-lib
        with:
          name: torchaudio
          repo-url: https://github.com/pytorch/audio.git
          pin-file: audio.txt
          pytorch-src: ${{ github.workspace }}/pytorch
          workspace: ${{ github.workspace }}
          src-dir-name: xpu-audio

      - name: Build Triton
        uses: ./torch-xpu-ops/.github/actions/build-triton-xpu
        with:
          pytorch-src: ${{ github.workspace }}/pytorch
          workspace: ${{ github.workspace }}
          triton: ${{ inputs.triton }}

      - name: Torch Config
        uses: ./torch-xpu-ops/.github/actions/verify-pytorch-build
        with:
          pytorch-src: ${{ github.workspace }}/pytorch

      - name: Upload Torch XPU Wheel
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: Torch-XPU-Wheel-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/*.whl
      - name: Upload Build Log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Torch-XPU-Build-Log-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/build_*.log
      - name: Cleanup workspace
        if: ${{ always() }}
        run: |
          chmod 777 /__w /github ./ -R
