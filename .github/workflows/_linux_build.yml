name: Linux PyTorch XPU Build

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
        description: Runner label for build job
      pytorch:
        type: string
        default: 'release/2.13'
        description: Pytorch release/2.13 by default, or 'commit/branch', or 'repo@commit/repo@branch'
      torch_xpu_ops:
        type: string
        default: 'release/2.13'
        description: Torch-xpu-ops release/2.13 by default, 'commit/branch', or 'repo@commit/repo@branch', or 'pinned' for pytorch pin
      triton:
        required: false
        type: string
        default: ''
        description: Triton pinned by pytorch by default, or 'commit/branch', or 'repo@commit/repo@branch'
      onednn:
        required: false
        type: string
        default: ''
        description: 'oneDNN ref (commit/branch/tag) or `repo@ref`. Empty/`pinned` keeps pytorch default.'
      python:
        type: string
        default: '3.10'
        description: Python version
      category:
        type: string
        default: ''
        description: 'Optional tag (e.g. target/baseline) appended to the wheel artifact name'

permissions: read-all

defaults:
  run:
    shell: bash -xe {0}
env:
  DOCKER_REGISTRY_AUTH_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  build:
    name: ${{ inputs.pytorch }}
    if: ${{ ! endsWith(inputs.pytorch, '_wheel') }}
    runs-on: ${{ inputs.runner }}
    container:
      image: 'ubuntu:24.04'
      volumes:
        - ${{ github.workspace }}:${{ github.workspace }}
      env:
        no_proxy: localhost,laurentides.igk.intel.com
    env:
      GH_TOKEN: ${{ github.token }}
    timeout-minutes: 300
    steps:
      - name: Install gh-cli
        run: |
          cat /etc/os-release
          hostname && id
          # install
          export GCC_VERSION=13
          apt-get update
          apt-get install -y gh gcc g++ gcc-${GCC_VERSION} g++-${GCC_VERSION} build-essential cmake ninja-build pkg-config autoconf automake
          gh --version
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-${GCC_VERSION} 100
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-${GCC_VERSION} 100
          update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-${GCC_VERSION} 100
          gcc -v && g++ -v && gcov -v
          # cleanup files
          rm -rf ${{ github.workspace }}/*.whl ${{ github.workspace }}/*.log

          # install driver
          touch /etc/apt/apt.conf.d/99disable-ssl-verify
          echo 'Acquire::https::Verify-Peer "false";' >> /etc/apt/apt.conf.d/99disable-ssl-verify
          echo 'Acquire::https::Verify-Host "false";' >> /etc/apt/apt.conf.d/99disable-ssl-verify

          apt-get update
          apt-get install wget curl gpg gpg-agent -y
          wget --no-check-certificate -qO - https://laurentides.igk.intel.com/repositories/intel-graphics.key | gpg --yes --dearmor --output /usr/share/keyrings/intel-graphics.gpg
          echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/intel-graphics.gpg] https://laurentides.igk.intel.com/repositories/ubuntu noble/testing-intel-omix-pvc/1.0 unified' | tee /etc/apt/sources.list.d/intel-gpu-noble.list
          apt-get update
          apt-get install -y intel-omix-dev          
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v4
        with:
          path: torch-xpu-ops
      - name: Setup python-${{ inputs.python }}
        uses: ./torch-xpu-ops/.github/actions/setup-python-uv
        with:
          python: ${{ inputs.python }}
          venv: /tmp/xpu-tool/myvenv
      - name: Build Pytorch
        run: |
          export USE_XCCL=0
          export IS_XPU_CI=1
          # only build pvc for CI
          if [ "${{ github.event_name }}" == "pull_request" ];then
            export TORCH_XPU_ARCH_LIST='pvc'
          fi
          if [[ "${{ inputs.pytorch }}" == *"https://"* ]];then
            PYTORCH_REPO="$(echo ${{ inputs.pytorch }} |sed 's/@.*//')"
            PYTORCH_COMMIT="$(echo ${{ inputs.pytorch }} |sed 's/.*@//')"
          else
            PYTORCH_REPO="https://github.com/pytorch/pytorch.git"
            PYTORCH_COMMIT="${{ inputs.pytorch }}"
          fi
          if [[ "${{ inputs.torch_xpu_ops }}" == *"https://"* ]];then
            TORCH_XPU_OPS_REPO="$(echo ${{ inputs.torch_xpu_ops }} |sed 's/@.*//')"
            TORCH_XPU_OPS_COMMIT="$(echo ${{ inputs.torch_xpu_ops }} |sed 's/.*@//')"
          else
            TORCH_XPU_OPS_REPO="https://github.com/intel/torch-xpu-ops.git"
            TORCH_XPU_OPS_COMMIT="${{ inputs.torch_xpu_ops }}"
          fi
          # gcc 13 (configured via update-alternatives on Ubuntu)
          source ${{ github.workspace }}/torch-xpu-ops/.github/scripts/env.sh
          export ONEDNN_COMMIT='${{ inputs.onednn }}'
          ${{ github.workspace }}/torch-xpu-ops/.github/scripts/build.sh \
            --WORKSPACE="${{ github.workspace }}" \
            --PYTORCH_REPO="${PYTORCH_REPO}" \
            --PYTORCH_COMMIT="${PYTORCH_COMMIT}" \
            --TORCH_XPU_OPS_REPO="${TORCH_XPU_OPS_REPO}" \
            --TORCH_XPU_OPS_COMMIT="${TORCH_XPU_OPS_COMMIT}" \
            2>&1 |tee ${{ github.workspace }}/build_pytorch_${PYTORCH_COMMIT//\//-}.log
          if [ $(ls ${{ github.workspace }} |grep -c "torch-.*.whl") -eq 0 ];then
            echo "Build pytorch got failed"
            exit 1
          fi
      - name: Torch Config
        run: |
          printenv
          python -c "import torch; print(torch.__config__.show())"
          python -c "import torch; print(torch.__config__.parallel_info())"
          python -c "import torch; print(torch.__config__.torch.xpu.device_count())"
          python pytorch/torch/utils/collect_env.py
          pip list |grep -E 'torch|intel'
      - name: Upload Torch XPU Wheel
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: Torch-XPU-Wheel-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}${{ inputs.category != '' && format('-{0}', inputs.category) || '' }}
          path: ${{ github.workspace }}/*.whl
      - name: Upload Build Log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: Torch-XPU-Build-Log-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}${{ inputs.category != '' && format('-{0}', inputs.category) || '' }}
          path: ${{ github.workspace }}/build_*.log
      - name: Cleanup workspace
        if: ${{ always() }}
        run: |
          chmod 777 /__w /github ./ -R
