name: Test Workflow Call

on:
  workflow_call:
    inputs:
      # Basic configuration
      all_inputs_json:
        type: string
        description: 'JSON string containing all inputs'

      # Test scope configuration
      ut:
        type: string
        default: ''
        description: |
          Unit test scope (comma-separated):
          - basic: op_regression, op_transformers, op_extended, op_regression_dev1
          - op_regression, op_transformers, op_extended, op_regression_dev1
          - op_ut, skipped_ut, torch_xpu, xpu_profiling, xpu_distributed
          - microbench, windows (special flags)
      suite:
        type: string
        default: ''
        description: |
          E2E test suite (comma-separated):
          - huggingface, timm_models, torchbench, pt2e

      # Comparison configuration
      test_role:
        type: string
        default: 'none'
        description: 'What type actor'

      # Advanced configuration
      runner:
        type: string
        default: 'pvc_rolling'
        description: 'Runner label for Linux tests'
      windows_runner:
        type: string
        default: 'Windows_CI'
        description: 'Runner label for Windows tests'
      is_scheduled_run:
        type: string
        required: true
        description: 'Set to true for scheduled runs (affects build behavior)'

permissions: read-all

jobs:
  parse-inputs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      # Configuration
      test_type: ${{ steps.parse-config.outputs.test_type }}
      pytorch: ${{ steps.parse-config.outputs.pytorch }}
      torch_xpu_ops: ${{ steps.parse-config.outputs.torch_xpu_ops }}
      should_build: ${{ steps.parse-config.outputs.should_build }}

      # Test scope
      ut_list_json: ${{ steps.parse-config.outputs.ut_list_json }}
      suite_list_json: ${{ steps.parse-config.outputs.suite_list_json }}
      dt: ${{ steps.parse-config.outputs.dt }}
      mode: ${{ steps.parse-config.outputs.mode }}
      scenario: ${{ steps.parse-config.outputs.scenario }}
      model_only: ${{ steps.parse-config.outputs.model_only }}

      # Flags
      has_ut_tests: ${{ steps.parse-config.outputs.has_ut_tests }}
      has_e2e_tests: ${{ steps.parse-config.outputs.has_e2e_tests }}
      has_microbench: ${{ steps.parse-config.outputs.has_microbench }}
      has_windows: ${{ steps.parse-config.outputs.has_windows }}

      # Others
      python: ${{ steps.parse-config.outputs.python }}
      test_role: ${{ steps.parse-config.outputs.test_role }}
      component: ${{ steps.parse-config.outputs.component }}
      component_version: ${{ steps.parse-config.outputs.component_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Filter PR conditions and determine configuration
        id: parse-config
        uses: ./.github/actions/conditions-filter
        with:
          pr_number: ${{ github.event.pull_request.number || '' }}
          base_ref: ${{ github.base_ref || '' }}
          all_inputs_json: ${{ inputs.all_inputs_json || '' }}
          is_scheduled_run: ${{ inputs.is_scheduled_run }}
          ut: ${{ inputs.ut }}
          suite: ${{ inputs.suite }}

  linux-build:
    needs: [parse-inputs]
    secrets: inherit
    permissions: write-all
    uses: ./.github/workflows/_linux_build.yml
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ needs.parse-inputs.outputs.pytorch }}
      torch_xpu_ops: ${{ needs.parse-inputs.outputs.torch_xpu_ops }}
      should_build: ${{ needs.parse-inputs.outputs.should_build }}
      python: ${{ needs.parse-inputs.outputs.python }}
      test_role: ${{ needs.parse-inputs.outputs.test_role }}
      component: ${{ needs.parse-inputs.outputs.component }}
      component_version: ${{ needs.parse-inputs.outputs.component_version }}

  linux-ut:
    needs:
      - parse-inputs
      - linux-build
    if: ${{ needs.parse-inputs.outputs.has_ut_tests == 'true' }}
    secrets: inherit
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        ut_name: ${{ fromJSON(needs.parse-inputs.outputs.ut_list_json) }}
    uses: ./.github/workflows/_linux_ut.yml
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ needs.parse-inputs.outputs.pytorch }}
      torch_xpu_ops: ${{ needs.parse-inputs.outputs.torch_xpu_ops }}
      python: ${{ needs.parse-inputs.outputs.python }}
      test_role: ${{ needs.parse-inputs.outputs.test_role }}
      component: ${{ needs.parse-inputs.outputs.component }}
      component_version: ${{ needs.parse-inputs.outputs.component_version }}
      ut: ${{ matrix.ut_name }}

  linux-e2e:
    needs:
      - parse-inputs
      - linux-build
    if: ${{ needs.parse-inputs.outputs.has_e2e_tests == 'true' }}
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.parse-inputs.outputs.suite_list_json) }}
    uses: ./.github/workflows/_linux_e2e.yml
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ needs.parse-inputs.outputs.pytorch }}
      python: ${{ needs.parse-inputs.outputs.python }}
      test_role: ${{ needs.parse-inputs.outputs.test_role }}
      component: ${{ needs.parse-inputs.outputs.component }}
      component_version: ${{ needs.parse-inputs.outputs.component_version }}
      suite: ${{ matrix.suite }}
      dt: ${{ needs.parse-inputs.outputs.dt }}
      mode: ${{ needs.parse-inputs.outputs.mode }}
      scenario: ${{ needs.parse-inputs.outputs.scenario }}
      model: ${{ needs.parse-inputs.outputs.model_only }}

  linux-microbench:
    needs:
      - parse-inputs
      - linux-build
    if: ${{ needs.parse-inputs.outputs.has_microbench == 'true' }}
    secrets: inherit
    uses: ./.github/workflows/_linux_op_benchmark.yml
    permissions: write-all
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ needs.parse-inputs.outputs.pytorch }}
      python: ${{ needs.parse-inputs.outputs.python }}

  windows-ut:
    needs: [parse-inputs]
    if: ${{ needs.parse-inputs.outputs.has_windows == 'true' }}
    secrets: inherit
    uses: ./.github/workflows/_windows_ut.yml
    with:
      ut: 'op_extended,test_xpu,op_ut_windows'
      python: ${{ needs.parse-inputs.outputs.python }}
      src_changed: false
      has_label: true
      runner: ${{ inputs.windows_runner }}
      torch_xpu_ops: ${{ needs.parse-inputs.outputs.torch_xpu_ops }}
      pytorch: ${{ needs.parse-inputs.outputs.pytorch }}

  # ----------------------------------------------------------------------
  # Compare-results job
  # ----------------------------------------------------------------------
  compare-results:
    if: ${{ inputs.is_scheduled_run != 'comparison-manually' && ! cancelled() }}
    needs:
      - parse-inputs
      - linux-ut
      - linux-e2e
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      # Configurable via workflow inputs
      BASELINE_ISSUE_ID: 1645
      ISSUE_PREFIX: 'PVC -'
      BASELINE_SUFFIXES: 'weekly,nightly'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # ------------------------------------------------------------
      # Step 0: Download target logs
      # ------------------------------------------------------------
      - name: Download Target Logs
        uses: actions/download-artifact@v8
        with:
          pattern: 'Inductor-*'
          path: ${{ github.workspace }}/results/target
          merge-multiple: true

      # ------------------------------------------------------------
      # Step 1: Determine baseline artifact type and if this run is itself a baseline
      # ------------------------------------------------------------
      - name: Determine Baseline Artifact Type
        id: determine_type
        run: |
          TEST_TYPE="${{ needs.parse-inputs.outputs.test_type }}"
          EVENT_NAME="${{ github.event_name }}"
          IFS=',' read -ra SUFFIXES <<< "${{ env.BASELINE_SUFFIXES }}"

          # Build a regex pattern from the suffixes (e.g., (weekly|nightly)$)
          REGEX="($(IFS='|'; echo "${SUFFIXES[*]}"))$"

          # Check if the current test_type is a baseline run (ends with any suffix)
          IS_BASELINE=false
          if [[ "${TEST_TYPE}" =~ $REGEX ]]; then
            IS_BASELINE=true
          fi
          echo "is_baseline=${IS_BASELINE}" >> $GITHUB_OUTPUT

          # Determine which baseline artifact to fetch
          base="${TEST_TYPE%%-*}"
          if [[ "${TEST_TYPE}" =~ $REGEX ]]; then
            # If test_type already ends with a known suffix, use it as-is
            artifact_type="${TEST_TYPE}"
          elif [ "${EVENT_NAME}" == "pull_request" ]; then
            artifact_type="${base}-nightly"
          else
            artifact_type="${base}-weekly"
          fi
          echo "artifact_type=${artifact_type}" >> $GITHUB_OUTPUT
          echo "Derived artifact type: ${artifact_type}"

      # ------------------------------------------------------------
      # Step 2: Fetch baseline run ID from the issue (continues if not found)
      # ------------------------------------------------------------
      - name: Fetch Baseline Run ID from Issue
        id: baseline
        continue-on-error: true   # Job continues even if issue fetch fails
        run: |
          BASELINE_ISSUE_ID="${{ env.BASELINE_ISSUE_ID }}"
          ISSUE_PREFIX="${{ env.ISSUE_PREFIX }}"
          ARTIFACT_TYPE="${{ steps.determine_type.outputs.artifact_type }}"

          # Fetch issue body
          if ! gh --repo "${{ github.repository }}" issue view "${BASELINE_ISSUE_ID}" --json body -q .body > body.txt 2>&1; then
            echo "::warning::Failed to fetch issue ${BASELINE_ISSUE_ID}. Continuing without baseline."
            echo "BASELINE_RUN_ID=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract run ID for the artifact type
          BASELINE_RUN_ID="$(grep -i "^${ISSUE_PREFIX}${ARTIFACT_TYPE}:" body.txt | sed 's/.*: *//' | head -1 || true)"

          if [ -z "${BASELINE_RUN_ID}" ]; then
            echo "::warning::No baseline run ID found for ${ARTIFACT_TYPE} in issue #${BASELINE_ISSUE_ID}. Continuing without baseline."
          else
            echo "Found baseline run ID: ${BASELINE_RUN_ID}"
          fi

          echo "BASELINE_RUN_ID=${BASELINE_RUN_ID}" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # Step 3: Download baseline logs only if a run ID was found
      # ------------------------------------------------------------
      - name: Download Baseline Logs
        if: steps.baseline.outputs.BASELINE_RUN_ID != ''
        uses: actions/download-artifact@v8
        with:
          pattern: 'Inductor-*'
          path: ${{ github.workspace }}/results/baseline
          merge-multiple: true
          run-id: ${{ steps.baseline.outputs.BASELINE_RUN_ID }}

      # ------------------------------------------------------------
      # Step 4: Set up Python environment (unchanged)
      # ------------------------------------------------------------
      - name: Setup Python Environment
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" sh
          uv venv myvenv --python 3.12 --clear
          source myvenv/bin/activate
          uv pip install pip numpy 'setuptools<81' wheel
          uv pip install numpy pandas pydantic tqdm psutil openpyxl PyGithub

      # ------------------------------------------------------------
      # Step 5: Update baseline issue if this run is itself a baseline
      # ------------------------------------------------------------
      - name: Update Baseline Run ID
        if: steps.determine_type.outputs.is_baseline == 'true' && success()
        env:
          BASELINE_ISSUE_ID: ${{ env.BASELINE_ISSUE_ID }}
          ISSUE_PREFIX: ${{ env.ISSUE_PREFIX }}
          ARTIFACT_TYPE: ${{ steps.determine_type.outputs.artifact_type }}
          NEW_RUN_ID: ${{ github.run_id }}
        run: |
          echo "Updating baseline for artifact type: ${ARTIFACT_TYPE} with run ID: ${NEW_RUN_ID}"

          # Fetch current issue body
          if ! gh --repo "${{ github.repository }}" issue view "${BASELINE_ISSUE_ID}" --json body -q .body > new_body.txt 2>&1; then
            echo "::error::Failed to fetch issue ${BASELINE_ISSUE_ID}"
            exit 1
          fi

          # Check if line already exists
          line_pattern="^${ISSUE_PREFIX}${ARTIFACT_TYPE}:"
          if grep -q "${line_pattern}" new_body.txt; then
            # Replace the line
            sed -i "s|${line_pattern}.*|${ISSUE_PREFIX}${ARTIFACT_TYPE}: ${NEW_RUN_ID}|" new_body.txt
            echo "Updated existing baseline entry for ${ARTIFACT_TYPE}"
          else
            # Append new line
            echo "${ISSUE_PREFIX}${ARTIFACT_TYPE}: ${NEW_RUN_ID}" >> new_body.txt
            echo "Appended new baseline entry for ${ARTIFACT_TYPE}"
          fi

          # Update issue body
          if ! gh --repo "${{ github.repository }}" issue edit "${BASELINE_ISSUE_ID}" --body-file new_body.txt; then
            echo "::error::Failed to update issue ${BASELINE_ISSUE_ID}"
            exit 1
          fi

          echo "Successfully updated baseline run ID for ${ARTIFACT_TYPE} in issue #${BASELINE_ISSUE_ID}"

      # ------------------------------------------------------------
      # Step 6: Run comparison scripts and append summaries
      # ------------------------------------------------------------
      - name: Setup python env
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" sh
          uv venv myvenv --python 3.12 --clear
          source myvenv/bin/activate
          uv pip install pip numpy 'setuptools<81' wheel
          uv pip install numpy pandas pydantic tqdm psutil openpyxl PyGithub
      - name: Compare Test Results
        run: |
          # Activation & environment info
          source myvenv/bin/activate
          echo "Comparing results for ${{ needs.parse-inputs.outputs.component }}..."
          echo "Target: ${{ github.run_id }}"
          echo "Baseline: ${{ steps.baseline.outputs.BASELINE_RUN_ID }}"

          # Check for results directory
          if [ ! -d "./results" ]; then
              echo "Error: No results directory found after test!"
              exit 1
          fi

          # Debug: list downloaded files
          find results

          # Function: run unit test comparison
          # Returns: 0 if no new failures, 1 otherwise
          run_ut_comparison() {
              echo "Running unit test comparison..."
              python .github/scripts/compare-ut.py \
                  --input results/ \
                  --output ut_comparison.csv \
                  --markdown \
                  --markdown-output ut_comparison.md || true

              if [ -f "ut_comparison_new_failures.csv" ]; then
                  # Count failures (skip header row)
                  local ut_failed_count
                  ut_failed_count=$(tail -n +2 ut_comparison_new_failures.csv 2>/dev/null | wc -l)
                  if [ "$ut_failed_count" -gt 0 ]; then
                      echo "Unit test failures detected: $ut_failed_count new failed cases."
                      # Print the failing lines for visibility
                      tail -n +2 ut_comparison_new_failures.csv
                      return 1
                  fi
              fi
              return 0
          }

          # Function: run end-to-end comparison
          # Returns: 0 if no new failures or drops, 1 otherwise
          run_e2e_comparison() {
              echo "Running E2E comparison..."
              python .github/scripts/compare-e2e.py \
                  -t results/target \
                  -b results/baseline \
                  -o e2e_comparison.csv \
                  -m e2e_comparison.md || true

              if [ -f "e2e_comparison_*_details.csv" ]; then
                  local e2e_failed_count e2e_dropped_count
                  e2e_failed_count=$(grep -c ',new_failed,' e2e_comparison_*_details.csv 2>/dev/null || true)
                  e2e_dropped_count=$(grep -c ',new_dropped,' e2e_comparison_performance_details.csv 2>/dev/null || true)

                  if [ "$e2e_failed_count" -ne 0 ]; then
                      echo "E2E failures detected: $e2e_failed_count new failed cases."
                      grep ',new_failed,' e2e_comparison_*_details.csv || true
                      return 1
                  fi

                  if [ "$e2e_dropped_count" -ne 0 ]; then
                      echo "E2E dropped cases detected: $e2e_dropped_count new dropped cases."
                      grep ',new_dropped,' e2e_comparison_performance_details.csv || true
                      return 1
                  fi
                  bash -e ./.github/scripts/e2e_summary.sh ./target ./baseline
                  if [ -e /tmp/tmp-acc-result.txt ];then
                    acc_failed=$(awk 'BEGIN{sum=0}{if($2>0){sum++}}END{print sum}' /tmp/tmp-acc-result.txt)
                    grep -E "(Real failed|to passed|Warning timeout).*: [1-9]|Summary for" /tmp/tmp-*.txt |grep -E "failed|passed|timeout" -B 1
                    return ${acc_failed}
                  fi
              fi
              return 0
          }

          # Run comparisons and capture exit status
          ut_failed=0
          e2e_failed=0
          run_ut_comparison || ut_failed=1
          run_e2e_comparison || e2e_failed=1

          # Aggregate summary files (always do this, even if comparisons failed)
          echo "Aggregating summary files..."
          for file in e2e_comparison.summary.md ut_comparison.summary.md \
                      e2e_comparison.details.md ut_comparison.details.md; do
              if [ -f "$file" ]; then
                  cat "$file" >> "${GITHUB_STEP_SUMMARY}"
              fi
          done

          # Final verdict
          if [ "$ut_failed" -eq 0 ] && [ "$e2e_failed" -eq 0 ]; then
              echo "All comparisons passed."
              exit 0
          else
              echo "Comparisons failed. See details above."
              exit 1
          fi

      # ------------------------------------------------------------
      # Step 7: Upload comparison summaries (always)
      # ------------------------------------------------------------
      - name: Upload Tests Summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.parse-inputs.outputs.component }}-test-summary
          path: |
            *_comparison*.csv
            *_comparison*.xlsx
            *_comparison*.md
          retention-days: 30
          if-no-files-found: warn
