name: Test Workflow Call

on:
  workflow_call:
    inputs:
      # ----- Basic Configuration -----
      pytorch:
        type: string
        required: true
        default: ''
        description: 'PyTorch version'
      torch_xpu_ops:
        type: string
        required: false
        default: ''
        description: 'Torch-xpu-ops version'
      runner:
        type: string
        required: true
        description: 'What runner to use'
      python:
        type: string
        required: true
        description: 'Python version'

      # ----- Component Build (Optional) -----
      component:
        type: string
        required: false
        default: ''
        description: 'Optional component to build'
      component_version:
        type: string
        required: false
        default: ''
        description: 'Optional component version to build'

      # ----- Unit Tests -----
      ut:
        type: string
        required: false
        default: ''
        description: 'Unit test scope (comma-separated)'

      # ----- E2E Parameters -----
      suite:
        type: string
        required: false
        default: ''
        description: 'E2E test suites (comma-separated)'
      dt:
        type: string
        required: false
        default: ''
        description: 'E2E test dtypes (comma-separated)'
      mode:
        type: string
        required: false
        default: ''
        description: 'E2E test modes (comma-separated)'
      scenario:
        type: string
        required: false
        default: ''
        description: 'E2E test scenarios (comma-separated)'
      model:
        type: string
        required: false
        default: ''
        description: 'E2E test specific models name (if need, comma-separated)'

      # ----- Comparison Parameters -----
      category:
        type: string
        required: false
        default: ''
        description: 'Distinguish the target or baseline'

permissions: read-all

jobs:
  tests-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      ut_list_json:  ${{ steps.matrix.outputs.ut_list_json }}
      e2e_list_json: ${{ steps.matrix.outputs.e2e_list_json }}
    steps:
      - name: Compute ut and e2e suite lists
        id: matrix
        run: |
          get_json_array() {
            local input="$1"
            if [ -z "$input" ]; then
              echo "[]"
            else
              json="["; sep=""
              IFS=','; for x in $1; do
                x="${x## }"; x="${x%% }"
                [[ "$x" == "windows" || "$x" == "microbench" || -z "$x" ]] && continue
                json+="${sep}\"${x}\""; sep=","
              done; unset IFS
              json+="]"
              echo "$json"
            fi
          }

          # ── tests matrix ──
          ut_list_json="$(get_json_array "${{ inputs.ut }}")"
          e2e_list_json="$(get_json_array "${{ inputs.suite }}")"

          # ── set outputs ──
          echo "ut_list_json=${ut_list_json}" >> $GITHUB_OUTPUT
          echo "e2e_list_json=${e2e_list_json}" >> $GITHUB_OUTPUT

  linux-build:
    secrets: inherit
    permissions: write-all
    uses: ./.github/workflows/_linux_build.yml
    with:
      runner: ${{ inputs.runner }}
      python: ${{ inputs.python }}
      pytorch: ${{ inputs.pytorch }}
      torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
      category: ${{ inputs.category }}
      component: ${{ inputs.component }}
      component_version: ${{ inputs.component_version }}

  linux-ut:
    needs: [linux-build, tests-matrix]
    if: needs.tests-matrix.outputs.ut_list_json != '[]'
    secrets: inherit
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        ut_name: ${{ toJson(needs.tests-matrix.outputs.ut_list_json) }}
    uses: ./.github/workflows/_linux_ut.yml
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ inputs.pytorch }}
      torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
      python: ${{ inputs.python }}
      ut: ${{ matrix.ut_name }}
      category: ${{ inputs.category }}
      component: ${{ inputs.component }}
      component_version: ${{ inputs.component_version }}

  linux-e2e:
    needs: [linux-build, tests-matrix]
    if: needs.tests-matrix.outputs.e2e_list_json != '[]'
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ toJson(needs.tests-matrix.outputs.e2e_list_json) }}
    uses: ./.github/workflows/_linux_e2e.yml
    with:
      runner: ${{ inputs.runner }}
      test_type: ${{ inputs.test_type }}
      pytorch: ${{ inputs.pytorch }}
      python: ${{ inputs.python }}
      suite: ${{ matrix.suite }}
      dt: ${{ inputs.dt }}
      mode: ${{ inputs.mode }}
      scenario: ${{ inputs.scenario }}
      model: ${{ inputs.model }}
      category: ${{ inputs.category }}
      component: ${{ inputs.component }}
      component_version: ${{ inputs.component_version }}

  linux-microbench:
    needs:
      - linux-build
    if: contains(inputs.ut, 'microbench')
    secrets: inherit
    uses: ./.github/workflows/_linux_op_benchmark.yml
    permissions: write-all
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ inputs.pytorch }}
      python: ${{ inputs.python }}

  windows-ut:
    if: contains(inputs.ut, 'windows')
    secrets: inherit
    uses: ./.github/workflows/_windows_ut.yml
    with:
      ut: 'op_extended,test_xpu,op_ut_windows'
      python: ${{ inputs.python }}
      src_changed: false
      has_label: true
      build_runner: Windows_CI_Build
      runner: Windows_CI
      torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
      pytorch: ${{ inputs.pytorch }}

  # Compare-results job
  compare-results:
    if: ${{ inputs.category == '' && ! cancelled() }}
    needs:
      - linux-ut
      - linux-e2e
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      # Configurable via workflow inputs
      BASELINE_ISSUE_ID: 1645
      ISSUE_PREFIX: 'PVC -'
      BASELINE_SUFFIXES: 'weekly,nightly'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Step 0: Download target logs
      - name: Download Target Logs
        uses: actions/download-artifact@v8
        with:
          pattern: 'Inductor-*'
          path: ${{ github.workspace }}/results/target

      # Step 1: Determine baseline artifact type and if this run is itself a baseline
      - name: Determine Baseline Artifact Type
        id: determine_type
        run: |
          if [ "${{ inputs.pytorch }}" == "" ];then
          else
          fi
          TEST_TYPE="${{ inputs.test_type }}"
          EVENT_NAME="${{ github.event_name }}"
          IFS=',' read -ra SUFFIXES <<< "${{ env.BASELINE_SUFFIXES }}"

          # Build a regex pattern from the suffixes (e.g., (weekly|nightly)$)
          REGEX="($(IFS='|'; echo "${SUFFIXES[*]}"))$"

          # Check if the current test_type is a baseline run (ends with any suffix)
          IS_BASELINE=false
          if [[ "${TEST_TYPE}" =~ $REGEX ]]; then
            IS_BASELINE=true
          fi
          echo "is_baseline=${IS_BASELINE}" >> $GITHUB_OUTPUT

          # Determine which baseline artifact to fetch
          base="${TEST_TYPE%%-*}"
          if [[ "${TEST_TYPE}" =~ $REGEX ]]; then
            # If test_type already ends with a known suffix, use it as-is
            artifact_type="${TEST_TYPE}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            artifact_type="${base}-nightly"
          else
            artifact_type="${base}-weekly"
          fi
          echo "artifact_type=${artifact_type}" >> $GITHUB_OUTPUT
          echo "Derived artifact type: ${artifact_type}"

      # Step 2: Fetch baseline run ID from the issue (continues if not found)
      - name: Fetch Baseline Run ID from Issue
        id: baseline
        continue-on-error: true   # Job continues even if issue fetch fails
        run: |
          BASELINE_ISSUE_ID="${{ env.BASELINE_ISSUE_ID }}"
          ISSUE_PREFIX="${{ env.ISSUE_PREFIX }}"
          ARTIFACT_TYPE="${{ steps.determine_type.outputs.artifact_type }}"

          # Fetch issue body
          if ! gh --repo "${{ github.repository }}" issue view "${BASELINE_ISSUE_ID}" --json body -q .body > body.txt 2>&1; then
            echo "::warning::Failed to fetch issue ${BASELINE_ISSUE_ID}. Continuing without baseline."
            echo "BASELINE_RUN_ID=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract run ID for the artifact type
          BASELINE_RUN_ID="$(grep -i "^${ISSUE_PREFIX}${ARTIFACT_TYPE}:" body.txt | sed 's/.*: *//' | head -1 || true)"

          if [ -z "${BASELINE_RUN_ID}" ]; then
            echo "::warning::No baseline run ID found for ${ARTIFACT_TYPE} in issue #${BASELINE_ISSUE_ID}. Continuing without baseline."
          else
            echo "Found baseline run ID: ${BASELINE_RUN_ID}"
          fi

          echo "BASELINE_RUN_ID=${BASELINE_RUN_ID}" >> $GITHUB_OUTPUT

      # Step 3: Download baseline logs only if a run ID was found
      - name: Download Baseline Logs
        if: steps.baseline.outputs.BASELINE_RUN_ID != ''
        uses: actions/download-artifact@v8
        with:
          pattern: 'Inductor-*'
          path: ${{ github.workspace }}/results/baseline
          run-id: ${{ steps.baseline.outputs.BASELINE_RUN_ID }}
          github-token: ${{ github.token }} # must set if run-id or repository different

      # Step 4: Set up Python environment (unchanged)
      - name: Setup Python Environment
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" sh
          uv venv myvenv --python 3.10 --clear
          source myvenv/bin/activate
          uv pip install pip numpy 'setuptools<81' wheel
          uv pip install numpy pandas pydantic tqdm psutil openpyxl PyGithub

      # Step 5: Update baseline issue if this run is itself a baseline
      - name: Update Baseline Run ID
        if: steps.determine_type.outputs.is_baseline == 'true' && success()
        env:
          BASELINE_ISSUE_ID: ${{ env.BASELINE_ISSUE_ID }}
          ISSUE_PREFIX: ${{ env.ISSUE_PREFIX }}
          ARTIFACT_TYPE: ${{ steps.determine_type.outputs.artifact_type }}
          NEW_RUN_ID: ${{ github.run_id }}
        run: |
          echo "Updating baseline for artifact type: ${ARTIFACT_TYPE} with run ID: ${NEW_RUN_ID}"

          # Fetch current issue body
          if ! gh --repo "${{ github.repository }}" issue view "${BASELINE_ISSUE_ID}" --json body -q .body > new_body.txt 2>&1; then
            echo "::error::Failed to fetch issue ${BASELINE_ISSUE_ID}"
            exit 1
          fi

          # Check if line already exists
          line_pattern="^${ISSUE_PREFIX}${ARTIFACT_TYPE}:"
          if grep -q "${line_pattern}" new_body.txt; then
            # Replace the line
            sed -i "s|${line_pattern}.*|${ISSUE_PREFIX}${ARTIFACT_TYPE}: ${NEW_RUN_ID}|" new_body.txt
            echo "Updated existing baseline entry for ${ARTIFACT_TYPE}"
          else
            # Append new line
            echo "${ISSUE_PREFIX}${ARTIFACT_TYPE}: ${NEW_RUN_ID}" >> new_body.txt
            echo "Appended new baseline entry for ${ARTIFACT_TYPE}"
          fi

          # Update issue body
          if ! gh --repo "${{ github.repository }}" issue edit "${BASELINE_ISSUE_ID}" --body-file new_body.txt; then
            echo "::error::Failed to update issue ${BASELINE_ISSUE_ID}"
            exit 1
          fi

          echo "Successfully updated baseline run ID for ${ARTIFACT_TYPE} in issue #${BASELINE_ISSUE_ID}"

      # Step 6: Run comparison scripts and append summaries
      - name: Setup python env
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/usr/local/bin" sh
          uv venv myvenv --python 3.10 --clear
          source myvenv/bin/activate
          uv pip install pip numpy setuptools wheel
          uv pip install numpy pandas pydantic tqdm psutil openpyxl PyGithub
      - name: Compare Test Results
        run: |
          # Activation & environment info
          source myvenv/bin/activate

          exit_label=0
          if [ "${{ github.event_name }}" == "pull_request" ];then
            python .github/scripts/check-results.py --results-dir ${{ github.workspace }}/results || exit_label=1
          else
            python .github/scripts/check-results.py
                --results-dir ${{ github.workspace }}/results \
                --check \
                    ut_new_fail ut_untracked_fail ut_tracked_pass \
                    acc_new_fail acc_untracked_fail \
                    perf_new_fail perf_dropped || exit_label=1
          fi

          # Aggregate summary files (always do this, even if comparisons failed)
          echo "Aggregating summary files..."
          for file in e2e_comparison.summary.md ut_comparison.summary.md \
                      e2e_comparison.details.md ut_comparison.details.md; do
              if [ -f "$file" ]; then
                  cat "$file" >> "${GITHUB_STEP_SUMMARY}"
              fi
          done

          exit $exit_label

      # Step 7: Upload comparison summaries (always)
      - name: Upload Tests Summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.component }}-test-summary
          path: |
            *_comparison*.csv
            *_comparison*.xlsx
            *_comparison*.md
          retention-days: 30
          if-no-files-found: warn
