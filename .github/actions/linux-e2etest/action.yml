name: Linux E2E Test
description: Run Inductor E2E tests across suite/dt/mode/scenario combinations with multi-GPU sharding

inputs:
  suite:
    required: true
    description: 'Suite: huggingface, timm_models, torchbench'
  dt:
    required: true
    description: 'Dtypes: float32, bfloat16, float16, amp_bf16, amp_fp16'
  mode:
    required: true
    description: 'Modes: inference, training'
  scenario:
    required: true
    description: 'Scenarios: accuracy, performance'

runs:
  using: composite
  steps:
    - name: Log environment
      shell: bash -eo pipefail {0}
      run: |
        python -V 2>&1
        pip list --format=columns 2>/dev/null || true
        printenv | sort | tee -a "${GITHUB_WORKSPACE}/test_info.log"

    - name: Run E2E tests
      shell: bash -eo pipefail {0}
      run: |
        # Source oneAPI env if present
        [[ -n "${XPU_ONEAPI_PATH}" ]] && \
          source "${WORKSPACE}/torch-xpu-ops/.github/scripts/env.sh" || true

        SCRIPT_DIR="${GITHUB_WORKSPACE}/.github/scripts"
        TARGET_DIR="${GITHUB_WORKSPACE}/pytorch"

        # Copy test driver
        [[ -f "${SCRIPT_DIR}/run_benchmark.py" ]] || \
          { echo "::error::run_benchmark.py not found"; exit 1; }
        cp "${SCRIPT_DIR}/run_benchmark.py" "${TARGET_DIR}/"

        cd "${TARGET_DIR}"
        rm -rf torch inductor_log ~/.triton /tmp/torchinductor_*

        # Use model list file for nightly/weekly/ondemand (not PR or comparison)
        model_list_arg=""
        if [[ "${CATEGORY}" != "pr" \
              && "${CATEGORY}" != "target" && "${CATEGORY}" != "baseline" ]]; then
          if [[ -f "${GITHUB_WORKSPACE}/.ci/benchmarks/models_list.txt" ]]; then
            model_list_arg="--model-only ${GITHUB_WORKSPACE}/.ci/benchmarks/models_list.txt"
            cp "${GITHUB_WORKSPACE}/.ci/benchmarks/"*.txt ./benchmarks/dynamo/
          fi
        fi
        if [[ -n "${MODEL_ONLY_NAME}" ]]; then
          model_list_arg="--model-only ${MODEL_ONLY_NAME}"
        fi

        # ── main loop ───────────────────────────────────────────────────────
        if [[ -z "${NUM_GPUS}" ]]; then
          export NUM_GPUS=$(echo "$ZE_AFFINITY_MASK" | awk -F, '{print NF}')
        fi

        python ./run_benchmark.py --suite "${{ inputs.suite }}" --dt "${{ inputs.dt }}" --mode "${{ inputs.mode }}" --scenario "${{ inputs.scenario }}" ${model_list_arg}
