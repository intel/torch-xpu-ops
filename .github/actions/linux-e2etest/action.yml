name: Linux E2E Test

inputs:
  suite:
    required: true
    type: string
    default: 'huggingface'
    description: Dynamo benchmarks test suite. huggingface,timm_models,torchbench. Delimiter is comma
  dt:
    required: true
    type: string
    default: 'float32'
    description: Data precision of the test.float32,bfloat16,float16,amp_bf16,amp_fp16. Delimiter is comma
  mode:
    required: true
    type: string
    default: 'inference'
    description: inference,training. Delimiter is comma
  scenario:
    required: true
    type: string
    default: 'accuracy'
    description: accuracy,performance. Delimiter is comma

runs:
  using: composite
  steps:
    - name: Check Python
      shell: bash -xe {0}
      run: |
        which python && python -V
        which pip && pip list
    - name: E2E Test (${{ inputs.suite }} ${{ inputs.dt }} ${{ inputs.mode }} ${{ inputs.scenario }})
      shell: bash -xe {0}
      run: |
        cd ./pytorch
        rm -rf torch torch-xpu-ops
        git clone https://github.com/intel/torch-xpu-ops
        rsync -avz ./torch-xpu-ops/.ci/benchmarks/ ./benchmarks/dynamo/
        cd torch-xpu-ops
        git checkout mengfeil/refactor
        cd ..
        cp torch-xpu-ops/.github/scripts/run_benchmark.py .
        cp torch-xpu-ops/.ci/benchmarks/models_list.txt .
        python run_benchmark.py --dtype ${inputs.dt} --suite ${inputs.suite} \
                                --mode ${inputs.mode} --scenario ${inputs.scenario} \
                                --model-only models_list.txt
