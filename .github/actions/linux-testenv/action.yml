name: Setup Test Environment
description: >-
  Install PyTorch wheel, clone source for patching, configure torch-xpu-ops,
  and install suite-specific dependencies (huggingface, timm, torchbench, pt2e).

inputs:
  pytorch:
    default: main
    description: 'PyTorch version or wheel channel (release_wheel, test_wheel, nightly_wheel)'
  torch_xpu_ops:
    default: main
    description: 'torch-xpu-ops: main, commit, repo@commit, or "pinned"'
  python:
    default: '3.10'
    description: Python version
  suite:
    required: true
    description: 'Suite(s): huggingface, timm_models, torchbench, pt2e'
  component:
    default: ''
    description: Component name for comparison
  component_version:
    default: ''
    description: Component version for comparison
  category:
    default: default
    description: Category for test comparison

runs:
  using: composite
  steps:
    # ── Runner cleanup ──────────────────────────────────────────────────────
    - name: Verify runner environment
      shell: bash -xeo pipefail {0}
      run: |
        [[ -f /etc/os-release ]] && cat /etc/os-release
        gcc --version
        uname -a
        command -v dpkg &>/dev/null && dpkg -l | grep -iE 'libigc|libze|zero|intel' || true

        # Clean stale caches
        sudo rm -rf ~/.triton/ /tmp/torch* /tmp/tmp*
        [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && rm -rf "${AGENT_TOOLSDIRECTORY}" || true
        rm -rf wheels

    # ── Python ──────────────────────────────────────────────────────────────
    - name: Setup Python ${{ inputs.python }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python }}

    - name: Verify Python
      shell: bash -xeo pipefail {0}
      run: |
        if ! command -v python &>/dev/null; then
          python3_path=$(which python3 2>/dev/null || true)
          [[ -n "${python3_path}" ]] && ln -sf "${python3_path}" /usr/local/bin/python \
            || { echo "::error::Python not found"; exit 1; }
        fi
        python -V
        pip install -U pip wheel 'setuptools<=81'

    # ── Checkout ────────────────────────────────────────────────────────────
    - name: Checkout torch-xpu-ops
      uses: actions/checkout@v6
      with:
        path: torch-xpu-ops
        fetch-depth: 1

    - name: Download PyTorch wheel
      if: ! contains(inputs.pytorch, '_wheel')
      uses: actions/download-artifact@v8
      with:
        pattern: Torch-XPU-Wheel-${{ inputs.category }}-*
        path: ./wheels
        merge-multiple: true

    # ── oneAPI (optional) ───────────────────────────────────────────────────
    - name: Setup oneAPI DLE
      shell: bash -xeo pipefail {0}
      if: inputs.component == 'oneapi'
      run: |
        rm -rf ~/intel ~/.intel ${HOME}/intel /opt/intel
        wget -q -O oneapi.sh "${{ inputs.component_version }}"
        bash oneapi.sh -a -s --eula accept --action remove || true
        bash oneapi.sh -a -s --eula accept --action install --install-dir "${HOME}/intel/oneapi"
        echo "XPU_ONEAPI_PATH=${HOME}/intel/oneapi" >> "${GITHUB_ENV}"

    # ── Install PyTorch ─────────────────────────────────────────────────────
    - name: Install PyTorch
      shell: bash -xeo pipefail {0}
      run: |
        [[ -n "${XPU_ONEAPI_PATH}" ]] && source "${WORKSPACE}/torch-xpu-ops/.github/scripts/env.sh" || true

        extract_repo_commit() {
          if [[ "$1" == *"@"* ]]; then
            echo "${1%%@*} ${1##*@}"
          else
            echo "https://github.com/pytorch/pytorch.git $1"
          fi
        }

        case "${{ inputs.pytorch }}" in
          *release_wheel*) pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/xpu ;;
          *test_wheel*)    pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/test/xpu ;;
          *nightly_wheel*) pip install torch torchvision torchaudio --pre --index-url https://download.pytorch.org/whl/nightly/xpu ;;
          *)
            whl="$(find ./wheels -name '*.whl' 2>/dev/null)"
            [[ -z "${whl}" ]] && { echo "::error::No wheels found"; exit 1; }
            pip install --force-reinstall ${whl}
            ;;
        esac

        TORCH_COMMIT_ID=$(python -c "import torch; print(torch.version.git_version)" 2>/dev/null || echo unknown)

        # Clone source for benchmarks / patching
        read -r repo commit <<< "$(extract_repo_commit "${{ inputs.pytorch }}" | tail -1)"
        commit="${TORCH_COMMIT_ID}"
        rm -rf pytorch
        git clone "${repo}" pytorch
        cd pytorch && git checkout "${commit}"

        # Apply patches
        pip install requests
        [[ -f "../torch-xpu-ops/.github/scripts/apply_torch_pr.py" ]] && \
          python ../torch-xpu-ops/.github/scripts/apply_torch_pr.py
        sed -i 's+choices=range(1, 16),+choices=range(1, 17),+g' benchmarks/dynamo/common.py

        git status --short && git show -s --oneline

        echo "TORCH_COMMIT_ID=${TORCH_COMMIT_ID}" >> "${GITHUB_ENV}"
        echo "PYTORCH_DIR=$(pwd)" >> "${GITHUB_ENV}"
        cd ..

    # ── Configure torch-xpu-ops ─────────────────────────────────────────────
    - name: Configure torch-xpu-ops
      shell: bash -xeo pipefail {0}
      run: |
        cd pytorch
        rm -rf third_party/torch-xpu-ops

        parse_txo() {
          local input="$1"
          if [[ "${input}" == *"@"* ]]; then
            echo "${input%%@*} ${input##*@}"
          elif [[ "${input}" == "pinned" ]]; then
            echo "https://github.com/intel/torch-xpu-ops.git $(cat third_party/xpu.txt 2>/dev/null || echo main)"
          else
            echo "https://github.com/intel/torch-xpu-ops.git ${input}"
          fi
        }

        read -r TXO_REPO TXO_COMMIT <<< "$(parse_txo "${{ inputs.torch_xpu_ops }}" | tail -1)"

        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          rm -rf third_party/torch-xpu-ops
          cp -r "${{ github.workspace }}/torch-xpu-ops" third_party/torch-xpu-ops
        else
          git clone "${TXO_REPO}" third_party/torch-xpu-ops
          if [[ "${TXO_COMMIT}" != "main" ]]; then
            cd third_party/torch-xpu-ops
            git fetch origin "${TXO_COMMIT}" || true
            git checkout "${TXO_COMMIT}" || git checkout main
            cd ../..
          fi
        fi

        cd third_party/torch-xpu-ops && git show -s --oneline
        cd ../../..

    # ── Suite dependencies ──────────────────────────────────────────────────
    - name: Install suite dependencies
      shell: bash -xeo pipefail {0}
      env:
        SUITE_INPUT: ${{ inputs.suite }}
        IS_PR: ${{ github.event_name == 'pull_request' }}
      run: |
        suite_has() { [[ ",${SUITE_INPUT}," == *",$1,"* ]] || [[ "${SUITE_INPUT}" == "$1" ]]; }

        pip install pandas psutil scipy pyyaml || true
        cd pytorch

        # ── huggingface ─────────────────────────────────────────────────────
        if suite_has huggingface; then
          pip install accelerate
          if [[ -f ".ci/docker/ci_commit_pins/huggingface-requirements.txt" ]]; then
            pip install -r .ci/docker/ci_commit_pins/huggingface-requirements.txt || \
              pip install transformers==4.54.0 soxr==0.5.0
          else
            pip install transformers==4.54.0 soxr==0.5.0
          fi
        fi

        # ── timm_models ─────────────────────────────────────────────────────
        if suite_has timm_models; then
          TIMM=$(cat .ci/docker/ci_commit_pins/timm.txt 2>/dev/null || echo v1.0.14)
          pip install "git+https://github.com/huggingface/pytorch-image-models@${TIMM}" || exit 1
        fi

        # ── torchbench ──────────────────────────────────────────────────────
        if suite_has torchbench; then
          TB=$(cat .ci/docker/ci_commit_pins/torchbench.txt 2>/dev/null || echo e03a63be)
          cd ..
          rm -rf benchmark
          git clone https://github.com/pytorch/benchmark benchmark
          cd benchmark && git checkout "${TB}"
          sed -i '/^[[:space:]]*pynvml.*/d' requirements.txt
          pip install -r requirements.txt || true

          if [[ "${IS_PR}" == "true" ]]; then
            [[ -f "../pytorch/benchmarks/dynamo/torchbench_models_list.txt" ]] && \
              while IFS= read -r line || [[ -n "${line}" ]]; do
                m=$(echo "${line}" | awk -F'[,; ]' '{print $1}')
                [[ -n "$m" ]] && python install.py "$m" || true
              done < "../pytorch/benchmarks/dynamo/torchbench_models_list.txt"
          else
            python install.py --continue_on_fail || true
          fi

          # DLRM deps
          pip install pyre-extensions
          curl -fsSL https://raw.githubusercontent.com/facebookresearch/dlrm/refs/heads/torchrec-dlrm/requirements.txt 2>/dev/null \
            | xargs pip install || true
          pip uninstall -y fbgemm_gpu_nightly-cpu 2>/dev/null || true
          pip install "git+https://github.com/nocoding03/gym@fix-np" || true

          echo "PYTHONPATH=${PWD}:${PYTHONPATH:-}" >> "${GITHUB_ENV}"
          cd ../pytorch
        fi

        # ── pt2e ────────────────────────────────────────────────────────────
        if suite_has pt2e; then
          cd ..
          rm -rf pt2e-accuracy pt2e-performance
          git clone -b main https://github.com/chuanqi129/inductor-tools pt2e-accuracy
          git clone -b yifeng/pt2e_xpu https://github.com/zxd1997066/benchmark pt2e-performance

          cd pt2e-performance
          sed -i '/^[[:space:]]*pynvml.*/d' requirements.txt
          pip install -r requirements.txt || true
          echo "PYTHONPATH=${PWD}:${PYTHONPATH:-}" >> "${GITHUB_ENV}"

          pip install dominate
          python install.py Super_SloMo || true
          pip install pyre-extensions
          curl -fsSL https://raw.githubusercontent.com/facebookresearch/dlrm/refs/heads/torchrec-dlrm/requirements.txt 2>/dev/null \
            | xargs pip install || true
          pip uninstall -y fbgemm_gpu_nightly-cpu 2>/dev/null || true
          cd ../pytorch
        else
          # Default UT dependencies
          [[ -f ".ci/docker/requirements-ci.txt" ]] && {
            sed -i '/mkl/d' .ci/docker/requirements-ci.txt
            pip install -r .ci/docker/requirements-ci.txt || true
          }
          pip install pytest pytest-timeout pytest-xdist pytest-rerunfailures
        fi

        # ── torchao ─────────────────────────────────────────────────────────
        pip uninstall -y torchao 2>/dev/null || true
        case "${{ inputs.pytorch }}" in
          *release_wheel*) pip install torchao --pre --index-url https://download.pytorch.org/whl/xpu ;;
          *test_wheel*)    pip install torchao --pre --index-url https://download.pytorch.org/whl/test/xpu ;;
          *)               pip install torchao --pre --index-url https://download.pytorch.org/whl/nightly/xpu ;;
        esac

        # numpy for benchmarks (YOLOv requires >=1.23)
        [[ "${SUITE_INPUT}" != "None" ]] && pip install -U numpy==1.26.4 || true

        cd ..

    # ── Verify ──────────────────────────────────────────────────────────────
    - name: Verify environment
      shell: bash -xeo pipefail {0}
      run: |
        [[ -n "${XPU_ONEAPI_PATH}" ]] && source "${WORKSPACE}/torch-xpu-ops/.github/scripts/env.sh" || true

        python -c "import torch; print(torch.__config__.show())"
        python -c "import torch; print(torch.__config__.parallel_info())"
        python -c "import torch; print(torch.xpu.device_count())"
        python -c "import torchvision; print(torchvision.__version__)" || true
        python -c "import torchaudio; print(torchaudio.__version__)" || true
        python -c "import triton; print(triton.__version__)" || true

        [[ -f "pytorch/torch/utils/collect_env.py" ]] && \
          python pytorch/torch/utils/collect_env.py | tee "${GITHUB_WORKSPACE}/test_info.log"

        printenv | sort | tee -a "${GITHUB_WORKSPACE}/test_info.log"
        ONEDNN_VERBOSE=1 python -c \
          'import torch; torch.nn.Conv2d(1,1,1,stride=1,device="xpu")(torch.randn(1,1,1,1,device="xpu"))' \
          2>&1 | tee -a "${GITHUB_WORKSPACE}/test_info.log"

        pip list | grep -iE 'torch|intel|xpu' | sort

        # Verify torch wasn't silently replaced by a dep install
        INSTALLED=$(python -c "import torch; print(torch.version.git_version)" 2>/dev/null || echo unknown)
        if [[ "${INSTALLED}" != "${TORCH_COMMIT_ID}" ]]; then
          echo "::error::Torch commit mismatch: expected ${TORCH_COMMIT_ID}, got ${INSTALLED}"
          exit 1
        fi
