name: 'Conditions Filter'
description: 'Filter test conditions and determine test configurations'

inputs:
  all_inputs_json:
    description: 'JSON object containing all user-provided inputs (e.g., test_type, pytorch, component, etc.)'
    required: true
  is_scheduled_run:
    required: true
    description: 'Set to true for scheduled runs (affects build behavior)'

outputs:
  # Configuration
  test_type:
    description: 'Type of test run (e.g., build-cicd, wheel-nightly)'
    value: ${{ steps.determine-outputs.outputs.test_type }}
  pytorch:
    description: 'PyTorch version to use (e.g., main, nightly_wheel)'
    value: ${{ steps.determine-outputs.outputs.pytorch }}
  torch_xpu_ops:
    description: 'torch-xpu-ops version to use (e.g., cicd, pinned, main)'
    value: ${{ steps.determine-outputs.outputs.torch_xpu_ops }}
  should_build:
    description: 'Whether a build step should be performed (true/false)'
    value: ${{ steps.determine-outputs.outputs.should_build }}
  # Test scope
  what_to_run:
    description: 'What tests to run'
    value: ${{ steps.determine-outputs.outputs.what_to_run }}
  ut_json_array:
    description: 'Unit tests list'
    value: ${{ steps.determine-outputs.outputs.ut_json_array }}
  suite_json_array:
    description: 'Suite tests list'
    value: ${{ steps.determine-outputs.outputs.suite_json_array }}
  # Others
  python:
    description: 'Python version to use'
    value: ${{ steps.determine-outputs.outputs.python }}
  component:
    description: 'Component being tested (pytorch / torch-xpu-ops / none)'
    value: ${{ steps.determine-outputs.outputs.component }}
  component_version:
    description: 'Version of the component (if custom version is provided)'
    value: ${{ steps.determine-outputs.outputs.component_version }}
  dt:
    description: 'Data type'
    value: ${{ steps.determine-outputs.outputs.dt }}
  mode:
    description: 'Mode, training or inference'
    value: ${{ steps.determine-outputs.outputs.mode }}
  scenario:
    description: 'Scenario, accuracy or performance'
    value: ${{ steps.determine-outputs.outputs.scenario }}
  model:
    description: 'Specific model if needed'
    value: ${{ steps.determine-outputs.outputs.model }}

runs:
  using: composite
  steps:
    # ------------------------------------------------------------
    # Step 1: Parse all_inputs_json and set environment variables
    # ------------------------------------------------------------
    - name: Parse all_inputs_json
      id: parse-inputs
      shell: bash -eo pipefail {0}
      run: |
        # Get the JSON input
        RAW_JSON='${{ inputs.all_inputs_json }}'

        # If JSON is empty, skip
        if [[ -z "$RAW_JSON" ]]; then
          echo "No all_inputs_json provided, using defaults"
          exit 0
        fi

        # Validate JSON
        if ! echo "$RAW_JSON" | jq empty 2>/dev/null; then
          echo "Failed to parse JSON: Invalid JSON"
          echo "Raw input: $RAW_JSON"
          exit 1
        fi

        # Iterate over keys and set them as environment variables
        echo "$RAW_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key value; do
          echo "Input: $key = $value"
          echo "$key=$value" >> "$GITHUB_ENV"
          echo "$key=$value" >> "$GITHUB_OUTPUT"
        done

    # ------------------------------------------------------------
    # Step 2: Determine test scope based on run type
    # ------------------------------------------------------------
    - name: Determine test scope (PR)
      if: inputs.is_scheduled_run == 'pull_request'
      id: pr-scope
      uses: dorny/paths-filter@v4
      with:
        filters: |
          src_changed:
            - 'cmake/**'
            - 'tools/**'
            - 'src/**.cmake'
            - 'CMakeLists.txt'
            - 'test/sycl/CMakeLists.txt'
            - 'src/xccl/CMakeLists.txt'
            - 'src/ATen/CMakeLists.txt'
            - 'src/CMakeLists.txt'
            - '.github/workflows/_windows_ut.yml'

    - name: Determine test scope (PR)
      if: inputs.is_scheduled_run == 'pull_request'
      shell: bash -eo pipefail {0}
      run: |
        # Extract PR labels
        pr_labels="$(echo '${{ toJson(github.event.pull_request.labels) }}' | jq -r '.[].name' | tr '\n' ' ')"

        # Start with base scope
        what_to_run="ut,e2e"

        # Check if Windows tests should be added
        src_changed="${{ steps.pr-scope.outputs.src_changed }}"
        if [[ "${pr_labels}" != *"disable_win"* ]] && \
           ( [[ "${ut}" == *"windows"* ]] || \
             [[ "${pr_labels}" == *"windows_ci"* ]] || \
             [[ "${src_changed}" == "true" ]] ); then
          what_to_run="${what_to_run},windows"
        fi

        echo "pr_labels=${pr_labels}" >> "$GITHUB_ENV"
        echo "what_to_run=${what_to_run}" >> "$GITHUB_ENV"

    - name: Determine test scope (Scheduled)
      if: inputs.is_scheduled_run == 'schedule'
      shell: bash -eo pipefail {0}
      run: |
        what_to_run="ut,e2e,windows,microbench"
        echo "what_to_run=${what_to_run}" >> "$GITHUB_ENV"

    - name: Determine test scope (Manual)
      if: contains(inputs.is_scheduled_run, 'manually')
      shell: bash -eo pipefail {0}
      run: |
        # Build what_to_run based on ut and suite variables
        what_to_run=""
        # Add ut if present and matches basic/op/xpu/ut
        if [[ -n "${ut}" ]] && echo "${ut}" | grep -qE "basic|op|xpu|ut"; then
          what_to_run="${what_to_run},ut"
        fi
        # Add e2e if suite is non-empty
        if [[ -n "${suite}" ]]; then
          what_to_run="${what_to_run},e2e"
        fi
        # Add windows if ut contains 'windows'
        if [[ "${ut}" == *"windows"* ]]; then
          what_to_run="${what_to_run},windows"
        fi
        # Add microbench if ut contains 'microbench'
        if [[ "${ut}" == *"microbench"* ]]; then
          what_to_run="${what_to_run},microbench"
        fi
        # Remove leading comma if present
        what_to_run="${what_to_run#,}"
        echo "what_to_run=${what_to_run}" >> "$GITHUB_ENV"

    # ------------------------------------------------------------
    # Step 3: Determine test configuration
    # ------------------------------------------------------------
    - name: Determine test configuration
      id: determine-outputs
      shell: bash -xeo pipefail {0}
      run: |
        echo "=== Determining Test Configuration ==="

        # Determine configuration based on run type
        if [ "${{ inputs.is_scheduled_run }}" == "pull_request" ]; then
          # PR run: decide based on labels
          if [[ "${pr_labels}" == *"disable_build"* ]]; then
            pytorch="nightly_wheel"
            torch_xpu_ops="pull_request"
            should_build="false"
            test_type="wheel-cicd"
          else
            pytorch="main"
            torch_xpu_ops="pull_request"
            should_build="true"
            test_type="build-cicd"
          fi
        elif [ "${{ inputs.is_scheduled_run }}" == "schedule" ]; then
          # Scheduled run: use cron schedule
          case "${{ github.event.schedule }}" in
            "10 13 * * 0-4")
              # nightly main
              pytorch="main"
              torch_xpu_ops="main"
              should_build="true"
              test_type="build-nightly"
              ;;
            "30 13 * * 0-4")
              # nightly wheel
              pytorch="nightly_wheel"
              torch_xpu_ops="pinned"
              should_build="false"
              test_type="wheel-nightly"
              ;;
            "10 16 * * 5")
              # weekly main
              pytorch="main"
              torch_xpu_ops="main"
              should_build="true"
              test_type="build-weekly"
              ;;
            "30 16 * * 5")
              # weekly wheel
              pytorch="nightly_wheel"
              torch_xpu_ops="pinned"
              should_build="false"
              test_type="wheel-weekly"
              ;;
            *)
              echo "Unknown schedule: ${{ github.event.schedule }}"
              exit 1
              ;;
          esac
        else
          # Manual run: use values from all_inputs_json (already in env)
          pytorch="${pytorch}"
          torch_xpu_ops="${torch_xpu_ops}"
          # Determine should_build and test_type based on pytorch
          if [[ "${pytorch}" == "nightly_wheel" || "${pytorch}" == "release_wheel" || "${pytorch}" == "test_wheel" ]]; then
            should_build="false"
            test_type="wheel-ondemand"
          else
            should_build="true"
            test_type="build-ondemand"
          fi
        fi

        # Build JSON arrays for unit tests and suites
        # ut_json_array: exclude windows/microbench if present
        ut_json_array="$(echo "${ut}" | awk -F, '{
          out = "["
          for (i=1; i<=NF; i++) {
            if ($i !~ /windows|microbench/ && $i != "") {
              if (out != "[") out = out ", "
              out = out "\"" $i "\""
            }
          }
          out = out "]"
          print out
        }')"
        # suite_json_array: include all suite entries
        suite_json_array="$(echo "${suite}" | awk -F, '{
          out = "["
          for (i=1; i<=NF; i++) {
            if ($i != "") {
              if (out != "[") out = out ", "
              out = out "\"" $i "\""
            }
          }
          out = out "]"
          print out
        }')"

        # Set outputs
        echo "pytorch=${pytorch}" >> "${GITHUB_OUTPUT}"
        echo "torch_xpu_ops=${torch_xpu_ops}" >> "${GITHUB_OUTPUT}"
        echo "should_build=${should_build}" >> "${GITHUB_OUTPUT}"
        echo "test_type=${test_type}" >> "${GITHUB_OUTPUT}"
        echo "what_to_run=${what_to_run}" >> "${GITHUB_OUTPUT}"
        echo "ut_json_array=${ut_json_array}" >> "${GITHUB_OUTPUT}"
        echo "suite_json_array=${suite_json_array}" >> "${GITHUB_OUTPUT}"

        # Handle other outputs (defaults if not set)
        python="${python:-3.12}"
        component="${component:-none}"
        dt="${dt:-}"
        mode="${mode:-}"
        scenario="${scenario:-}"
        model="${model:-}"

        # Determine component_version based on target/baseline (if present)
        component_version="none"
        if [[ "${{ inputs.is_scheduled_run }}" == *"target"* ]]; then
          component_version="${target_version:-none}"
        elif [[ "${{ inputs.is_scheduled_run }}" == *"baseline"* ]]; then
          component_version="${baseline_version:-none}"
        fi

        echo "python=${python}" >> "${GITHUB_OUTPUT}"
        echo "component=${component}" >> "${GITHUB_OUTPUT}"
        echo "component_version=${component_version}" >> "${GITHUB_OUTPUT}"
        echo "dt=${dt}" >> "${GITHUB_OUTPUT}"
        echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
        echo "scenario=${scenario}" >> "${GITHUB_OUTPUT}"
        echo "model=${model}" >> "${GITHUB_OUTPUT}"
