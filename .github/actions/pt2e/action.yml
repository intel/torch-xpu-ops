name: PT2E quantisation tests
description: >-
  Run PT2E accuracy (ImageNet top-1/5) and/or performance (throughput)
  tests for float32 and int8 on XPU.

inputs:
  dt:
    required: true
    description: 'Data precision: float32, int8 (comma-separated)'
  scenario:
    required: true
    description: 'Test scenario: accuracy, performance (comma-separated)'
  pytorch:
    default: main
    description: PyTorch branch/commit (reference only)

runs:
  using: composite
  steps:
    # ── Environment ─────────────────────────────────────────────────────────
    - name: Log environment
      shell: bash -eo pipefail {0}
      run: |
        python -V
        echo "dt=${{ inputs.dt }}  scenario=${{ inputs.scenario }}"
        printenv | sort | tee -a "${GITHUB_WORKSPACE}/test_info.log"

    # ── ImageNet dataset ────────────────────────────────────────────────────
    - name: Prepare ImageNet dataset
      shell: bash -eo pipefail {0}
      run: |
        DATASET_DIR="${RUNNER_TEMP}/_datasets/imagenet"

        if [[ -d "${DATASET_DIR}" && -f "${DATASET_DIR}/valprep.sh" ]]; then
          echo "dataset_dir=${DATASET_DIR}" >> "${GITHUB_ENV}"
          exit 0
        fi

        rm -rf "${DATASET_DIR}" && mkdir -p "${DATASET_DIR}" && cd "${DATASET_DIR}"

        wget -q -O valprep.sh \
          https://raw.githubusercontent.com/soumith/imagenetloader.torch/master/valprep.sh
        chmod +x valprep.sh

        wget -q https://image-net.org/data/ILSVRC/2012/ILSVRC2012_img_val.tar
        tar -xf ILSVRC2012_img_val.tar && ./valprep.sh
        rm -f ILSVRC2012_img_val.tar

        echo "Dataset size: $(du -sh . | cut -f1)"
        echo "dataset_dir=${DATASET_DIR}" >> "${GITHUB_ENV}"

    # ── Run tests ───────────────────────────────────────────────────────────
    - name: Execute PT2E tests
      shell: bash -eo pipefail {0}
      env:
        DATASET_DIR: ${{ env.dataset_dir }}
      run: |
        [[ ! -d "${DATASET_DIR}" ]] && { echo "::error::Dataset dir missing"; exit 1; }

        LOGS="${{ github.workspace }}/pytorch/inductor_log/pt2e"
        rm -rf "${LOGS}" && mkdir -p "${LOGS}"
        SUMMARY="${LOGS}/summary.csv"
        echo "Mode,Model,Dtype,Accuracy1,Accuracy5/Throughput,Status" > "${SUMMARY}"

        IFS=',' read -ra DT_ARRAY  <<< "${{ inputs.dt }}"
        IFS=',' read -ra SC_ARRAY  <<< "${{ inputs.scenario }}"

        has() { local v="$1"; shift; for i in "$@"; do [[ "$i" == "$v" ]] && return 0; done; return 1; }

        # ── helpers ─────────────────────────────────────────────────────────
        extract_accuracy() {          # $1=log  $2=model  $3=dtype
          local line acc1 acc5
          [[ ! -f "$1" ]] && { echo "Accuracy,$2,$3,failed,failed,Log missing" >> "${SUMMARY}"; return; }
          line=$(grep -i 'Acc.1.*Acc.5' "$1" | tail -1)
          acc1=$(echo "${line}" | grep -oP 'Acc\.1:\s*\K[0-9.]+') || true
          acc5=$(echo "${line}" | grep -oP 'Acc\.5:\s*\K[0-9.]+') || true
          if [[ -n "${acc1}" && -n "${acc5}" ]]; then
            echo "Accuracy,$2,$3,${acc1},${acc5},success" >> "${SUMMARY}"
          else
            echo "Accuracy,$2,$3,failed,failed,Parse error" >> "${SUMMARY}"
          fi
        }

        extract_throughput() {        # $1=log  $2=model  $3=config  $4=ubdir
          [[ ! -d "$4" ]] && { echo "Performance,$2,$3,failed,N/A,Dir missing" >> "${SUMMARY}"; return; }
          local tp
          tp=$(find "$4" -type f \( -name '*.json' -o -name '*.txt' -o -name '*.log' \) \
               -exec grep -l eval_throughput {} + 2>/dev/null \
               | head -1 | xargs grep -i eval_throughput 2>/dev/null \
               | tail -1 | grep -oP '[0-9.]+' | tail -1) || true
          if [[ -n "${tp}" ]]; then
            echo "Performance,$2,$3,${tp},N/A,success" >> "${SUMMARY}"
          else
            echo "Performance,$2,$3,failed,N/A,No throughput" >> "${SUMMARY}"
          fi
        }

        # ── accuracy ────────────────────────────────────────────────────────
        if has accuracy "${SC_ARRAY[@]}"; then
          ACC_MODELS=(alexnet mnasnet1_0 mobilenet_v2 mobilenet_v3_large
                      resnet152 resnet18 resnet50 resnext50_32x4d
                      shufflenet_v2_x1_0 squeezenet1_1 vgg16)

          ACC_CMD="python pt2e-accuracy/scripts/modelbench/quant/inductor_quant_acc.py
                   --device xpu --dataset_dir ${DATASET_DIR}"

          [[ ! -f pt2e-accuracy/scripts/modelbench/quant/inductor_quant_acc.py ]] && \
            { echo "::error::Accuracy script not found"; exit 1; }

          for m in "${ACC_MODELS[@]}"; do
            if has float32 "${DT_ARRAY[@]}"; then
              LOG="${LOGS}/accuracy-float32-${m}.log"
              ${ACC_CMD} --model_list "${m}" --is_fp32 2>&1 | tee "${LOG}" || true
              extract_accuracy "${LOG}" "${m}" float32
            fi
            if has int8 "${DT_ARRAY[@]}"; then
              LOG="${LOGS}/accuracy-int8-${m}.log"
              ${ACC_CMD} --model_list "${m}" 2>&1 | tee "${LOG}" || true
              extract_accuracy "${LOG}" "${m}" int8
            fi
          done
        fi

        # ── performance ─────────────────────────────────────────────────────
        if has performance "${SC_ARRAY[@]}"; then
          PERF_MODELS=(alexnet demucs dlrm hf_Albert hf_Bert hf_Bert_large
                       hf_DistilBert hf_Roberta_base mnasnet1_0 mobilenet_v2
                       mobilenet_v3_large nvidia_deeprecommender
                       resnet152 resnet18 resnet50 resnext50_32x4d
                       shufflenet_v2_x1_0 squeezenet1_1 Super_SloMo
                       timm_efficientnet timm_nfnet timm_regnet timm_resnest
                       timm_vision_transformer timm_vision_transformer_large
                       timm_vovnet vgg16)

          PERF_CMD="python pt2e-performance/run_benchmark.py xpu
                    --test eval --channels-last --metrics throughputs --torchdynamo inductor"
          UB_DIR="pt2e-performance/.userbenchmark"

          [[ ! -f pt2e-performance/run_benchmark.py ]] && \
            { echo "::error::Performance script not found"; exit 1; }

          for m in "${PERF_MODELS[@]}"; do
            if has float32 "${DT_ARRAY[@]}"; then
              LOG="${LOGS}/performance-float32-${m}.log"
              rm -rf "${UB_DIR}"
              ${PERF_CMD} -m "${m}" 2>&1 | tee "${LOG}" || true
              extract_throughput "${LOG}" "${m}" float32 "${UB_DIR}"
            fi
            if has int8 "${DT_ARRAY[@]}"; then
              for qcfg in ASYMM SYMM; do
                LOG="${LOGS}/performance-${qcfg}-${m}.log"
                rm -rf "${UB_DIR}"
                XPU_QUANT_CONFIG=${qcfg} ${PERF_CMD} -m "${m}" --quantization pt2e 2>&1 | tee "${LOG}" || true
                extract_throughput "${LOG}" "${m}" "${qcfg}" "${UB_DIR}"
              done
            fi
          done
        fi

        # ── summary ─────────────────────────────────────────────────────────
        total=$(($(wc -l < "${SUMMARY}") - 1))
        pass=$(grep -c ',success$' "${SUMMARY}" || echo 0)
        fail=$(grep -c ',failed'   "${SUMMARY}" || echo 0)
        echo "Total: ${total}  Pass: ${pass}  Fail: ${fail}"
        column -t -s ',' "${SUMMARY}" | head -30
        (( fail > 0 )) && { echo "::warning::${fail} test(s) failed"; grep ',failed' "${SUMMARY}" | column -t -s ','; }
