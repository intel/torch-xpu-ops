name: inductor-xpu-pt2e-test
description: Run PT2E accuracy and performance benchmarks with the merged benchmark runner.

inputs:
  dt:
    required: true
    default: 'float32'
    description: 'Data precisions. Comma-separated: float32,int8'
  scenario:
    required: true
    default: 'accuracy'
    description: 'Comma-separated scenarios: accuracy,performance'
  pytorch:
    required: false
    default: 'main'
    description: PyTorch branch or commit

runs:
  using: composite
  steps:
    - name: Check Python
      shell: bash -xe {0}
      run: |
        which python && python -V
        which pip && pip list
    - name: Prepare dataset
      if: contains(inputs.scenario, 'accuracy')
      shell: bash -xe {0}
      run: |
        dataset_dir="/opt/_datasets/imagenet"
        if [ ! -d "${dataset_dir}" ]; then
          rm -rf "${dataset_dir}"
          mkdir -p "${dataset_dir}"
          cd "${dataset_dir}"
          wget -O valprep.sh https://raw.githubusercontent.com/soumith/imagenetloader.torch/master/valprep.sh
          wget -q https://image-net.org/data/ILSVRC/2012/ILSVRC2012_img_val.tar
          tar -xf ILSVRC2012_img_val.tar
          bash valprep.sh
        fi
        echo "dataset_dir=${dataset_dir}" >> "${GITHUB_ENV}"
    - name: PT2E Test (${{ inputs.dt }}  ${{ inputs.scenario }})
      shell: bash -xe {0}
      run: |
        set -o pipefail

        # Run from the workspace root so pt2e-accuracy/ and pt2e-performance/
        # relative paths resolve correctly.
        rm -rf inductor_log && mkdir -p inductor_log
        rsync -avz --delete ${GITHUB_WORKSPACE}/.github/scripts/run_benchmarks/ ./run_pt2e/

        if [ -n "${MODEL_ONLY_NAME:-}" ]; then
          model_list_args=(--model-only "${MODEL_ONLY_NAME}")
        else
          model_list_args=(--model-only "${GITHUB_WORKSPACE}/.ci/benchmarks/model_list.csv")
        fi

        python -m run_pt2e --suite pt2e --mode inference \
            --dtype "${{ inputs.dt }}" --scenario "${{ inputs.scenario }}" \
            --dataset-dir "${dataset_dir}" "${model_list_args[@]}" \
            2>&1 | tee inductor_log/run_pt2e.log || true
        rsync -avz --delete inductor_log/ "${GITHUB_WORKSPACE}/pytorch/inductor_log/"
