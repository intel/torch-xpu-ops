name: Runner Config
description: Load centralized self-hosted runner labels from config.json.

outputs:
  linux_build:
    description: Linux build runner label
    value: ${{ steps.config.outputs.linux_build }}
  linux_performance:
    description: Linux performance runner label
    value: ${{ steps.config.outputs.linux_performance }}
  linux_others:
    description: Linux general-purpose runner label
    value: ${{ steps.config.outputs.linux_others }}
  linux_distributed:
    description: Linux distributed test runner label
    value: ${{ steps.config.outputs.linux_distributed }}
  linux_acceptance:
    description: Linux acceptance runner label
    value: ${{ steps.config.outputs.linux_acceptance }}
  windows_build:
    description: Windows build runner label
    value: ${{ steps.config.outputs.windows_build }}
  windows_test:
    description: Windows test runner label
    value: ${{ steps.config.outputs.windows_test }}

runs:
  using: composite
  steps:
    - name: Load runner config
      id: config
      shell: bash -xe {0}
      run: |
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        config = json.loads(Path(os.environ['GITHUB_ACTION_PATH']).joinpath('config.json').read_text())['runners']
        output_path = Path(os.environ['GITHUB_OUTPUT'])
        with output_path.open('a', encoding='utf-8') as output:
            for key in (
                'linux_build',
                'linux_performance',
                'linux_others',
                'linux_distributed',
                'linux_acceptance',
                'windows_build',
                'windows_test',
            ):
                output.write(f'{key}={config[key]}\n')
        PY