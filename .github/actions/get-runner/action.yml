name: Get Runner Info
description: >-
  Detect runner identity, enumerate XPU devices, distribute CPUs/GPUs,
  and output numactl/pytest sharding arguments.

inputs:
  ut_name:
    required: false
    default: ''
    description: UT name — only "xpu_distributed" changes pytest strategy

outputs:
  runner_id:
    value: ${{ steps.runner.outputs.runner_id }}
    description: Runner ID (RUNNER_NAME without trailing index)
  user_id:
    value: ${{ steps.runner.outputs.user_id }}
    description: UID of the current user
  render_id:
    value: ${{ steps.runner.outputs.render_id }}
    description: GID of the render group
  hostname:
    value: ${{ steps.runner.outputs.hostname }}
    description: Machine hostname
  ZE_AFFINITY_MASK:
    value: ${{ steps.cpu-gpu.outputs.ZE_AFFINITY_MASK }}
    description: Comma-separated active GPU IDs
  numactl_args:
    value: ${{ steps.cpu-gpu.outputs.numactl_args }}
    description: Semicolon-delimited numactl commands per GPU
  pytest_extra_args:
    value: ${{ steps.cpu-gpu.outputs.pytest_extra_args }}
    description: pytest-xdist --tx args per GPU

runs:
  using: composite
  steps:
    # ── Cleanup ─────────────────────────────────────────────────────────────
    - name: Cleanup and fix permissions
      shell: bash -xeo pipefail {0}
      run: |
        # Docker prune
        if command -v docker &>/dev/null && docker info &>/dev/null; then
          docker system prune -af || true
        else
          echo "::error::Docker not available"
          exit 1
        fi

        # Fix ownership
        ME="$(id -u):$(id -g)"
        sudo chown "${ME}" "${HOME}" /tmp/* -R 2>/dev/null || true
        sudo chown "${ME}" . -R 2>/dev/null || true

        if [[ -n "${RUNNER_WORKSPACE}" && -d "${RUNNER_WORKSPACE}/.." ]]; then
          cd "${RUNNER_WORKSPACE}/.."
          [[ "$(pwd)" != "/" ]] && sudo chown "${ME}" . -R 2>/dev/null || true
        fi

    # ── Identity ────────────────────────────────────────────────────────────
    - name: Resolve runner identity
      id: runner
      shell: bash -xeo pipefail {0}
      run: |
        runner_id="${RUNNER_NAME%-[0-9]}"
        render_id=""
        getent group render &>/dev/null && render_id=$(getent group render | cut -d: -f3)

        echo "runner_id=${runner_id}"   >> "$GITHUB_OUTPUT"
        echo "user_id=$(id -u)"        >> "$GITHUB_OUTPUT"
        echo "render_id=${render_id}"   >> "$GITHUB_OUTPUT"
        echo "hostname=$(hostname)"     >> "$GITHUB_OUTPUT"

    # ── System info ─────────────────────────────────────────────────────────
    - name: Show system information
      shell: bash -xeo pipefail {0}
      run: |
        lscpu
        command -v lshw &>/dev/null && lshw -C display 2>/dev/null || true
        free -h
        df -h
        [[ -f /etc/os-release ]] && cat /etc/os-release
        uname -a
        command -v dpkg &>/dev/null && dpkg -l | grep -iE 'intel|libze|libigc' || true

        # clinfo is required — fail early if missing or stuck
        command -v clinfo &>/dev/null || { echo "::error::clinfo not installed"; exit 1; }
        timeout 120 clinfo --list || { echo "::error::clinfo failed"; exit 1; }

    # ── CPU governor ────────────────────────────────────────────────────────
    - name: Optimize CPU frequency
      shell: bash -xeo pipefail {0}
      run: |
        gov=$(cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor 2>/dev/null || echo unknown)
        echo "Current governor: ${gov}"

        if sudo -n true 2>/dev/null; then
          if [[ "${gov}" != "performance" && "${gov}" != "unknown" ]]; then
            if ! command -v cpupower &>/dev/null; then
              sudo apt-get update -qq && sudo apt-get install -yqq \
                linux-tools-common linux-tools-"$(uname -r)" \
                linux-cloud-tools-"$(uname -r)" || { echo "::error::cpupower install failed"; exit 1; }
            fi
            sudo cpupower set -b 0
            sudo cpupower frequency-set -g performance
          fi
          sync && sudo sh -c "echo 3 > /proc/sys/vm/drop_caches" || true
        fi

    # ── CPU / GPU distribution ──────────────────────────────────────────────
    - name: Distribute CPUs and GPUs
      id: cpu-gpu
      shell: bash -xeo pipefail {0}
      run: |
        # ── helpers ─────────────────────────────────────────────────────────
        get_cpu_count() {
          local cps=$(lscpu | awk '/^Core\(s\) per socket:/{print $NF}')
          local sck=$(lscpu | awk '/^Socket\(s\):/{print $NF}')
          echo $((cps * sck))
        }

        get_xpu_count() {
          command -v lspci &>/dev/null || { echo 0; return; }
          lspci -nn |grep  -Ei 'VGA|DISPLAY' |grep 8086 |wc -l
        }

        get_active_xpu_list() {
          local n=$1 list=""
          for ((id=0; id<n; id++)); do
            local output
            output=$(ZE_AFFINITY_MASK="${id}" timeout 60 clinfo --list 2>/dev/null) || continue
            if echo "$output" | grep -q "Graphics" && \
               ! echo "$output" | grep -q " UHD "; then
              list+="${id},"
            fi
          done
          echo "${list%,}"
        }

        # ── detect ──────────────────────────────────────────────────────────
        cpu_num=$(get_cpu_count | tail -1)
        xpu_num=$(get_xpu_count | tail -1)
        cpus_per_xpu=$(( xpu_num > 0 ? cpu_num / xpu_num : cpu_num ))

        echo "CPUs: ${cpu_num}  XPUs: ${xpu_num}  CPUs/XPU: ${cpus_per_xpu}"
        [[ "${xpu_num}" -eq 0 ]] && echo "::warning::No online XPU devices"

        ZE_AFFINITY_MASK=$(get_active_xpu_list "${xpu_num}" | tail -1)
        [[ -z "${ZE_AFFINITY_MASK}" ]] && echo "::error::No active XPU devices found" && exit 1
        IFS=',' read -ra gpus <<< "${ZE_AFFINITY_MASK}"
        active_num=${#gpus[@]}
        n=${NUM_GPUS:-$xpu_num}
        if (( NUM_GPUS > active_num )); then
          echo "::warning::Requested ${n} GPUs, but only ${active_num} active. Using ${active_num} GPUs."
        fi

        # ── numactl args (semicolon-delimited, one per GPU) ────────────────
        if (( n > 1 )); then
          numactl_args=""
          for ((i=0; i<n; i++)); do
            s=$((i * cpus_per_xpu)); e=$(((i+1) * cpus_per_xpu - 1))
            numactl_args+=" ZE_AFFINITY_MASK=${gpus[i]} OMP_NUM_THREADS=${cpus_per_xpu} numactl -l -C ${s}-${e} ;"
          done
          numactl_args="${numactl_args%;}"
        else
          numactl_args="numactl -l"
        fi

        # ── pytest args ─────────────────────────────────────────────────────
        if [[ "${{ inputs.ut_name }}" == "xpu_distributed" ]]; then
          topo_script="${{ github.workspace }}/.github/scripts/check-topology.py"
          pytest_extra_args=""
          [[ -f "${topo_script}" ]] && pytest_extra_args=$(python "${topo_script}")
        elif (( n > 1 )); then
          pytest_extra_args=""
          for ((i=0; i<n; i++)); do
            s=$((i * cpus_per_xpu)); e=$(((i+1) * cpus_per_xpu - 1))
            pytest_extra_args+=" --tx popen//env:ZE_AFFINITY_MASK=${gpus[i]}//env:OMP_NUM_THREADS=${cpus_per_xpu}//python=\"numactl -l -C ${s}-${e} python\""
          done
        else
          pytest_extra_args="-n 1"
        fi

        echo "ZE_AFFINITY_MASK=${ZE_AFFINITY_MASK}"     >> "$GITHUB_OUTPUT"
        echo "numactl_args=${numactl_args}"              >> "$GITHUB_OUTPUT"
        echo "pytest_extra_args=${pytest_extra_args}"     >> "$GITHUB_OUTPUT"
