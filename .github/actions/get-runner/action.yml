name: Get Runner Infos
description: Get runner information and detect XPU devices

inputs:
  ut_name:
    required: false
    description: Which ut to launch
    default: ''
  github_token:
    required: false
    description: GitHub token for runner label management
    default: ''
  labels_action:
    required: false
    description: "Label management action: 'set' to save and swap labels, 'reset' to restore, 'none' to skip"
    default: 'none'
  fixed_freq:
    required: false
    description: Whether to lock CPU/GPU frequencies for stable benchmarking
    default: 'false'

outputs:
  runner_name:
    description: Runner ID (name without trailing index)
    value: ${{ steps.runner.outputs.runner_name }}
  random_label:
    description: Temporary random label assigned to this runner
    value: ${{ steps.labels.outputs.RANDOM_RUNNER_LABEL }}
  user_id:
    description: User ID
    value: ${{ steps.runner.outputs.user_id }}
  render_id:
    description: Render group ID
    value: ${{ steps.runner.outputs.render_id }}
  ZE_AFFINITY_MASK:
    description: ZE_AFFINITY_MASK for GPU selection
    value: ${{ steps.devices.outputs.ZE_AFFINITY_MASK }}
  numactl_args:
    description: numactl arguments for CPU binding
    value: ${{ steps.devices.outputs.NUMACTL_ARGS }}
  pytest_extra_args:
    description: Extra pytest arguments for sharding
    value: ${{ steps.devices.outputs.PYTEST_EXTRA_ARGS }}

runs:
  using: composite
  steps:
    # --- Cleanup ---
    - name: Cleanup host
      shell: bash -euo pipefail {0}
      run: |
        docker system prune -af || true
        sudo chown $(id -u):$(id -g) ${HOME} /tmp ./ -R
        cd ${RUNNER_WORKSPACE}/..
        if [ "${PWD}" != "/" ]; then
          sudo chown $(id -u):$(id -g) . -R || true
        fi

    # --- Show runner info ---
    - name: Show runner info
      shell: bash -euo pipefail {0}
      run: |
        hostname
        cat /etc/os-release
        uname -a
        lspci -nn |grep  -Ei 'VGA|DISPLAY'
        lscpu
        free -h
        df -h
        timeout 120 clinfo --list

    # --- Identify runner ---
    - name: Get runner info
      id: runner
      shell: bash -euo pipefail {0}
      run: |
        runner_root="${RUNNER_WORKSPACE%/_work*}"
        api_runner_id=$(jq -r '.agentId' "${runner_root}/.runner")
        echo "runner_name=$(echo ${RUNNER_NAME} | sed 's/\-[0-9]$//')" | tee -a ${GITHUB_OUTPUT}
        echo "api_runner_id=${api_runner_id}" | tee -a ${GITHUB_OUTPUT}
        echo "user_id=$(id -u)" | tee -a ${GITHUB_OUTPUT}
        echo "render_id=$(getent group render | cut -d: -f3)" | tee -a ${GITHUB_OUTPUT}

    # --- Prevent re-scheduling by swapping labels ---
    - name: Save labels and assign random label
      if: inputs.labels_action == 'set'
      id: labels
      shell: bash -euo pipefail {0}
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        API_RUNNER_ID: ${{ steps.runner.outputs.api_runner_id }}
      run: |
        # Save current custom labels
        current_labels=$(gh api "repos/${REPO}/actions/runners/${API_RUNNER_ID}/labels" \
          --jq '[.labels[] | select(.type=="custom") | .name] | join(",")')
        echo "Saved labels: ${current_labels}"
        echo "${current_labels}" > ${HOME}/.ci_saved_labels
        # Remove all custom labels
        if [ -n "${current_labels}" ]; then
          IFS=',' read -ra label_arr <<< "${current_labels}"
          for label in "${label_arr[@]}"; do
            gh api --method DELETE "repos/${REPO}/actions/runners/${API_RUNNER_ID}/labels/${label}" || true
          done
        fi
        # Assign a temporary random label
        random_label="runner-$(date +%s)-$(head -c 8 /dev/urandom | xxd -p)"
        gh api --method POST "repos/${REPO}/actions/runners/${API_RUNNER_ID}/labels" \
          -f "labels[]=${random_label}"
        echo "Assigned random label: ${random_label}"
        echo "RANDOM_RUNNER_LABEL=${random_label}" >> ${GITHUB_OUTPUT}

    # --- Fix CPU/GPU frequency for performance tests ---
    - name: Fix frequency for stable benchmarking
      if: inputs.fixed_freq == 'true'
      shell: bash -euo pipefail {0}
      run: |
        ${{ github.workspace }}/.github/scripts/freq_fixed.sh lock
        ${{ github.workspace }}/.github/scripts/freq_fixed.sh status

    # --- Detect XPU devices ---
    - name: Detect devices and distribute CPUs/GPUs
      id: devices
      shell: bash -euo pipefail {0}
      run: |
        ${{ github.workspace }}/.github/scripts/detect-devices.sh
        if [ "${{ inputs.ut_name }}" == "xpu_distributed" ]; then
          pytest_extra_args="$(python ${{ github.workspace }}/.github/scripts/check-topology.py)"
          echo "PYTEST_EXTRA_ARGS=${pytest_extra_args}" >> ${GITHUB_OUTPUT}
        fi

    # --- Restore original labels ---
    - name: Recover runner labels
      if: inputs.labels_action == 'reset'
      shell: bash -euo pipefail {0}
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        API_RUNNER_ID: ${{ steps.runner.outputs.api_runner_id }}
        RANDOM_LABEL: ${{ steps.labels.outputs.RANDOM_RUNNER_LABEL }}
      run: |
        # Remove the temporary random label
        if [ -n "${RANDOM_LABEL}" ]; then
          gh api --method DELETE "repos/${REPO}/actions/runners/${API_RUNNER_ID}/labels/${RANDOM_LABEL}" || true
        fi
        # Restore saved labels from file
        saved_labels=""
        if [ -f "${HOME}/.ci_saved_labels" ]; then
          saved_labels=$(cat "${HOME}/.ci_saved_labels")
          rm -f "${HOME}/.ci_saved_labels"
        fi
        if [ -n "${saved_labels}" ]; then
          IFS=',' read -ra label_arr <<< "${saved_labels}"
          for label in "${label_arr[@]}"; do
            gh api --method POST "repos/${REPO}/actions/runners/${API_RUNNER_ID}/labels" \
              -f "labels[]=${label}"
          done
          echo "Restored labels: ${saved_labels}"
        fi
