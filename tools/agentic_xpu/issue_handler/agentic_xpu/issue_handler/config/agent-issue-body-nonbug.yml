# Agent issue body template — non-bug issues (suffix only)
# Appended after the normalized original body.
# Used for: enhancement, performance, feature-gap, task, question
# Placeholders use Python str.format() syntax: {field_name}
#
# Canonical section names for non-bug issues:
#   Description, Objective, Current Status
# The issue-format skill normalizes the original body's headings to these names.

name: "Agent Non-Bug Issue Body"
description: "Suffix appended to non-bug issues (enhancement, task, feature-gap, performance, question)"

canonical_headings:
  - Description
  - Objective
  - Current Status

body: |
  ---

  ## Type
  - **Category:** {category}
  - **Platform:** {platform}
  - **Related Components:** {related_components}

  ## Action Items
  - [ ] 🔍 Issue formatted (Discovery Agent)
    <details><summary>Discovery log</summary>
    <!-- agent:discovery-log -->
    </details>
  - [ ] 🧠 Root cause identified (Triage Agent)
    <details><summary>Triage log</summary>
    <!-- agent:triage-log -->
    </details>
  - [ ] 🎯 Triage complete — routed to fix agent (agent:triaged)
  - [ ] 🔧 Fix implemented (Fix Agent)
    <details><summary>Fix log</summary>
    <!-- agent:fix-log -->
    </details>
  - [ ] ✅ Fix verified locally
  <details><summary>Verification log</summary>

  <!-- agent:verification-log -->
  </details>
  - [ ] 📋 PR proposed
  - [ ] 👀 Human review
  - [ ] 🎉 PR merged

  ## Context
  {context}

  ## Original Issue
  <details><summary>Original issue body</summary>

  {original_issue}

  </details>
