# OOB 300 Models — HuggingFace Suite (Inference)
#
# Each entry: model name + default batch size for eval mode.
# Some models have multiple batch size entries.
# Used by run_all_models.sh and generate_all_reports.py.

suite: huggingface
test: eval
precision: fp16

models:
