# Hardware specifications for OOB roofline analysis.
# Used by report generation scripts (generate_report.py, generate_fleet_summary.py, etc.)
# to compute T1 projections and R values.
#
# peak_tflops_fp16: peak FP16 throughput in TFLOPS
# bandwidth_gbs: peak memory bandwidth in GB/s
# mem_col: column index in calcflops output for cache-adjusted memory (0-indexed)
# label: display name in reports
#
# TODO: Replace placeholder values with verified hardware specs.

platforms:
  b580:
    label: "B580"
    peak_tflops_fp16: 0
    bandwidth_gbs: 0
    mem_col: 5
  4080s:
    label: "RTX 4080 SUPER"
    peak_tflops_fp16: 0
    bandwidth_gbs: 0
    mem_col: 6
  b70:
    label: "B70 (G31)"
    peak_tflops_fp16: 0
    bandwidth_gbs: 0
    mem_col: 7
