# Models excluded from specific test cases for priority p0.
#
# torchbench_models_list.txt, huggingface_models_list.txt and
# timm_models_list.txt in this folder contain the full model set for this
# priority. A model listed under a given suite/scenario/mode here is skipped for
# that run configuration.
skip:
  huggingface:
    accuracy:
      inference: []
      training:
        - M2M100ForConditionalGeneration
    performance:
      inference: []
      training:
        - M2M100ForConditionalGeneration
  timm:
    accuracy:
      inference: []
      training: []
    performance:
      inference: []
      training: []
  torchbench:
    accuracy:
      inference:
        # generate-only model, not run in accuracy
        - cm3leon_generate
      training:
        - cm3leon_generate
        - detectron2_fcos_r_50_fpn
        - llama_v2_7b_16h
        - moondream
    performance:
      inference: []
      training:
        - cm3leon_generate
        - detectron2_fcos_r_50_fpn
        - llama_v2_7b_16h
        - moondream
